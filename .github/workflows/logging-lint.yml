name: Logging Standard Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  logging-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Logging lint
        run: npm run lint:logs
