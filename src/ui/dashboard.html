<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeRadar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --bg-card:  #161b22;
      --bg-hover: #1c2230;
      --border:   #21262d;
      --text:     #e6edf3;
      --muted:    #7d8590;
      --dim:      #484f58;
      --blue:     #58a6ff;
      --green:    #3fb950;
      --red:      #f85149;
      --yellow:   #e3b341;
      --accent:   #58a6ff;
    }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header-project { margin-left: auto; font-size: 13px; color: var(--muted); }
    .header-time    { font-size: 12px; color: var(--dim); }
    #rescanBtn { font-size: 16px; padding: 2px 6px; background: none; border: none; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
    #rescanBtn:hover { opacity: 1; }
    #rescanBtn.spinning { animation: rescan-spin 0.8s linear infinite; opacity: 1; }
    @keyframes rescan-spin { to { transform: rotate(360deg); } }
    #rescanStatus { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid transparent; transition: all 0.4s; white-space: nowrap; }
    #rescanStatus.status-idle { color: var(--dim); border-color: transparent; }
    #rescanStatus.status-scanning { color: var(--yellow); border-color: rgba(227,179,65,0.3); }
    #rescanStatus.status-done { color: var(--green); border-color: rgba(63,185,80,0.35); background: rgba(63,185,80,0.07); }
    #rescanStatus.status-error { color: var(--red); border-color: rgba(248,81,73,0.3); }
    .header-agent-rights {
      font-size: 11px;
      color: var(--muted);
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg);
      white-space: nowrap;
    }

    /* ── Run All Tests button ────────────────────────────────────────────────── */
    #runAllBtn {
      padding: 5px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      white-space: nowrap;
    }
    #runAllBtn:hover:not(:disabled) { background: var(--bg-hover); color: var(--text); border-color: var(--dim); }
    #runAllBtn:disabled { cursor: not-allowed; opacity: 0.7; }
    #runAllBtn.running { color: var(--yellow); border-color: var(--yellow); }
    #runAllBtn.done-ok { color: var(--green);  border-color: var(--green); }
    #runAllBtn.done-fail { color: var(--red);  border-color: var(--red); }
    #termBtn {
      padding: 5px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      white-space: nowrap;
    }
    #termBtn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--dim); }
    #termBtn.term-active { color: var(--accent); border-color: var(--accent); }

    #agentBtn {
      padding: 5px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      white-space: nowrap;
    }
    #agentBtn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--dim); }

    .agent-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 200px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .agent-menu.open { display: block; }
    .agent-menu-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--dim);
      padding: 6px 10px 4px;
    }
    .agent-menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      background: none;
      border: none;
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s;
    }
    .agent-menu-item:hover { background: var(--bg-hover); }
    .agent-menu-check { color: var(--green); font-weight: 700; display: none; }
    .agent-menu-check.active { display: inline; }
    .agent-menu-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* ── Stats bar ───────────────────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 28px;
      padding: 12px 20px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-value { font-size: 20px; font-weight: 700; color: var(--blue); }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }


    .observability-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .observability-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .obs-metrics { display:grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap:8px; margin-bottom:10px; }
    .obs-metric { background: var(--bg); border:1px solid var(--border); border-radius:6px; padding:8px; }
    .obs-metric-v { font-size:18px; font-weight:700; color: var(--blue); }
    .obs-metric-l { font-size:10px; color: var(--muted); text-transform: uppercase; }
    .obs-columns { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .obs-list { background: var(--bg); border:1px solid var(--border); border-radius:6px; padding:8px; }
    .obs-list h4 { font-size:12px; margin-bottom:6px; color: var(--text); }
    .obs-row { font-size:12px; color: var(--muted); padding:4px 0; border-bottom:1px dashed var(--border); }
    .obs-row:last-child { border-bottom:none; }
    .obs-priority-high { color: var(--red); }
    .obs-priority-medium { color: var(--yellow); }
    .obs-priority-low { color: var(--green); }
    .obs-catalog { margin-top:10px; background: var(--bg); border:1px solid var(--border); border-radius:6px; padding:8px; }
    .obs-catalog h4 { font-size:12px; margin-bottom:6px; }
    .obs-cat-row { display:grid; grid-template-columns: 1.4fr .5fr .6fr .4fr 1.2fr .7fr auto; gap:6px; font-size:11px; color:var(--muted); padding:5px 0; border-bottom:1px dashed var(--border); }
    .obs-cat-row.head { color: var(--text); font-weight:600; text-transform:uppercase; font-size:10px; }

    /* ── Layout ──────────────────────────────────────────────────────────────── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────────────────────────── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .mode-switch {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .mode-switch-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.1s, background 0.1s, color 0.1s;
    }
    .mode-switch-btn:hover { background: var(--bg-hover); color: var(--text); }
    .mode-switch-btn.active { border-color: var(--blue); color: var(--text); }
    .mode-switch-hint { font-size: 10px; color: var(--dim); }

    .view-tabs {
      display: flex;
      background: var(--bg);
      border-radius: 6px;
      padding: 3px;
      gap: 2px;
    }
    .view-tab {
      flex: 1;
      padding: 5px 0;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .view-tab.active { background: var(--bg-card); color: var(--text); }
    .view-tab.disabled { opacity: 0.4; pointer-events: none; }

    .sidebar-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 6px;
    }

    .search-input {
      width: 100%;
      padding: 7px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .search-input:focus { border-color: var(--blue); }
    .search-input::placeholder { color: var(--dim); }

    .type-filter {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
    }
    .type-filter:hover { background: var(--border); color: var(--text); }
    .type-filter.active { background: var(--border); color: var(--text); }
    .type-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .type-count { margin-left: auto; font-size: 11px; color: var(--dim); }

    /* ── Content area ────────────────────────────────────────────────────────── */
    .content { flex: 1; overflow-y: auto; padding: 18px 20px; transition: padding-bottom 0.25s ease; }
    .content.panel-open { padding-bottom: 300px; }

    .onboarding-block {
      background: linear-gradient(135deg, rgba(88,166,255,0.12), rgba(63,185,80,0.08));
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .onboarding-block h3 { font-size: 14px; margin-bottom: 6px; }
    .onboarding-block p { font-size: 12px; color: var(--muted); line-height: 1.5; }

    .obs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .obs-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .obs-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 10px; }
    .obs-value { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .obs-sub { font-size: 12px; color: var(--muted); line-height: 1.4; }
    .obs-list { display: flex; flex-direction: column; gap: 6px; }
    .obs-list-item { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; }

    /* ── Feature cards ───────────────────────────────────────────────────────── */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .feature-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      overflow: hidden;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
    }
    .feature-card:hover    { background: var(--bg-hover); transform: translateY(-1px); }
    .feature-card.active   { background: var(--bg-hover); border-color: #30363d; }

    .feature-accent { width: 4px; flex-shrink: 0; }

    .feature-body { padding: 14px 16px; flex: 1; min-width: 0; }

    .feature-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .feature-file-count { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

    .feature-desc {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.4;
    }

    .feature-progress-wrap { display: flex; align-items: center; gap: 8px; }
    .feature-progress-bar {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .feature-progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .feature-progress-label { font-size: 11px; color: var(--muted); white-space: nowrap; }

    /* ── Documentation screen ────────────────────────────────────────────────── */
    .doc-kpi-strip {
      display: flex; gap: 24px; padding: 12px 16px; margin-bottom: 16px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    }
    .doc-kpi { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .doc-kpi-val { font-size: 20px; font-weight: 700; color: var(--text); }
    .doc-kpi-lbl { font-size: 11px; color: var(--muted); }
    .doc-feature-card { cursor: pointer; }
    .doc-agent-btn {
      font-size: 11px; padding: 4px 10px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg-hover); color: var(--text);
      cursor: pointer; transition: background 0.15s;
    }
    .doc-agent-btn:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
    .doc-agent-btn-secondary { opacity: 0.75; }
    .doc-agent-btn-secondary:hover { opacity: 1; }
    .doc-detail-actions {
      display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .doc-action-step {
      display: flex; gap: 10px; align-items: flex-start;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; flex: 1; min-width: 220px;
    }
    .doc-step-num {
      display: flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%; background: var(--dim);
      color: var(--text); font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
    }
    .doc-step-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .doc-step-hint { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
    .doc-changed-section {
      margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .doc-changed-header {
      padding: 8px 12px; background: var(--bg-card); color: var(--text);
      font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
    }
    .doc-changed-arrow { font-size: 10px; transition: transform 0.2s; }
    .doc-changed-section.open .doc-changed-arrow { transform: rotate(90deg); }
    .doc-changed-list { display: none; padding: 8px 12px; }
    .doc-changed-section.open .doc-changed-list { display: block; }
    .doc-changed-file {
      font-size: 12px; color: var(--yellow); padding: 3px 0;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .doc-content {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
      padding: 20px 24px; line-height: 1.65; color: var(--text);
    }
    .doc-content .doc-h { margin: 20px 0 8px 0; color: var(--text); font-weight: 600; }
    .doc-content h1.doc-h { font-size: 22px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .doc-content h2.doc-h { font-size: 17px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .doc-content h3.doc-h { font-size: 15px; }
    .doc-content .doc-p { margin: 8px 0; font-size: 14px; }
    .doc-content .doc-list { margin: 8px 0; padding-left: 24px; font-size: 14px; }
    .doc-content .doc-list li { margin: 4px 0; }
    .doc-content .doc-code {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 12px 16px; overflow-x: auto; font-size: 13px; margin: 12px 0;
    }
    .doc-content .doc-inline-code {
      background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
      padding: 1px 5px; font-size: 12px;
    }
    .back-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    .back-btn:hover { color: var(--text); border-color: var(--dim); }

    /* ── No config banner ────────────────────────────────────────────────────── */
    .no-config {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .no-config-icon { font-size: 48px; }
    .no-config h2   { font-size: 18px; color: var(--text); }
    .no-config p    { font-size: 14px; max-width: 420px; line-height: 1.6; }
    .no-config-cmd  {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 28px;
      font-family: monospace;
      font-size: 15px;
      color: var(--blue);
    }

    /* ── Module grid (Files view) ────────────────────────────────────────────── */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }

    .module-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .module-card:hover  { border-color: var(--blue); transform: translateY(-1px); }
    .module-card.active { border-color: var(--blue); background: var(--bg-hover); }

    .module-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      word-break: break-all;
    }
    .module-path { font-size: 11px; color: var(--dim); margin-bottom: 8px; word-break: break-all; }
    .module-meta { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--muted); }

    /* ── Badges ──────────────────────────────────────────────────────────────── */
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
    .badge-green { background: #1a3a2a; color: var(--green); }
    .badge-red   { background: #3a1a1a; color: var(--red); }
    .badge-gray  { background: var(--border); color: var(--muted); }

    .cov-bar  { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
    .cov-fill { height: 100%; border-radius: 2px; }

    /* ── Right panel ─────────────────────────────────────────────────────────── */
    .panel {
      position: fixed;
      top: 0; right: 0;
      width: 420px;
      height: 100vh;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 100;
      padding: 20px;
    }
    .panel.open { transform: translateX(0); }

    .panel-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 5px 8px;
      border-radius: 4px;
      line-height: 1;
    }
    .panel-close:hover { background: var(--border); color: var(--text); }

    .panel-title    { font-size: 17px; font-weight: 700; padding-right: 36px; margin-bottom: 4px; }
    .panel-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }

    .panel-stats {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-stat      { flex: 1; text-align: center; }
    .panel-stat-val  { font-size: 22px; font-weight: 700; }
    .panel-stat-lbl  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .panel-section       { margin-bottom: 20px; }
    .panel-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }

    .file-list { display: flex; flex-direction: column; gap: 3px; }
    .file-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 10px;
      background: var(--bg);
      border-radius: 6px;
      font-size: 12px;
    }
    .file-item-icon { font-size: 11px; flex-shrink: 0; padding-top: 2px; }
    .file-item-name { font-weight: 600; color: var(--text); word-break: break-all; line-height: 1.3; }
    .file-item-dir  { color: var(--dim); font-size: 11px; word-break: break-all; }

    .cov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .cov-metric { background: var(--bg); border-radius: 6px; padding: 10px; text-align: center; }
    .cov-metric-val { font-size: 20px; font-weight: 700; }
    .cov-metric-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row-right { font-size: 11px; color: var(--muted); text-align: right; max-width: 60%; word-break: break-all; }

    .dep-item {
      font-size: 12px;
      color: var(--muted);
      padding: 3px 8px;
      background: var(--bg);
      border-radius: 4px;
      font-family: monospace;
    }

    /* ── Feature drill-down ──────────────────────────────────────────────────── */
    .drill-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .back-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      padding: 5px 12px;
      font-size: 12px;
      flex-shrink: 0;
      transition: background 0.1s, color 0.1s;
    }
    .back-btn:hover { background: var(--border); color: var(--text); }
    .drill-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 17px; font-weight: 700;
    }
    .drill-stats {
      display: flex; gap: 16px;
      font-size: 12px; color: var(--muted);
      margin-left: auto;
    }
    .drill-desc {
      font-size: 13px; color: var(--muted);
      margin-bottom: 14px; line-height: 1.5;
    }
    .drill-section-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--muted);
      margin: 14px 0 6px;
    }

    /* ── Test-type cards inside feature detail ───────────────────────────────── */
    .test-type-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .test-type-card {
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: 3px solid transparent;
      border-radius: 8px;
      padding: 12px 14px 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      min-width: 0;
    }
    .test-type-card:hover { background: var(--bg-hover); }
    .test-type-card.tt-active { background: var(--bg-hover); border-color: var(--border); }
    .test-type-card.tt-empty { opacity: 0.6; }
    .test-type-card.tt-failed {
      border-color: var(--red) !important;
      background: rgba(248, 81, 73, 0.05);
    }
    .tt-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .tt-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .tt-failed-badge { font-size: 10px; color: var(--red); font-weight: 700; }
    .tt-count { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 2px; }
    .tt-sub { font-size: 11px; color: var(--dim); }
    .tt-card-actions { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
    .tt-run-btn {
      width: 100%; padding: 5px 10px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 5px; color: var(--muted); font-size: 11px;
      cursor: pointer; text-align: center;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .tt-run-btn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--dim); }
    .tt-run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .tt-fix-btn { border-color: var(--yellow); color: var(--yellow); font-weight: 600; }
    .tt-fix-btn:hover { background: rgba(255,200,0,0.1); color: var(--yellow); border-color: var(--yellow); }
    .tt-write-btn { border-color: var(--accent); color: var(--accent); }
    .tt-write-btn:hover { background: rgba(88,166,255,0.1); color: var(--accent); border-color: var(--accent); }
    .file-rows { display: flex; flex-direction: column; gap: 2px; contain: content; }
    .file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.1s;
      content-visibility: auto;
      contain-intrinsic-size: 34px;
    }
    .file-row:hover  { background: var(--bg-card); }
    .file-row.active { background: var(--bg-hover); border-left: 2px solid var(--blue); padding-left: 8px; }
    .file-row-icon { font-size: 12px; flex-shrink: 0; }
    .file-row-select {
      width: 14px;
      height: 14px;
      accent-color: var(--blue);
      cursor: pointer;
      flex-shrink: 0;
    }
    .file-row-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .file-row-dir  { font-size: 11px; color: var(--dim); margin-left: auto; white-space: nowrap; flex-shrink: 0; }
    .file-row-agent-btn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      font-size: 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--dim);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .file-row:hover .file-row-agent-btn { border-color: var(--accent); color: var(--accent); }
    .file-row-agent-btn:hover { background: var(--accent); color: var(--bg) !important; border-color: var(--accent); }
    .file-row-agent-btn.stale { border-color: var(--yellow); color: var(--yellow); }
    .file-row-agent-btn.stale:hover { background: var(--yellow) !important; color: var(--bg) !important; }
    .file-row-fix-btn {
      background: var(--red) !important; border-color: var(--red) !important;
      color: #fff !important; font-weight: 600;
    }
    .file-row-fix-btn:hover { opacity: 0.85; }
    .obs-action-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 14px; font-size: 12px; min-height: 32px;
      background: transparent; border: 1px solid var(--border); border-radius: 4px;
      color: var(--dim); cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .obs-action-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .obs-batch-btn { border-color: var(--yellow); color: var(--yellow); }
    .obs-batch-btn:hover { background: rgba(255,200,0,0.15); color: var(--yellow); border-color: var(--yellow); }
    .obs-expand-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px; padding:5px 8px; }
    .obs-expand-btn:hover { color:var(--accent); }
    .obs-detail { display:none; padding:6px 0 2px 0; border-top:1px dashed var(--border); margin-top:4px; }
    .obs-detail.open { display:block; }
    .obs-detail-list { max-height:400px; overflow-y:auto; display:flex; flex-direction:column; gap:2px; }
    .obs-detail-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); padding:6px 4px; }
    .obs-detail-item input[type="checkbox"] { margin:0; flex-shrink:0; accent-color:var(--accent); width:18px; height:18px; }
    .obs-detail-item span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .obs-detail-bar { display:flex; align-items:center; gap:8px; margin-top:6px; padding-top:6px; border-top:1px dashed var(--border); }
    .obs-run-selected { padding:8px 16px; font-size:13px; font-weight:600; background:var(--accent); color:var(--bg); border:none; border-radius:4px; cursor:pointer; min-height:36px; }
    .obs-run-selected:hover { opacity:0.85; }
    .obs-run-selected:disabled { opacity:0.4; cursor:not-allowed; }
    .obs-select-all { font-size:12px; color:var(--dim); cursor:pointer; background:none; border:none; padding:4px 8px; }
    .obs-select-all:hover { color:var(--accent); }
    .obs-tier-badge { display:inline-block; padding:3px 8px; border-radius:3px; font-size:11px; font-weight:700; letter-spacing:0.5px; }
    .obs-tier-critical { background:rgba(248,81,73,0.2); color:var(--red); }
    .obs-tier-important { background:rgba(227,179,65,0.2); color:var(--yellow); }
    .obs-tier-normal { background:rgba(139,148,158,0.15); color:var(--muted); }
    .obs-fp-list { font-size:11px; color:var(--muted); margin:4px 0 0 18px; }
    .obs-fp-item { display:flex; gap:6px; padding:1px 0; align-items:baseline; }
    .obs-fp-type { color:var(--yellow); font-weight:600; white-space:nowrap; font-size:11px; }
    .obs-fp-line { color:var(--dim); font-size:10px; flex-shrink:0; }
    .obs-tier-group { margin-bottom:8px; }
    .obs-tier-group-header { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:12px; font-weight:600; color:var(--text); }

    /* ── Observability tabs UX ── */
    .obs-kpi-strip {
      position:sticky; top:0; z-index:5;
      display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
      background:var(--bg); padding:10px 0 12px 0; border-bottom:1px solid var(--border); margin-bottom:0;
    }
    .obs-kpi {
      display:flex; align-items:baseline; gap:8px; padding:6px 10px;
      background:var(--bg-card); border:1px solid var(--border); border-radius:6px;
    }
    .obs-kpi-value { font-size:18px; font-weight:700; font-variant-numeric:tabular-nums; }
    .obs-kpi-label { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .obs-tabs {
      position:sticky; top:52px; z-index:4;
      display:flex; background:var(--bg); border-radius:6px; padding:3px; gap:2px; margin:12px 0 16px 0;
    }
    .obs-tab {
      flex:1; padding:8px 12px; text-align:center; font-size:12px; font-weight:600;
      border-radius:4px; cursor:pointer; color:var(--muted); user-select:none;
      transition:background 0.15s, color 0.15s; white-space:nowrap;
    }
    .obs-tab:hover { color:var(--text); background:var(--bg-hover); }
    .obs-tab.active { background:var(--bg-card); color:var(--text); }
    .obs-tab-badge {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:18px; height:18px; padding:0 5px; border-radius:9px;
      font-size:10px; font-weight:700; margin-left:6px; vertical-align:middle;
    }
    .obs-tab-badge.red { background:rgba(248,81,73,0.2); color:var(--red); }
    .obs-tab-badge.yellow { background:rgba(227,179,65,0.2); color:var(--yellow); }
    .obs-tab-badge.muted { background:rgba(139,148,158,0.15); color:var(--muted); }
    .obs-tab-content { display:none; }
    .obs-tab-content.active { display:block; }
    @media (max-width:640px) { .obs-kpi-strip { grid-template-columns:repeat(2,1fr); } }

    /* ── Tab hint panels ── */
    .obs-hint {
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .obs-hint-toggle {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 10px 14px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 12px; font-weight: 600;
      text-align: left; transition: background 0.1s, color 0.1s;
    }
    .obs-hint-toggle:hover { background: var(--bg-card); color: var(--text); }
    .obs-hint-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 50%;
      border: 1.5px solid currentColor; font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .obs-hint-chevron { margin-left: auto; font-size: 10px; transition: transform 0.2s; }
    .obs-hint.open .obs-hint-chevron { transform: rotate(180deg); }
    .obs-hint-body {
      display: none;
      padding: 0 16px 16px 16px;
      background: var(--bg-card);
      font-size: 12px; color: var(--muted); line-height: 1.6;
    }
    .obs-hint.open .obs-hint-body { display: block; }
    .obs-hint-section { margin-top: 12px; }
    .obs-hint-section-title { font-size: 11px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .obs-hint-code {
      font-family: monospace; font-size: 11px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 5px; padding: 8px 10px; margin: 4px 0;
      line-height: 1.5; overflow-x: auto; white-space: pre;
    }
    .obs-hint-code .hl-red { color: var(--red); }
    .obs-hint-code .hl-green { color: var(--green); }
    .obs-hint-code .hl-yellow { color: var(--yellow); }
    .obs-hint-code .hl-dim { color: var(--dim); }
    .obs-hint-row { display: flex; gap: 12px; }
    .obs-hint-row > * { flex: 1; min-width: 0; }
    .obs-hint-label { font-size: 10px; font-weight: 700; margin-bottom: 3px; }
    .obs-hint-label.before { color: var(--red); }
    .obs-hint-label.after { color: var(--green); }

    /* ── Progress & baseline delta badges ── */
    .obs-kpi-delta {
      display: block; font-size: 11px; font-weight: 700; margin-top: 2px; letter-spacing: 0.01em;
    }
    .obs-baseline-strip {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 4px 12px; background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 6px;
      font-size: 11px; color: var(--dim); margin-bottom: 6px;
    }
    .obs-baseline-strip button {
      background: none; border: none; color: var(--accent); cursor: pointer;
      font-size: 11px; padding: 0 2px; text-decoration: underline; text-underline-offset: 2px;
    }
    .obs-progress-banner {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 8px 14px;
      background: rgba(63,185,80,0.07); border: 1px solid rgba(63,185,80,0.2);
      border-radius: 8px; margin-bottom: 8px; font-size: 12px;
    }
    .obs-progress-banner.has-regression {
      background: rgba(248,81,73,0.07); border-color: rgba(248,81,73,0.2);
    }
    .obs-pb-title { color: #3fb950; font-weight: 700; font-size: 13px; flex-shrink: 0; }
    .obs-pb-title.mixed { color: var(--yellow); }
    .obs-pb-item { color: #3fb950; white-space: nowrap; }
    .obs-pb-worse { color: #f85149; white-space: nowrap; }

    /* ── Floating selection action bar ── */
    .obs-floating-bar {
      position: fixed;
      bottom: -80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: flex; align-items: center; gap: 12px;
      background: #1c2128;
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 10px 10px 10px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(88,166,255,0.15);
      min-width: 340px;
      transition: bottom 0.25s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
      opacity: 0;
    }
    .obs-floating-bar.visible {
      bottom: 28px;
      pointer-events: auto;
      opacity: 1;
    }
    .obs-floating-count {
      color: var(--text); font-size: 13px; font-weight: 600; white-space: nowrap;
    }
    .obs-floating-label {
      color: var(--muted); font-size: 12px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .obs-floating-btn {
      padding: 8px 18px; font-size: 13px; font-weight: 600;
      background: var(--accent); color: var(--bg);
      border: none; border-radius: 6px; cursor: pointer; min-height: 36px;
      white-space: nowrap; flex-shrink: 0;
      transition: opacity 0.1s;
    }
    .obs-floating-btn:hover { opacity: 0.85; }
    .obs-floating-dismiss {
      background: none; border: none; color: var(--dim); cursor: pointer;
      font-size: 16px; padding: 4px 6px; line-height: 1; flex-shrink: 0;
      border-radius: 4px; transition: color 0.1s;
    }
    .obs-floating-dismiss:hover { color: var(--text); }

    .file-row-err-badge {
      display: inline-flex; align-items: center;
      font-size: 11px; padding: 1px 6px; border-radius: 10px;
      background: #3a1a1a; color: var(--red);
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .file-row.has-errors {
      border-left: 3px solid var(--red);
      padding-left: 8px;
      background: rgba(248, 81, 73, 0.07);
    }
    .file-row.has-errors:hover { background: rgba(248, 81, 73, 0.12); }
    .file-agent-spinner { display: inline-block; width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .file-agent-spinner.running { border: 2px solid var(--yellow); border-top-color: transparent; animation: spin 0.7s linear infinite; }
    .file-agent-spinner.queued  { border: 2px solid var(--dim);    border-top-color: transparent; animation: spin 1.5s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .file-row-errors {
      padding: 4px 10px 6px 32px;
      display: flex; flex-direction: column; gap: 3px;
      content-visibility: auto;
      contain-intrinsic-size: 46px;
    }
    .err-item { display: flex; flex-direction: column; gap: 1px; }
    .err-name { font-size: 11px; color: var(--muted); }
    .err-msg  { font-size: 10px; color: var(--red); font-family: monospace; opacity: 0.85; }

    /* ── Agent setup banner ──────────────────────────────────────────────────── */
    .agent-setup-banner {
      background: linear-gradient(135deg, #161b22 0%, #1c2230 100%);
      border: 1px solid var(--blue);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
    }
    .agent-setup-banner h3 { font-size: 15px; margin-bottom: 6px; }
    .agent-setup-banner p  { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .agent-choices { display: flex; gap: 10px; justify-content: center; }
    .agent-choice-btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .agent-choice-btn:hover { background: var(--bg-hover); border-color: var(--blue); transform: translateY(-1px); }

    /* ── Agent card button ───────────────────────────────────────────────────── */
    .agent-card-btn {
      margin-top: 10px;
      padding: 5px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--blue);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      width: 100%;
      text-align: left;
    }
    .agent-card-btn:hover { background: var(--bg-hover); border-color: var(--blue); }
    .agent-card-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Agent terminal panel ────────────────────────────────────────────────── */
    .agent-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 280px;
      background: #090d13;
      border-top: 1px solid var(--border);
      transform: translateY(100%);
      transition: transform 0.25s ease;
      z-index: 200;
      display: flex;
      flex-direction: column;
    }
    .agent-panel.open { transform: translateY(0); }
    .agent-panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .agent-panel-title  { font-size: 13px; font-weight: 600; flex: 1; }
    .agent-panel-status { font-size: 11px; color: var(--muted); }
    .agent-panel-close  {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 14px; padding: 3px 6px; border-radius: 4px; line-height: 1;
    }
    .agent-panel-close:hover { background: var(--border); color: var(--text); }
    .agent-panel-copy {
      background: none; border: none; color: var(--dim); cursor: pointer;
      font-size: 13px; padding: 3px 7px; border-radius: 4px; line-height: 1;
    }
    .agent-panel-copy:hover { background: var(--border); color: var(--text); }
    .agent-panel-copy.copied { color: var(--green); }
    .agent-panel-cancel {
      background: none; border: 1px solid var(--yellow); color: var(--yellow);
      cursor: pointer; font-size: 11px; padding: 2px 8px; border-radius: 4px;
    }
    .agent-panel-cancel:hover { background: var(--yellow); color: var(--bg); }
    .agent-queue-badge {
      font-size: 11px; color: var(--yellow); background: rgba(255,200,0,0.1);
      border: 1px solid var(--yellow); border-radius: 4px; padding: 2px 8px;
    }
    .agent-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #0b1018;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .agent-toolbar input[type="text"] {
      min-width: 220px;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      font-size: 11px;
    }
    .agent-toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);

    /* ── Console Tabs ───────────────────────────────────────────────────────── */

    .agent-tab-title { overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
    .agent-tab-close {
      background: none; border: none; cursor: pointer; color: var(--dim);

    }
    .agent-tab:hover .agent-tab-close { opacity: 1; }
    .agent-tab-close:hover { background: var(--border); color: var(--text); }
    .tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tab-dot-running { background: var(--yellow); animation: tab-pulse 1s ease-in-out infinite; }
    .tab-dot-ok      { background: var(--green); }
    .tab-dot-error   { background: var(--red); }
    .tab-dot-info    { background: var(--muted); }
    @keyframes tab-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    #termBtn.term-error { color: var(--red); border-color: var(--red); }
    .file-row-more-btn {
      background: none; border: none; cursor: pointer; font-size: 14px; color: var(--dim);
      padding: 0 4px; line-height: 1; opacity: 0; transition: opacity 0.1s;
    }
    .file-row:hover .file-row-more-btn { opacity: 1; }

    .file-row-more-dropdown {
      display: none; position: absolute; right: 0; top: 100%; z-index: 200;

      display: block; width: 100%; text-align: left; background: none; border: none;

<body>

<header>
  <span style="font-size:20px">🔭</span>
  <h1>VibeRadar</h1>
  <span class="header-project" id="projectName">—</span>
  <span class="header-time" id="scannedAt"></span>

  <span id="rescanStatus" class="status-idle"></span>
  <button id="runAllBtn" onclick="runAllTests()" title="Запустить все unit и integration тесты">▶ Все тесты</button>
  <button id="termBtn" onclick="toggleAgentPanel()" title="Показать/скрыть терминал агента">📟 Terminal</button>
  <div style="position:relative">
    <button id="agentBtn" onclick="toggleAgentMenu()" title="Настройки агента">🤖 —</button>
    <div id="agentMenu" class="agent-menu">
      <div class="agent-menu-label">AI Агент</div>

        <span>⚡ Claude Code</span><span class="agent-menu-check" id="amClaudeCheck">✓</span>
      </button>
      <button class="agent-menu-item" id="amCodex" onclick="setAgent('codex');closeAgentMenu()">

      </button>
      <div class="agent-menu-divider" id="amModelDivider"></div>
      <div class="agent-menu-label" id="amModelLabel">Модель Claude</div>
      <button class="agent-menu-item" id="amSonnet46" onclick="setModel('claude-sonnet-4-6');closeAgentMenu()">
        <span>sonnet-4-6 <span style="color:var(--dim);font-size:10px">быстрый</span></span><span class="agent-menu-check" id="amSonnet46Check">✓</span>
      </button>
      <button class="agent-menu-item" id="amOpus45" onclick="setModel('claude-opus-4-5');closeAgentMenu()">
        <span>opus-4-5 <span style="color:var(--dim);font-size:10px">умный</span></span><span class="agent-menu-check" id="amOpus45Check">✓</span>
      </button>

        <span>haiku-3-5 <span style="color:var(--dim);font-size:10px">дешёвый</span></span><span class="agent-menu-check" id="amHaiku35Check">✓</span>
      </button>

</div>

<div class="obs-floating-bar" id="obsFloatingBar">

<div class="agent-panel" id="agentPanel">

    <label><input id="agentSearchRegex" type="checkbox" /> regex</label>
    <button class="agent-toolbar-btn" id="btnMatchPrev" onclick="jumpTerminalMatch(-1)">↑ match</button>
    <button class="agent-toolbar-btn" id="btnMatchNext" onclick="jumpTerminalMatch(1)">↓ match</button>
    <button class="agent-toolbar-btn" id="btnCmdPrev" onclick="jumpCommand(-1)">↑ command</button>
    <button class="agent-toolbar-btn" id="btnCmdNext" onclick="jumpCommand(1)">↓ command</button>
    <button class="agent-toolbar-btn" id="btnErrPrev" onclick="jumpError(-1)">↑ error</button>
    <button class="agent-toolbar-btn" id="btnErrNext" onclick="jumpError(1)">↓ error</button>

    <span class="agent-toolbar-meta" id="agentSearchMeta">0 matches</span>

  <div class="agent-tabs-bar" id="agentTabsBar"></div>
  <div class="agent-terminal" id="agentTerminal"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let D = null;
let contextMode = 'qa';
let view = 'features';
let searchQuery = '';
let activeTypes = new Set();
let activePanelKey = null;
let drillFeatureKey = null;   // null = grid, '__unmapped__' = unmapped, string = feature key
let drillTestType   = null;   // null = feature overview, 'unit'|'integration'|'e2e' = test type drill
let showOnlyUntestedInFeature = false; // source tab in feature detail
const selectedSourceFiles = new Set(); // normalized relative paths for batch actions
const FILE_ROWS_INITIAL_LIMIT = 250;
const FILE_ROWS_LIMIT_STEP = 250;
let fileRowsRenderKey = '';
let fileRowsRenderLimit = FILE_ROWS_INITIAL_LIMIT;
let e2ePlan         = null;   // current E2E plan object
let e2ePlanLoading  = false;
let obsActiveTab    = 'overview'; // active observability tab

function toggleObsHint(id) {
  document.getElementById(id).classList.toggle('open');
}

function switchObsTab(tabId) {
  obsActiveTab = tabId;
  history.replaceState(null, '', location.pathname + location.search + '#obs-tab=' + tabId);
  document.querySelectorAll('.obs-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.obstab === tabId));
  document.querySelectorAll('.obs-tab-content').forEach(p => {
    p.classList.toggle('active', p.dataset.obstab === tabId);
  });
}
const modeStore = {
  qa: { view: 'features', searchQuery: '', activeTypes: new Set(), drillFeatureKey: null, drillTestType: null, activePanelKey: null, showOnlyUntestedInFeature: false },
  observability: { view: 'files', searchQuery: '', activeTypes: new Set(), drillFeatureKey: null, drillTestType: null, activePanelKey: null, showOnlyUntestedInFeature: false },
  docs: { view: 'features', searchQuery: '', activeTypes: new Set(), drillFeatureKey: null, drillTestType: null, activePanelKey: null, showOnlyUntestedInFeature: false },
};

function getModeFromPath(pathname = window.location.pathname) {
  if (pathname.startsWith('/radar/observability')) return 'observability';
  if (pathname.startsWith('/radar/docs')) return 'docs';
  return 'qa';
}

function routePathForMode(mode) {
  if (mode === 'observability') return '/radar/observability';
  if (mode === 'docs') return '/radar/docs';
  return '/radar/qa';
}

function setModeRoute(mode, replace = false) {
  const target = routePathForMode(mode) + window.location.search + window.location.hash;
  if (replace) history.replaceState(null, '', target);
  else history.pushState(null, '', target);
}

function saveModeState(mode) {
  modeStore[mode] = {
    view,
    searchQuery,
    activeTypes: new Set(activeTypes),
    drillFeatureKey,
    drillTestType,
    activePanelKey,
    showOnlyUntestedInFeature,
  };
}

function restoreModeState(mode) {
  const state = modeStore[mode];
  view = state.view;
  searchQuery = state.searchQuery;
  activeTypes = new Set(state.activeTypes);
  drillFeatureKey = state.drillFeatureKey;
  drillTestType = state.drillTestType;
  activePanelKey = state.activePanelKey;
  showOnlyUntestedInFeature = !!state.showOnlyUntestedInFeature;
}

function switchMode(nextMode) {
  if (nextMode === contextMode) return;
  saveModeState(contextMode);
  contextMode = nextMode;
  restoreModeState(contextMode);
  if (contextMode === 'observability' || contextMode === 'docs') {
    view = 'features';
    drillFeatureKey = null;
    drillTestType = null;
    activePanelKey = null;
    clearFeatureHash();
  }
  setModeRoute(contextMode);
  document.getElementById('searchInput').value = searchQuery;
  document.getElementById('panel').classList.remove('open');
  renderStats();
  renderSidebar();
  renderContent();
}
// ─── Run All Tests button ──────────────────────────────────────────────────────
let runAllRunning = false;
let refreshDataInFlight = false;
let refreshDataQueued = false;
let refreshDataTimer = null;
let rescanPending = false;

function escapeHtml(text) {
  return String(text || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}


function clearFeatureHash() {
  if (!window.location.hash) return;
  history.replaceState(null, '', window.location.pathname + window.location.search);
}

function buildFeatureTabUrl(featureKey) {
  const url = new URL(window.location.href);
  url.hash = `feature=${encodeURIComponent(featureKey)}`;
  return url.toString();
}

function openFeatureInNewTab(featureKey) {
  window.open(buildFeatureTabUrl(featureKey), '_blank', 'noopener');
}

function setFeatureDrill(featureKey, syncHash = true) {
  view = 'features';
  drillFeatureKey = featureKey;
  drillTestType = null;
  activePanelKey = null;
  selectedSourceFiles.clear();
  document.getElementById('panel').classList.remove('open');
  if (syncHash) {
    if (featureKey) window.location.hash = `feature=${encodeURIComponent(featureKey)}`;
    else clearFeatureHash();
  }
  renderContent();
}

function selectedFilesForFeature(featureKey, visibleSourceFiles = null) {
  const visibleSet = visibleSourceFiles ? new Set(visibleSourceFiles.map(p => p.replace(/\\/g, '/'))) : null;
  return Array.from(selectedSourceFiles).filter((relPath) => {
    if (visibleSet && !visibleSet.has(relPath)) return false;
    const mod = D?.modules?.find((m) => m.relativePath.replace(/\\/g, '/') === relPath);
    return !!mod && mod.type !== 'test' && mod.featureKeys?.includes(featureKey);
  });
}

function getFileRowsWindow(items, renderKey) {
  if (fileRowsRenderKey !== renderKey) {
    fileRowsRenderKey = renderKey;
    fileRowsRenderLimit = FILE_ROWS_INITIAL_LIMIT;
  }
  const visibleRows = items.slice(0, fileRowsRenderLimit);
  const hiddenRows = Math.max(0, items.length - visibleRows.length);
  return { visibleRows, hiddenRows, hasMoreRows: hiddenRows > 0 };
}

function increaseFileRowsLimit() {
  fileRowsRenderLimit += FILE_ROWS_LIMIT_STEP;
}

function bindFileRowsClick(container) {
  const fileRows = container.querySelector('#fileRows');
  if (!fileRows) return;
  fileRows.onclick = (event) => {

    const moduleId = row.dataset.id;
    const mod = D.modules.find((m) => String(m.id) === moduleId);
    if (mod) openModulePanel(mod);
  };
}

function applyHashRoute() {
  const hash = (window.location.hash || '').replace(/^#/, '');
  if (!hash) {

      drillFeatureKey = null;
      drillTestType = null;
      activePanelKey = null;
    }

  const params = new URLSearchParams(hash);
  const featureKey = params.get('feature');
  if (!featureKey) return;

  if (featureKey === '__unmapped__' || isKnownFeature) {

}

// ─── Agent ────────────────────────────────────────────────────────────────────
let agentRunning = false;
const agentRunningPaths = new Set(); // paths of files currently being processed by agent
const agentQueuedPaths  = new Set(); // paths of files waiting in queue
let agentQueueState = [];
let agentRunsState = [];
let agentActiveRun = null;
let currentRunId = null;

// ─── Console Sessions ─────────────────────────────────────────────────────────
const consoleSessions  = [];   // { id, title, lines, status, startTime }
let activeSessionId    = null; // currently viewed tab
let runningSessionId   = null; // tab that is currently receiving output
const runSessionMap    = new Map(); // runId -> sessionId
const sessionRunMap    = new Map(); // sessionId -> runId
const SESSION_MAX      = 25;
const SESSION_LINE_LIMIT = 3000;
const RENDER_LINE_LIMIT  = 500;  // max DOM nodes rendered at once
const SESSIONS_KEY     = 'viberadar_sessions';
let terminalSearchQuery = '';
let terminalSearchErrorsOnly = false;
let terminalSearchCurrentRunOnly = false;
let terminalSearchRegex = false;
let terminalMatchRefs = [];
let terminalCommandRefs = [];
let terminalErrorRefs = [];
let terminalMatchCursor = -1;
let terminalCommandCursor = -1;
let terminalErrorCursor = -1;

function _sessionId() {
  return 's' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
}

function saveSessions() {
  try {
    const data = consoleSessions.slice(-SESSION_MAX).map(s => ({
      ...s,
      runId: sessionRunMap.get(s.id) || s.runId || null,
      lines: s.lines.slice(-500)
    }));
    localStorage.setItem(SESSIONS_KEY, JSON.stringify(data));
  } catch {}
}

function restoreSessions() {
  try {
    const raw = localStorage.getItem(SESSIONS_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    consoleSessions.push(...saved);
    for (const s of consoleSessions) {
      if (s.runId) {
        runSessionMap.set(s.runId, s.id);
        sessionRunMap.set(s.id, s.runId);
      }
    }
    if (consoleSessions.length > 0) {
      activeSessionId = consoleSessions[consoleSessions.length - 1].id;
      renderTabs();
      renderActiveSession();
    }
  } catch {}
}

function createSession(title, status = 'running', runId = null) {
  if (consoleSessions.length >= SESSION_MAX) {
    const dropped = consoleSessions.shift();
    if (dropped?.id) {
      const droppedRunId = sessionRunMap.get(dropped.id);
      if (droppedRunId) runSessionMap.delete(droppedRunId);
      sessionRunMap.delete(dropped.id);
    }
  }
  const s = { id: _sessionId(), title, lines: [], status, startTime: Date.now(), runId };
  consoleSessions.push(s);
  activeSessionId = s.id;
  if (runId) {
    runSessionMap.set(runId, s.id);
    sessionRunMap.set(s.id, runId);
  }
  document.getElementById('agentPanel').classList.add('open');
  document.getElementById('termBtn').classList.add('term-active');
  renderTabs();
  renderActiveSession();
  saveSessions();
  return s.id;
}

function switchSession(id) {
  activeSessionId = id;
  currentRunId = sessionRunMap.get(id) || null;
  const s = consoleSessions.find(s => s.id === id);
  if (s) {
    const statusText = s.status === 'running' ? 'работает…'
      : s.status === 'ok'    ? '✅ готово'
      : s.status === 'error' ? '❌ ошибка'
      : '';
    document.getElementById('agentPanelTitle').textContent  = s.title;
    document.getElementById('agentPanelStatus').textContent = statusText;
  }
  renderTabs();
  renderActiveSession();
}

function closeSession(id) {
  const idx = consoleSessions.findIndex(s => s.id === id);
  if (idx === -1) return;
  const runId = sessionRunMap.get(id);
  if (runId) {
    sessionRunMap.delete(id);
    runSessionMap.delete(runId);
  }
  consoleSessions.splice(idx, 1);
  if (activeSessionId === id) {
    activeSessionId = consoleSessions.length > 0
      ? consoleSessions[Math.min(idx, consoleSessions.length - 1)].id
      : null;
  }
  renderTabs();
  renderActiveSession();
  saveSessions();
}

function appendToSession(id, lineOrNode, isError = false, isDim = false) {
  const s = consoleSessions.find(s => s.id === id);
  if (!s) return;
  let stored;
  if (typeof lineOrNode === 'string') {
    stored = { text: lineOrNode, isError, isDim };
  } else {
    stored = { html: lineOrNode.outerHTML };
  }
  s.lines.push(stored);
  if (s.lines.length > SESSION_LINE_LIMIT) {
    s.lines.splice(0, s.lines.length - SESSION_LINE_LIMIT);
  }
  if (activeSessionId === id) {
    renderActiveSession();
  }
}

function updateSessionStatus(id, status) {
  const s = consoleSessions.find(s => s.id === id);
  if (!s) return;
  s.status = status;
  renderTabs();
  saveSessions();
}

function renderTabs() {
  const bar = document.getElementById('agentTabsBar');
  if (!bar) return;
  bar.innerHTML = consoleSessions.map(s => {
    const isActive = s.id === activeSessionId;
    const safe = s.title.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return `<div class="agent-tab${isActive ? ' active' : ''}"
        onclick="switchSession('${s.id}')"
        onmousedown="if(event.button===1){event.preventDefault();event.stopPropagation();closeSession('${s.id}')}">
      <span class="tab-dot tab-dot-${s.status}"></span>
      <span class="agent-tab-title" title="${safe}">${safe}</span>
      <button class="agent-tab-close" onclick="event.stopPropagation();closeSession('${s.id}')" title="Закрыть вкладку">×</button>
    </div>`;
  }).join('');
  const active = bar.querySelector('.agent-tab.active');
  if (active) active.scrollIntoView({ block: 'nearest', inline: 'nearest' });
}

function copyTerminalContent() {
  const s = consoleSessions.find(s => s.id === activeSessionId);
  if (!s || s.lines.length === 0) return;
  // Extract plain text from each line (strip HTML for rich nodes)
  const text = s.lines.map(l => {
    if (l.text !== undefined) return l.text;
    if (l.html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = l.html;
      return tmp.innerText;
    }
    return '';
  }).filter(Boolean).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('agentCopyBtn');
    if (!btn) return;
    const prev = btn.textContent;
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = prev; btn.classList.remove('copied'); }, 1500);
  });
}

function downloadTextArtifact(filename, content) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    URL.revokeObjectURL(a.href);
    a.remove();
  }, 100);
}

function getActiveRunForExport() {
  const runId = sessionRunMap.get(activeSessionId) || currentRunId;
  if (runId) {
    const fromState = (agentRunsState || []).find((r) => r.runId === runId);
    if (fromState) return fromState;
  }
  return null;
}

function exportActiveRun() {
  const run = getActiveRunForExport();
  const session = consoleSessions.find((s) => s.id === activeSessionId);
  if (!run && !session) {
    flashToolbarHint('Нечего экспортировать');
    return;
  }
  const mode = window.prompt('Формат экспорта: md или json', 'md');
  const format = (mode || 'md').trim().toLowerCase() === 'json' ? 'json' : 'md';
  const ts = new Date().toISOString().replace(/[:.]/g, '-');
  const runId = run?.runId || sessionRunMap.get(activeSessionId) || 'session';
  if (format === 'json') {
    const payload = {
      run,
      sessionTitle: session?.title || null,
      lines: (session?.lines || []).map((line) => extractLineText(line)),
      exportedAt: new Date().toISOString(),
    };
    downloadTextArtifact(`viberadar-run-${runId}-${ts}.json`, JSON.stringify(payload, null, 2));
    return;
  }
  const lines = (session?.lines || []).map((line) => extractLineText(line)).filter(Boolean);
  const outcomes = Array.isArray(run?.fileOutcomes) ? run.fileOutcomes : [];
  const stats = run?.validationStats || {};
  const md = [
    `# VibeRadar Run Export`,
    ``,
    `- runId: ${run?.runId || runId}`,
    `- title: ${run?.title || session?.title || '-'}`,
    `- phase: ${run?.phase || '-'}`,
    `- exportedAt: ${new Date().toISOString()}`,
    ``,
    `## Validation`,
    ``,
    `- covered: ${stats.covered ?? 0}`,
    `- not-covered: ${stats.notCovered ?? 0}`,
    `- blocked: ${stats.blocked ?? 0}`,
    `- infra: ${stats.infra ?? 0}`,
    ``,
    `## File Outcomes`,
    ``,
    ...outcomes.map((o) => `- ${o.status}: ${o.sourcePath}${o.testFile ? ` -> ${o.testFile}` : ''}${o.reason ? ` (${o.reason})` : ''}`),
    ``,
    `## Logs`,
    ``,
    '```text',
    ...lines,
    '```',
  ].join('\n');
  downloadTextArtifact(`viberadar-run-${runId}-${ts}.md`, md);
}

function renderActiveSession() {
  const term = document.getElementById('agentTerminal');
  if (!term) return;
  term.innerHTML = '';
  terminalMatchRefs = [];
  terminalCommandRefs = [];
  terminalErrorRefs = [];
  terminalMatchCursor = -1;
  terminalCommandCursor = -1;
  terminalErrorCursor = -1;
  const s = consoleSessions.find(s => s.id === activeSessionId);
  if (!s) {
    document.getElementById('agentSearchMeta').textContent = '0 matches';
    updateToolbarButtonsState();
    return;
  }
  const normalizedQuery = (terminalSearchQuery || '').trim();
  let regex = null;
  if (normalizedQuery && terminalSearchRegex) {
    try { regex = new RegExp(normalizedQuery, 'i'); } catch { regex = null; }
  }

  // Cap rendered lines to avoid browser freeze on large agent output
  const allLines = s.lines;
  const renderStart = Math.max(0, allLines.length - RENDER_LINE_LIMIT);
  if (renderStart > 0) {
    const notice = document.createElement('div');
    notice.className = 'agent-line dim';
    notice.textContent = `... показаны последние ${RENDER_LINE_LIMIT} из ${allLines.length} строк ...`;
    term.appendChild(notice);
  }

  for (let i = renderStart; i < allLines.length; i++) {
    const ln = allLines[i];
    const text = extractLineText(ln);
    // Exclude diff lines (+/-) from error detection to avoid false positives
    const isDiffLine = /^[+\-]/.test(text.trimStart());
    const isErrorLine = !!ln.isError || /(^|\s)❌/.test(text) || (!isDiffLine && /\berror\b/i.test(text));
    const isCommandLine = /^\s*⚡\s*\$/.test(text);
    if (terminalSearchCurrentRunOnly && currentRunId && s.runId && s.runId !== currentRunId) continue;
    if (terminalSearchErrorsOnly && !isErrorLine) continue;
    let isMatch = false;
    if (!normalizedQuery) {
      isMatch = false;
    } else if (regex) {
      isMatch = regex.test(text);
    } else {
      isMatch = text.toLowerCase().includes(normalizedQuery.toLowerCase());
    }
    if (normalizedQuery && !isMatch) continue;

    const el = document.createElement('div');
    if (ln.html) {
      el.innerHTML = ln.html;
    } else {
      el.className = 'agent-line' + (ln.isError ? ' err' : ln.isDim ? ' dim' : '');
      el.textContent = ln.text;
    }
    if (isCommandLine) el.classList.add('command');
    if (isMatch) el.classList.add('match');
    el.dataset.lineIndex = String(i);
    term.appendChild(el);
    if (isMatch) terminalMatchRefs.push(el);
    if (isCommandLine) terminalCommandRefs.push(el);
    if (isErrorLine) terminalErrorRefs.push(el);
  }
  term.scrollTop = term.scrollHeight;
  document.getElementById('agentSearchMeta').textContent =
    `${terminalMatchRefs.length} matches • ${terminalCommandRefs.length} commands • ${terminalErrorRefs.length} errors`;
  updateToolbarButtonsState();
}

function updateToolbarButtonsState() {
  const setState = (id, enabled) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.disabled = !enabled;
  };
  setState('btnMatchPrev', terminalMatchRefs.length > 0);
  setState('btnMatchNext', terminalMatchRefs.length > 0);
  setState('btnCmdPrev', terminalCommandRefs.length > 0);
  setState('btnCmdNext', terminalCommandRefs.length > 0);
  setState('btnErrPrev', terminalErrorRefs.length > 0);
  setState('btnErrNext', terminalErrorRefs.length > 0);
  const hasExport = !!getActiveRunForExport() || !!consoleSessions.find((s) => s.id === activeSessionId);
  setState('btnExportRun', hasExport);
}

function flashToolbarHint(text) {
  const meta = document.getElementById('agentSearchMeta');
  if (!meta) return;
  const previous = meta.textContent;
  meta.textContent = text;
  meta.style.color = 'var(--yellow)';
  setTimeout(() => {
    meta.style.color = '';
    if (meta.textContent === text) {
      meta.textContent = previous || '0 matches';
    }
  }, 1400);
}

function extractLineText(line) {
  if (!line) return '';
  if (line.text !== undefined) return String(line.text || '');
  if (line.html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = line.html;
    return tmp.innerText || '';
  }
  return '';
}

function jumpByRefs(refs, dir, cursorName) {
  if (!refs.length) {
    const label = cursorName === 'match' ? 'совпадений' : cursorName === 'command' ? 'команд' : 'ошибок';
    flashToolbarHint(`Нет ${label} для навигации`);
    return;
  }
  if (cursorName === 'match') {
    terminalMatchCursor = (terminalMatchCursor + dir + refs.length) % refs.length;
    refs[terminalMatchCursor].scrollIntoView({ block: 'center', behavior: 'smooth' });
    return;
  }
  if (cursorName === 'command') {
    terminalCommandCursor = (terminalCommandCursor + dir + refs.length) % refs.length;
    refs[terminalCommandCursor].scrollIntoView({ block: 'center', behavior: 'smooth' });
    return;
  }
  terminalErrorCursor = (terminalErrorCursor + dir + refs.length) % refs.length;
  refs[terminalErrorCursor].scrollIntoView({ block: 'center', behavior: 'smooth' });
}

function jumpTerminalMatch(dir) {
  jumpByRefs(terminalMatchRefs, dir > 0 ? 1 : -1, 'match');
}

function jumpCommand(dir) {
  jumpByRefs(terminalCommandRefs, dir > 0 ? 1 : -1, 'command');
}

function jumpError(dir) {
  jumpByRefs(terminalErrorRefs, dir > 0 ? 1 : -1, 'error');
}

// Returns array of normalized relative paths affected by a given task
function getTaskFilePaths(task, featureKey, filePath, selectedFilePaths) {
  if ((task === 'write-tests-file' || task === 'fix-tests') && filePath) {
    return [filePath.replace(/\\/g, '/')];
  }
  if ((task === 'write-tests-selected' || task === 'refresh-tests-selected') && Array.isArray(selectedFilePaths)) {
    return selectedFilePaths.map(p => p.replace(/\\/g, '/'));
  }
  if ((task === 'write-tests' || task === 'fix-tests-all') && featureKey && D?.modules) {
    return D.modules
      .filter(m => m.featureKeys?.includes(featureKey) && m.type !== 'test' && (!m.hasTests || m.testStale))
      .map(m => m.relativePath.replace(/\\/g, '/'));
  }
  return [];
}

// Returns 'running', 'queued', or null for a given relative path
function isFileAgentActive(relPath) {
  const n = relPath.replace(/\\/g, '/');
  if (agentRunningPaths.has(n)) return 'running';
  if (agentQueuedPaths.has(n))  return 'queued';
  return null;
}

function updateQueueBadge(n) {
  document.getElementById('agentQueueCount').textContent = n;
  document.getElementById('agentQueueBadge').style.display = n > 0 ? 'inline' : 'none';
  document.getElementById('agentQueueClearBtn').style.display = n > 0 ? 'inline-block' : 'none';
  renderQueuePanel();
}

function renderQueuePanel() {
  const panel = document.getElementById('agentQueuePanel');
  if (!panel) return;
  if (!Array.isArray(agentQueueState) || agentQueueState.length === 0) {
    panel.style.display = 'none';
    panel.innerHTML = '';
    return;
  }
  panel.style.display = 'block';
  panel.innerHTML = `
    <div class="agent-queue-title">Очередь задач (${agentQueueState.length})</div>
    ${agentQueueState.map((item, idx) => `
      <div class="agent-queue-item">
        <span class="agent-queue-pos">#${item.position ?? idx + 1}</span>
        <span title="${escapeHtml(item.title || '')}">${escapeHtml(item.title || item.task || item.runId)}</span>
        <span style="color:var(--dim)">(${escapeHtml(item.task || 'task')})</span>
        <div class="agent-queue-actions">
          <button class="agent-queue-action" onclick="reorderQueueItem('${item.runId}','up')" title="Сдвинуть вверх">↑</button>
          <button class="agent-queue-action" onclick="reorderQueueItem('${item.runId}','down')" title="Сдвинуть вниз">↓</button>
          <button class="agent-queue-action" onclick="cancelQueueItem('${item.runId}')" title="Отменить задачу">✕</button>
          <button class="agent-queue-action" onclick="retryRun('${item.runId}')" title="Retry">↻</button>
        </div>
      </div>
    `).join('')}
  `;
}

async function cancelQueueItem(runId) {
  await fetch(`/api/queue/${encodeURIComponent(runId)}/cancel`, { method: 'POST' });
  await loadAgentState();
}

async function retryRun(runId) {
  await fetch(`/api/queue/${encodeURIComponent(runId)}/retry`, { method: 'POST' });
  await loadAgentState();
}

async function reorderQueueItem(runId, direction) {
  await fetch(`/api/queue/${encodeURIComponent(runId)}/reorder`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ direction }),
  });
  await loadAgentState();
}

function ensureSessionForRun(run, makeActive = false) {
  if (!run?.runId) return null;
  let sessionId = runSessionMap.get(run.runId);
  if (!sessionId) {
    sessionId = createSession(run.title || `Run ${run.runId}`, run.phase === 'failed' ? 'error' : run.phase === 'completed' ? 'ok' : 'running', run.runId);
    const meta = [`runId: ${run.runId}`, `phase: ${run.phase}`];
    if (Array.isArray(run.targetSourcePaths) && run.targetSourcePaths.length > 0) {
      meta.push(`targets: ${run.targetSourcePaths.length}`);
    }
    appendToSession(sessionId, `ℹ ${meta.join(' • ')}`, false, true);
  }
  if (makeActive) switchSession(sessionId);
  return sessionId;
}

function applyAgentStateSnapshot(state) {
  if (!state) return;
  agentQueueState = Array.isArray(state.queue) ? state.queue : [];
  agentRunsState = Array.isArray(state.runs) ? state.runs : [];
  agentActiveRun = state.activeRun || null;
  updateQueueBadge(agentQueueState.length);
  if (agentActiveRun?.runId) {
    currentRunId = agentActiveRun.runId;
    ensureSessionForRun(agentActiveRun);
    setAgentRunning(['starting', 'running', 'validating'].includes(agentActiveRun.phase));
  } else {
    setAgentRunning(false);
  }
}

async function loadAgentState() {
  try {
    const res = await fetch('/api/agent/state');
    if (!res.ok) return;
    const state = await res.json();
    applyAgentStateSnapshot(state);
  } catch {}
}

function upsertRunState(run) {
  if (!run?.runId) return;
  const idx = agentRunsState.findIndex((r) => r.runId === run.runId);
  if (idx >= 0) agentRunsState[idx] = { ...agentRunsState[idx], ...run };
  else agentRunsState.push(run);
  if (agentRunsState.length > 80) {
    agentRunsState = agentRunsState.slice(agentRunsState.length - 80);
  }
}

function updateSessionFromRun(run) {
  if (!run?.runId) return;
  upsertRunState(run);
  if (['starting', 'running', 'validating'].includes(run.phase)) {
    setAgentRunning(true);
    currentRunId = run.runId;
    const sid = ensureSessionForRun(run);
    if (sid) {
      runningSessionId = sid;
      if (activeSessionId === sid) {
        document.getElementById('agentPanelTitle').textContent = '🤖 ' + (run.title || 'Agent');
        document.getElementById('agentPanelStatus').textContent = run.phase === 'validating' ? 'проверяю…' : 'работает…';
      }
    }
    return;
  }
  const sid = runSessionMap.get(run.runId);
  if (sid) {
    const status = run.phase === 'completed' ? 'ok' : run.phase === 'canceled' ? 'error' : run.phase === 'failed' ? 'error' : 'info';
    updateSessionStatus(sid, status);
    if (runningSessionId === sid) runningSessionId = null;
    if (activeSessionId === sid) {
      document.getElementById('agentPanelStatus').textContent =
        run.phase === 'completed' ? '✅ готово' : run.phase === 'canceled' ? '⏹ отменено' : run.phase === 'failed' ? '❌ ошибка' : run.phase;
    }
  }
  if (run.phase === 'completed' || run.phase === 'failed' || run.phase === 'canceled') {
    if (agentActiveRun?.runId === run.runId) agentActiveRun = null;
    if (currentRunId === run.runId) currentRunId = null;
    setAgentRunning(false);
  }
}

function refreshPathActivityFromState() {
  agentQueuedPaths.clear();
  (agentQueueState || []).forEach((q) => {
    getTaskFilePaths(q.task, q.featureKey, q.filePath, q.selectedFilePaths).forEach((p) => agentQueuedPaths.add(p));
  });
  if (!agentActiveRun || !['starting', 'running', 'validating'].includes(agentActiveRun.phase)) {
    agentRunningPaths.clear();

function obsUpdateSelectedCount(groupId) {
  const container = document.getElementById('obs-detail-' + groupId);
  if (!container) return;
  const checked = container.querySelectorAll('input[type="checkbox"]:checked').length;
  const btn = container.querySelector('.obs-run-selected');
  if (btn) {
    const baseLabel = btn.dataset.baseLabel || btn.textContent.replace(/\s*\(\d+\)$/, '');
    btn.dataset.baseLabel = baseLabel;
    btn.textContent = checked > 0 ? `${baseLabel} (${checked})` : baseLabel;
    btn.disabled = checked === 0;
  }
  // Update floating action bar
  const bar = document.getElementById('obsFloatingBar');
  if (!bar) return;
  if (checked > 0) {
    const action = container.dataset.obsAction || '';
    const actionLabels = { missing: 'добавить логи', field: 'обогатить поля', rec: 'исправить' };
    const groupLabel = container.dataset.obsLabel || '';
    bar.dataset.groupId = groupId;
    document.getElementById('obsFloatingCount').textContent = `${checked} выбрано`;
    document.getElementById('obsFloatingLabel').textContent = groupLabel;
    document.getElementById('obsFloatingBtn').textContent = actionLabels[action] || 'исправить';
    bar.classList.add('visible');
  } else {
    if (bar.dataset.groupId === groupId) {
      bar.classList.remove('visible');
      delete bar.dataset.groupId;
    }
  }
}

function obsDispatchFloating() {
  const bar = document.getElementById('obsFloatingBar');
  if (!bar) return;
  const groupId = bar.dataset.groupId;
  if (!groupId) return;
  const container = document.getElementById('obs-detail-' + groupId);
  if (!container) return;
  const action = container.dataset.obsAction || '';
  if (action === 'missing') {
    obsMissingRunSelected(groupId);
  } else {
    const meta = container.dataset.obsMeta ? JSON.parse(container.dataset.obsMeta) : {};
    obsRunSelected(groupId, 'obs-fix-selected', meta);
  }
  bar.classList.remove('visible');
}

function obsTimeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return `${s}с назад`;
  if (s < 3600) return `${Math.floor(s / 60)} мин назад`;
  if (s < 86400) return `${Math.floor(s / 3600)}ч назад`;
  return `${Math.floor(s / 86400)}д назад`;
}

function obsResetBaseline(key) {
  try { localStorage.removeItem('vr_obs_bl_' + key); } catch(e) {}
  const c = document.getElementById('content');

}

function obsFloatingDismiss() {
  const bar = document.getElementById('obsFloatingBar');
  if (!bar) return;
  const groupId = bar.dataset.groupId;
  if (groupId) {
    const container = document.getElementById('obs-detail-' + groupId);
    if (container) {
      container.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      const btn = container.querySelector('.obs-run-selected');
      if (btn) { btn.textContent = btn.dataset.baseLabel || btn.textContent.replace(/\s*\(\d+\)$/, ''); btn.disabled = true; }
    }
    delete bar.dataset.groupId;
  }
  bar.classList.remove('visible');
}

function obsToggleAll(groupId) {
  const container = document.getElementById('obs-detail-' + groupId);
  if (!container) return;
  const boxes = container.querySelectorAll('input[type="checkbox"]');
  const allChecked = Array.from(boxes).every(b => b.checked);
  boxes.forEach(b => b.checked = !allChecked);
  obsUpdateSelectedCount(groupId);
}

function obsRunSelected(groupId, task, baseMeta) {
  const container = document.getElementById('obs-detail-' + groupId);
  if (!container) return;
  const indices = [];
  container.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
    indices.push(parseInt(cb.dataset.idx, 10));
  });
  if (indices.length === 0) return;
  runAgentTask('obs-fix-selected', null, null, null, { ...baseMeta, catalogIndices: indices });
}

function obsMissingRunSelected(groupId) {
  const container = document.getElementById('obs-detail-' + groupId);
  if (!container) return;
  const indices = [];
  container.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.missingIdx, 10);
    if (!isNaN(idx)) indices.push(idx);
  });
  if (indices.length === 0) return;
  runAgentTask('obs-fix-selected', null, null, null, { missingLogIndices: indices, recommendationType: 'add event' });

function pluralFiles(n) {
  const m10 = n % 10, m100 = n % 100;
  if (m100 >= 11 && m100 <= 14) return 'файлов';
  if (m10 === 1) return 'файл';
  if (m10 >= 2 && m10 <= 4) return 'файла';
