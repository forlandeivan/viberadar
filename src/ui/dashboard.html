3. \`export default function() { ... }\` с проверками \`check()\`
4. Если нужна авторизация — добавь заголовок Authorization (Bearer-токен как переменную __ENV.TOKEN)
5. Если нужна загрузка файла — используй \`http.file()\` и \`open()\`
6. Добавь \`sleep(1)\` между запросами
7. Добавь комментарий в начале: что тестируется и какой эндпоинт

**Шаг 3 — сохрани ТОЛЬКО скрипт в файл.**
Запиши итоговый JavaScript-код в файл: \`.viberadar/load-script-generated.js\`
Никаких объяснений снаружи кода — только чистый JS.`;

  loadAiGenerating = true;
  loadAiPromptDraft = userPrompt;
  const statusEl = document.getElementById('loadAiStatus');
  const btnEl = document.getElementById('loadAiGenBtn');
  if (statusEl) statusEl.textContent = '⏳ Агент генерирует скрипт… следи в терминале ↓';
  if (btnEl) btnEl.disabled = true;

  document.getElementById('agentPanel').classList.add('open');
  document.getElementById('termBtn').classList.add('term-active');

  try {
    const r = await fetch('/api/run-agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task: 'custom-prompt', prompt: task }),
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      loadAiGenerating = false;
      if (statusEl) statusEl.textContent = '❌ Ошибка запуска агента: ' + (d.error || r.status);
      if (btnEl) btnEl.disabled = false;
    }
  } catch (e) {
    loadAiGenerating = false;
    if (statusEl) statusEl.textContent = '❌ Ошибка: ' + e.message;
    if (btnEl) btnEl.disabled = false;
  }
}

async function loadFetchAiScript() {
  try {
    const r = await fetch('/api/load/ai-script');
    if (!r.ok) return false;
    const d = await r.json();
    if (d.script) {
      loadScriptDraft = d.script;
      const ta = document.getElementById('loadScriptEditor');
      if (ta) { ta.value = d.script; ta.style.borderColor = '#8b5cf6'; setTimeout(() => { ta.style.borderColor = ''; }, 2000); }
      const statusEl = document.getElementById('loadAiStatus');
      if (statusEl) statusEl.textContent = '✅ Скрипт загружен в редактор';
      return true;
    }
  } catch {}
  return false;
}

async function loadRefreshScripts() {
  try {
    const r = await fetch('/api/load/scripts');
    if (!r.ok) return;
    loadSavedScripts = await r.json();
    renderContent();
  } catch {}
}

async function loadSaveScript() {
  const nameEl = document.getElementById('loadScriptName');
  const name = (nameEl ? nameEl.value : loadScriptNameDraft).trim();
  if (!name) { alert('Введи название скрипта'); nameEl && nameEl.focus(); return; }
  const taEl = document.getElementById('loadScriptEditor');
  const script = taEl ? taEl.value : loadScriptDraft;
  if (!script.trim()) { alert('Скрипт пустой'); return; }
  loadScriptNameDraft = name;
  try {
    const r = await fetch('/api/load/scripts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, script }),
    });
    if (!r.ok) { const d = await r.json().catch(() => ({})); alert('Ошибка: ' + (d.error || r.status)); return; }
    await loadRefreshScripts();
    // flash save button
    const btn = document.querySelector('.load-save-row .load-btn');
    if (btn) { const orig = btn.textContent; btn.textContent = '✅ Сохранено'; btn.style.color = 'var(--green)'; setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500); }
  } catch (e) { alert('Ошибка: ' + e.message); }
}

async function loadLoadScript(name) {
  const s = loadSavedScripts.find(x => x.name === name);
  if (!s) return;
  loadScriptDraft = s.script;
  loadScriptNameDraft = s.name;
  const ta = document.getElementById('loadScriptEditor');
  if (ta) { ta.value = s.script; ta.style.borderColor = 'var(--blue)'; setTimeout(() => { ta.style.borderColor = ''; }, 1500); }
  const nameEl = document.getElementById('loadScriptName');
  if (nameEl) nameEl.value = s.name;
}

async function loadDeleteScript(name) {
  if (!confirm(`Удалить скрипт «${name}»?`)) return;
  try {
    const r = await fetch('/api/load/scripts/' + encodeURIComponent(name), { method: 'DELETE' });
    if (!r.ok) { const d = await r.json().catch(() => ({})); alert('Ошибка: ' + (d.error || r.status)); return; }
    await loadRefreshScripts();
  } catch (e) { alert('Ошибка: ' + e.message); }
}

function connectSSE() {
  const es = new EventSource('/api/events');

  es.onopen = () => {
    setLiveDot('#3fb950', 'Live — автообновление включено');
    void loadAgentState();
  };

  es.addEventListener('data-updated', () => {
    setLiveDot('#e3b341', 'Обновляю данные…');
    scheduleRefreshData();
  });

  es.addEventListener('rescan-error', () => {
    if (rescanPending) {
      rescanPending = false;
      const btn = document.getElementById('rescanBtn');
      const statusEl = document.getElementById('rescanStatus');
      if (btn) btn.classList.remove('spinning');
      if (statusEl) { statusEl.className = 'status-error'; statusEl.textContent = '⚠ ошибка сканирования'; }
    }
  });

  es.addEventListener('agent-queue-updated', (e) => {
    const payload = JSON.parse(e.data || '{}');
    agentQueueState = Array.isArray(payload.queue) ? payload.queue : [];
    refreshPathActivityFromState();
    updateQueueBadge(agentQueueState.length);
    renderContent();
  });

  es.addEventListener('agent-run-created', (e) => {
    const { run } = JSON.parse(e.data || '{}');
    upsertRunState(run);
  });

  es.addEventListener('agent-run-updated', (e) => {
    const { run } = JSON.parse(e.data || '{}');
    if (!run) return;
    if (run.runId && agentQueueState.length > 0) {
      agentQueueState = agentQueueState.filter((q) => q.runId !== run.runId || run.phase === 'queued');
      updateQueueBadge(agentQueueState.length);
    }
    if (['starting', 'running', 'validating'].includes(run.phase)) {
      agentActiveRun = run;
      const startedPaths = getTaskFilePaths(run.task, run.featureKey, run.filePath, run.selectedFilePaths);
      startedPaths.forEach((p) => { agentQueuedPaths.delete(p); agentRunningPaths.add(p); });
      renderContent();
    }
    updateSessionFromRun(run);
  });

  es.addEventListener('agent-run-finished', (e) => {
    const { run } = JSON.parse(e.data || '{}');
    if (!run) return;
    updateSessionFromRun(run);
    refreshPathActivityFromState();
    renderContent();
  });

  es.addEventListener('agent-queued', (e) => {
    const { runId, queueLength, title, task, featureKey, filePath, selectedFilePaths } = JSON.parse(e.data);
    updateQueueBadge(queueLength);
    document.getElementById('agentPanel').classList.add('open');
    document.getElementById('termBtn').classList.add('term-active');
    // Track queued paths for spinner
    getTaskFilePaths(task, featureKey, filePath, selectedFilePaths).forEach(p => agentQueuedPaths.add(p));
    renderContent();
    // Append queue notification to the currently running session (or active)
    const targetId = runId ? (runSessionMap.get(runId) || runningSessionId || activeSessionId) : (runningSessionId || activeSessionId);
    if (targetId) {
      appendToSession(targetId, `📋 В очереди (${queueLength}): ${title}`, false);
    }
    void loadAgentState();
  });

  es.addEventListener('agent-started', (e) => {
    setAgentRunning(true);
    const { runId, title, queueLength = 0, task, featureKey, filePath, selectedFilePaths } = JSON.parse(e.data);
    updateQueueBadge(queueLength);
    currentRunId = runId || null;
    // Move paths from queued → running (current task)
    const startedPaths = getTaskFilePaths(task, featureKey, filePath, selectedFilePaths);
    startedPaths.forEach(p => { agentQueuedPaths.delete(p); agentRunningPaths.add(p); });
    renderContent();
    // Close PREVIOUS session only if it belongs to a different run (queue case: agent-done not fired between tasks)
    if (runningSessionId) {
      const prev = consoleSessions.find(s => s.id === runningSessionId);
      if (prev && prev.status === 'running' && prev.runId !== runId) updateSessionStatus(runningSessionId, 'ok');
    }
    const id = runId ? ensureSessionForRun({ runId, title, phase: 'running' }, true) : createSession(title);
    runningSessionId = id;
    document.getElementById('agentPanelTitle').textContent = '🤖 ' + title;
    document.getElementById('agentPanelStatus').textContent = 'запускаю…';
  });

  es.addEventListener('agent-output', (e) => {
    const { runId, line, isError, isDim } = JSON.parse(e.data);
    let targetId = runningSessionId;
    if (runId) {
      targetId = runSessionMap.get(runId) || ensureSessionForRun({ runId, title: `Run ${runId}`, phase: 'running' });
      if (targetId) runningSessionId = targetId;
    }
    if (targetId) {
      appendToSession(targetId, line, !!isError, !!isDim);
      if (activeSessionId === targetId) {
        document.getElementById('agentPanelStatus').textContent = 'работает…';
      }
    } else {
      appendTerminalLine(line, !!isError, !!isDim);
    }
    // Update doc actualize status bar with latest line
    if (docActualizeRunningKey) {
      const el = document.getElementById('docActualizeStatus');
      if (el && el.style.display !== 'none' && line && !isDim) {
        const clean = line.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        el.innerHTML = `⏳ ${clean}`;
      }
    }
  });

  es.addEventListener('agent-done', () => {
    setAgentRunning(false);
    if (agentQueueState.length === 0) updateQueueBadge(0);
    agentRunningPaths.clear();
    if (runningSessionId) {
      updateSessionStatus(runningSessionId, 'ok');
      if (activeSessionId === runningSessionId) {
        document.getElementById('agentPanelStatus').textContent = '✅ готово';
      }
      runningSessionId = null;
    }
    if (docActualizeRunningKey) {
      setDocActualizeStatus(null, null);
      docActualizeRunningKey = null;
    }
    // Auto-load AI-generated k6 script if we were waiting for one
    if (loadAiGenerating) {
      loadAiGenerating = false;
      loadFetchAiScript().then(ok => {
        if (!ok) {
          const statusEl = document.getElementById('loadAiStatus');
          if (statusEl) statusEl.textContent = '⚠️ Агент завершил, но файл не найден — возможно скрипт в терминале, скопируй вручную';
        }
        const btnEl = document.getElementById('loadAiGenBtn');
        if (btnEl) btnEl.disabled = false;
      });
    }
    renderContent();
  });

  es.addEventListener('agent-summary', (e) => {
    const {
      runId,
      validationStats = null,
      passed = 0, failed = 0, files = [],
      testedFileCount = files.length,
      passedFileCount = Math.max(0, testedFileCount - (failed > 0 ? 1 : 0)),
      failedFileCount = failed > 0 ? 1 : 0,
      autoFixQueued = false,
    } = JSON.parse(e.data);
    const coverageOk = !validationStats || ((validationStats.notCovered || 0) === 0 && (validationStats.blocked || 0) === 0);
    const allOk = failed === 0 && coverageOk;
    const box = document.createElement('div');
    box.style.cssText = `
      margin: 10px 0 4px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid ${allOk ? 'var(--green)' : 'var(--red)'};
      background: ${allOk ? '#0d2a1a' : '#2a0d0d'};
      font-family: inherit;
    `;
    box.innerHTML = `
      <div style="font-size:13px;font-weight:700;color:${allOk ? 'var(--green)' : 'var(--red)'}">
        ${allOk ? '✅' : '⚠️'} Тесты: ${allOk ? 'всё ок' : 'есть падения'}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">
        Файлы: ${testedFileCount} • passed: ${passedFileCount} • failed: ${failedFileCount}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">
        Тест-кейсы: ${passed} passed${failed > 0 ? ` • ${failed} failed` : ''}
      </div>
      ${validationStats ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">Coverage matrix: covered ${validationStats.covered || 0} • not-covered ${validationStats.notCovered || 0} • blocked ${validationStats.blocked || 0}</div>` : ''}
      ${autoFixQueued ? `<div style="font-size:11px;color:var(--yellow);margin-top:4px">🛠️ Автоисправление поставлено в очередь</div>` : ''}
      ${files.map(f => `<div style="font-size:11px;color:var(--dim);margin-top:3px">📄 ${f}</div>`).join('')}
    `;
    const targetId = runId ? (runSessionMap.get(runId) || runningSessionId || activeSessionId) : (runningSessionId || activeSessionId);
    if (targetId) {
      appendToSession(targetId, box);
      // Mark session status from test results immediately
      if (runningSessionId === targetId) {
        updateSessionStatus(targetId, failed > 0 ? 'error' : 'ok');
      }
    }
  });

  es.addEventListener('agent-error', (e) => {
    const { runId, message, authRequired, notInstalled } = JSON.parse(e.data);
    if (!runId) setAgentRunning(false);
    agentRunningPaths.clear();
    agentQueuedPaths.clear();
    if (docActualizeRunningKey) {
      const el = document.getElementById('docActualizeStatus');
      if (el) { el.style.background = 'rgba(248,81,73,0.08)'; el.style.borderColor = 'rgba(248,81,73,0.2)'; el.style.color = 'var(--red)'; el.innerHTML = `✗ Ошибка: ${escapeHtml(message || 'агент завершился с ошибкой')}`; }
      docActualizeRunningKey = null;
    }
    renderContent();

    // Build error node (plain text or auth/install box)
    let node = null;
    if (authRequired || notInstalled) {
      node = document.createElement('div');
      node.style.cssText = 'margin:10px 0 4px;padding:10px 14px;border-radius:8px;border:1px solid var(--red);background:#2a0d0d;font-family:inherit;';
      node.innerHTML = `
        <div style="font-size:13px;font-weight:700;color:var(--red)">❌ ${message || 'Ошибка агента'}</div>
        ${authRequired ? `<button onclick="reauthAgent()" style="margin-top:8px;padding:4px 12px;font-size:12px;background:none;border:1px solid var(--yellow);color:var(--yellow);border-radius:4px;cursor:pointer;">🔑 Перелогиниться</button>` : ''}
        ${notInstalled ? `<div style="margin-top:6px;font-size:11px;color:var(--dim)">После установки перезапусти viberadar</div>` : ''}
      `;
    }

    // If no session exists yet (startup check fires before any run), create one
    const targetId = (runId ? (runSessionMap.get(runId) || ensureSessionForRun({ runId, title: `Run ${runId}`, phase: 'failed' })) : runningSessionId) || (() => {
      if (authRequired || notInstalled) {
        const id = createSession('⚠️ Проверка агента', 'error');
        return id;
      }
      return activeSessionId;
    })();

    if (targetId) {
      if (node) {
        appendToSession(targetId, node);
      } else {
        appendToSession(targetId, '❌ ' + (message || 'Ошибка агента'), true);
      }
      updateSessionStatus(targetId, 'error');
      if (activeSessionId === targetId) {
        document.getElementById('agentPanelStatus').textContent = '❌ ошибка';
      }
    }
    if (!runId && runningSessionId) runningSessionId = null;
  });

  es.addEventListener('tests-started', (e) => {
    const { testType, count } = JSON.parse(e.data);
    const label = testType === 'all' ? 'Все тесты' : `🧪 ${testType}`;
    const id = createSession(label);
    runningSessionId = id;
    appendToSession(id, `Запускаю ${testType === 'all' ? 'все' : testType} тесты (${count} файлов)…`);
    document.getElementById('agentPanelTitle').textContent = label;
    document.getElementById('agentPanelStatus').textContent = `запускаю ${count} файлов…`;
    if (testType === 'all') {
      document.getElementById('agentPanel').classList.add('open');
      document.getElementById('termBtn').classList.add('term-active');
    }
  });

  es.addEventListener('tests-done', (e) => {
    const { passed, failed, testErrors } = JSON.parse(e.data);
    const status = failed === 0 ? 'ok' : 'error';
    // Update Run All button state
    runAllRunning = false;
    updateRunAllBtn(failed === 0 ? 'done-ok' : 'done-fail');
    if (runningSessionId) {
      updateSessionStatus(runningSessionId, status);
      if (activeSessionId === runningSessionId) {
        document.getElementById('agentPanelStatus').textContent =
          failed === 0 ? `✅ ${passed} passed` : `⚠️ ${passed} passed, ${failed} failed`;
      }
      runningSessionId = null;
    }
    D.testErrors = testErrors || {};
    renderContent();
  });

  es.addEventListener('e2e-plan-generating', (e) => {
    const { featureKey } = JSON.parse(e.data);
    if (drillFeatureKey === featureKey && drillTestType === 'e2e') {
      e2ePlanLoading = true;
      renderContent();
    }
  });

  es.addEventListener('e2e-plan-ready', (e) => {
    const { featureKey, plan } = JSON.parse(e.data);
    if (drillFeatureKey === featureKey) {
      e2ePlan = plan;
      e2ePlanLoading = false;
      if (drillTestType === 'e2e') renderContent();
    }
  });

  es.addEventListener('e2e-plan-error', (e) => {
    const { featureKey, message } = JSON.parse(e.data);
    e2ePlanLoading = false;
    if (drillFeatureKey === featureKey && drillTestType === 'e2e') {
      renderContent();
      setTimeout(() => alert('Ошибка генерации плана: ' + message), 100);
    }
  });

  es.addEventListener('e2e-tests-done', (e) => {
    const { featureKey, plan } = JSON.parse(e.data);
    if (drillFeatureKey === featureKey) {
      e2ePlan = plan;
      if (drillTestType === 'e2e') renderContent();
    }
  });

  // ── Load test SSE events ────────────────────────────────────────────────────
  es.addEventListener('load-started', (e) => {
    const { config } = JSON.parse(e.data);
    loadState = { status: 'running', startTime: Date.now(), buckets: [], totalRequests: 0, totalErrors: 0, logs: [], script: config?.script || '', config, summary: null };
    loadBuckets = [];
    loadLogLines = [];
    if (contextMode === 'load') { renderSidebar(); renderContent(); }
  });

  es.addEventListener('load-log', (e) => {
    const { line } = JSON.parse(e.data);
    loadLogLines.push(line);
    if (loadLogLines.length > 500) loadLogLines.shift();
    if (contextMode === 'load') {
      const logEl = document.getElementById('loadLogContent');
      if (logEl) {
        const div = document.createElement('div');
        div.className = 'load-log-line';
        div.textContent = line;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
      }
    }
  });

  es.addEventListener('load-progress', (e) => {
    const { buckets, total, errors } = JSON.parse(e.data);
    loadBuckets = buckets || [];
    if (loadState) { loadState.totalRequests = total || 0; loadState.totalErrors = errors || 0; }
    if (contextMode === 'load') { drawLoadCharts(); renderSidebar(); }
  });

  es.addEventListener('load-done', (e) => {
    const { status, summary } = JSON.parse(e.data);
    if (loadState) { loadState.status = status; loadState.summary = summary || null; loadState.endTime = Date.now(); }
    if (contextMode === 'load') { renderSidebar(); renderContent(); }
  });

  es.onerror = () => {
    setLiveDot('var(--dim)', 'Нет соединения — переподключаюсь…');
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

init().then(async () => {
  restoreSessions();
  await loadAgentState();
  connectSSE();
  applyTerminalFiltersFromUi();
  updateToolbarButtonsState();
  // Sync content padding with terminal panel open state automatically
  new MutationObserver(() => {
    const isOpen = document.getElementById('agentPanel').classList.contains('open');
    document.getElementById('content').classList.toggle('panel-open', isOpen);
  }).observe(document.getElementById('agentPanel'), { attributes: true, attributeFilter: ['class'] });
});
