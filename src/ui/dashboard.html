<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeRadar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --bg-card:  #161b22;
      --bg-hover: #1c2230;
      --border:   #21262d;
      --text:     #e6edf3;
      --muted:    #7d8590;
      --dim:      #484f58;
      --blue:     #58a6ff;
      --green:    #3fb950;
      --red:      #f85149;
      --yellow:   #e3b341;
    }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header-project { margin-left: auto; font-size: 13px; color: var(--muted); }
    .header-time    { font-size: 12px; color: var(--dim); }

    /* ── Coverage button ─────────────────────────────────────────────────────── */
    #covBtn {
      padding: 5px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      white-space: nowrap;
    }
    #covBtn:hover:not(:disabled) { background: var(--bg-hover); color: var(--text); border-color: var(--dim); }
    #covBtn:disabled              { cursor: not-allowed; opacity: 0.7; }
    #covBtn.cov-running  { color: var(--yellow); border-color: var(--yellow); }
    #covBtn.cov-error    { color: var(--red);    border-color: var(--red); }
    #covBtn.cov-done     { color: var(--green);  border-color: var(--green); }
    #termBtn {
      padding: 5px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      white-space: nowrap;
    }
    #termBtn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--dim); }
    #termBtn.term-active { color: var(--accent); border-color: var(--accent); }

    /* ── Stats bar ───────────────────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 28px;
      padding: 12px 20px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-value { font-size: 20px; font-weight: 700; color: var(--blue); }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── Layout ──────────────────────────────────────────────────────────────── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────────────────────────── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .view-tabs {
      display: flex;
      background: var(--bg);
      border-radius: 6px;
      padding: 3px;
      gap: 2px;
    }
    .view-tab {
      flex: 1;
      padding: 5px 0;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .view-tab.active { background: var(--bg-card); color: var(--text); }
    .view-tab.disabled { opacity: 0.4; pointer-events: none; }

    .sidebar-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 6px;
    }

    .search-input {
      width: 100%;
      padding: 7px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .search-input:focus { border-color: var(--blue); }
    .search-input::placeholder { color: var(--dim); }

    .type-filter {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
    }
    .type-filter:hover { background: var(--border); color: var(--text); }
    .type-filter.active { background: var(--border); color: var(--text); }
    .type-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .type-count { margin-left: auto; font-size: 11px; color: var(--dim); }

    /* ── Content area ────────────────────────────────────────────────────────── */
    .content { flex: 1; overflow-y: auto; padding: 18px 20px; }

    /* ── Feature cards ───────────────────────────────────────────────────────── */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .feature-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      overflow: hidden;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
    }
    .feature-card:hover    { background: var(--bg-hover); transform: translateY(-1px); }
    .feature-card.active   { background: var(--bg-hover); border-color: #30363d; }

    .feature-accent { width: 4px; flex-shrink: 0; }

    .feature-body { padding: 14px 16px; flex: 1; min-width: 0; }

    .feature-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .feature-file-count { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

    .feature-desc {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.4;
    }

    .feature-progress-wrap { display: flex; align-items: center; gap: 8px; }
    .feature-progress-bar {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .feature-progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .feature-progress-label { font-size: 11px; color: var(--muted); white-space: nowrap; }

    /* ── No config banner ────────────────────────────────────────────────────── */
    .no-config {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .no-config-icon { font-size: 48px; }
    .no-config h2   { font-size: 18px; color: var(--text); }
    .no-config p    { font-size: 14px; max-width: 420px; line-height: 1.6; }
    .no-config-cmd  {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 28px;
      font-family: monospace;
      font-size: 15px;
      color: var(--blue);
    }

    /* ── Module grid (Files view) ────────────────────────────────────────────── */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }

    .module-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .module-card:hover  { border-color: var(--blue); transform: translateY(-1px); }
    .module-card.active { border-color: var(--blue); background: var(--bg-hover); }

    .module-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      word-break: break-all;
    }
    .module-path { font-size: 11px; color: var(--dim); margin-bottom: 8px; word-break: break-all; }
    .module-meta { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--muted); }

    /* ── Badges ──────────────────────────────────────────────────────────────── */
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
    .badge-green { background: #1a3a2a; color: var(--green); }
    .badge-red   { background: #3a1a1a; color: var(--red); }
    .badge-gray  { background: var(--border); color: var(--muted); }

    .cov-bar  { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
    .cov-fill { height: 100%; border-radius: 2px; }

    /* ── Right panel ─────────────────────────────────────────────────────────── */
    .panel {
      position: fixed;
      top: 0; right: 0;
      width: 420px;
      height: 100vh;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 100;
      padding: 20px;
    }
    .panel.open { transform: translateX(0); }

    .panel-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 5px 8px;
      border-radius: 4px;
      line-height: 1;
    }
    .panel-close:hover { background: var(--border); color: var(--text); }

    .panel-title    { font-size: 17px; font-weight: 700; padding-right: 36px; margin-bottom: 4px; }
    .panel-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }

    .panel-stats {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-stat      { flex: 1; text-align: center; }
    .panel-stat-val  { font-size: 22px; font-weight: 700; }
    .panel-stat-lbl  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .panel-section       { margin-bottom: 20px; }
    .panel-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }

    .file-list { display: flex; flex-direction: column; gap: 3px; }
    .file-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 10px;
      background: var(--bg);
      border-radius: 6px;
      font-size: 12px;
    }
    .file-item-icon { font-size: 11px; flex-shrink: 0; padding-top: 2px; }
    .file-item-name { font-weight: 600; color: var(--text); word-break: break-all; line-height: 1.3; }
    .file-item-dir  { color: var(--dim); font-size: 11px; word-break: break-all; }

    .cov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .cov-metric { background: var(--bg); border-radius: 6px; padding: 10px; text-align: center; }
    .cov-metric-val { font-size: 20px; font-weight: 700; }
    .cov-metric-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row-right { font-size: 11px; color: var(--muted); text-align: right; max-width: 60%; word-break: break-all; }

    .dep-item {
      font-size: 12px;
      color: var(--muted);
      padding: 3px 8px;
      background: var(--bg);
      border-radius: 4px;
      font-family: monospace;
    }

    /* ── Feature drill-down ──────────────────────────────────────────────────── */
    .drill-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .back-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      padding: 5px 12px;
      font-size: 12px;
      flex-shrink: 0;
      transition: background 0.1s, color 0.1s;
    }
    .back-btn:hover { background: var(--border); color: var(--text); }
    .drill-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 17px; font-weight: 700;
    }
    .drill-stats {
      display: flex; gap: 16px;
      font-size: 12px; color: var(--muted);
      margin-left: auto;
    }
    .drill-desc {
      font-size: 13px; color: var(--muted);
      margin-bottom: 14px; line-height: 1.5;
    }
    .drill-section-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--muted);
      margin: 14px 0 6px;
    }

    /* ── Test-type cards inside feature detail ───────────────────────────────── */
    .test-type-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .test-type-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
    }
    .test-type-card:hover { background: var(--bg-hover); border-color: var(--dim); }
    .test-type-card .tt-accent {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .test-type-card .tt-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--muted); margin-bottom: 6px; margin-top: 2px;
    }
    .test-type-card .tt-count {
      font-size: 26px; font-weight: 700; line-height: 1;
      margin-bottom: 4px;
    }
    .test-type-card .tt-sub {
      font-size: 11px; color: var(--dim);
    }
    .test-type-card.tt-empty .tt-count { color: var(--dim); }
    .test-type-card.tt-empty { opacity: 0.7; }
    .test-type-card.tt-active {
      background: var(--bg-hover);
      border-width: 2px;
    }
    .file-rows { display: flex; flex-direction: column; gap: 2px; }
    .file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.1s;
    }
    .file-row:hover  { background: var(--bg-card); }
    .file-row.active { background: var(--bg-hover); border-left: 2px solid var(--blue); padding-left: 8px; }
    .file-row-icon { font-size: 12px; flex-shrink: 0; }
    .file-row-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .file-row-dir  { font-size: 11px; color: var(--dim); margin-left: auto; white-space: nowrap; flex-shrink: 0; }
    .file-row-agent-btn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      font-size: 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--dim);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .file-row:hover .file-row-agent-btn { border-color: var(--accent); color: var(--accent); }
    .file-row-agent-btn:hover { background: var(--accent); color: #000 !important; border-color: var(--accent); }
    .file-row-agent-btn.stale { border-color: var(--yellow); color: var(--yellow); }
    .file-row-agent-btn.stale:hover { background: var(--yellow) !important; color: #000 !important; }

    /* ── Agent setup banner ──────────────────────────────────────────────────── */
    .agent-setup-banner {
      background: linear-gradient(135deg, #161b22 0%, #1c2230 100%);
      border: 1px solid var(--blue);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
    }
    .agent-setup-banner h3 { font-size: 15px; margin-bottom: 6px; }
    .agent-setup-banner p  { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .agent-choices { display: flex; gap: 10px; justify-content: center; }
    .agent-choice-btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .agent-choice-btn:hover { background: var(--bg-hover); border-color: var(--blue); transform: translateY(-1px); }

    /* ── Agent card button ───────────────────────────────────────────────────── */
    .agent-card-btn {
      margin-top: 10px;
      padding: 5px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--blue);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      width: 100%;
      text-align: left;
    }
    .agent-card-btn:hover { background: var(--bg-hover); border-color: var(--blue); }
    .agent-card-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Agent terminal panel ────────────────────────────────────────────────── */
    .agent-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 280px;
      background: #090d13;
      border-top: 1px solid var(--border);
      transform: translateY(100%);
      transition: transform 0.25s ease;
      z-index: 200;
      display: flex;
      flex-direction: column;
    }
    .agent-panel.open { transform: translateY(0); }
    .agent-panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .agent-panel-title  { font-size: 13px; font-weight: 600; flex: 1; }
    .agent-panel-status { font-size: 11px; color: var(--muted); }
    .agent-panel-close  {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 14px; padding: 3px 6px; border-radius: 4px; line-height: 1;
    }
    .agent-panel-close:hover { background: var(--border); color: var(--text); }
    .agent-panel-cancel {
      background: none; border: 1px solid var(--yellow); color: var(--yellow);
      cursor: pointer; font-size: 11px; padding: 2px 8px; border-radius: 4px;
    }
    .agent-panel-cancel:hover { background: var(--yellow); color: #000; }
    .agent-terminal {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px;
      font-family: 'Consolas', 'Menlo', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    .agent-line      { color: #c9d1d9; }
    .agent-line.err  { color: var(--red); }
    .agent-line.dim  { color: var(--dim); font-size: 10px; }

    /* ── Misc ────────────────────────────────────────────────────────────────── */
    .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); font-size: 14px; }
    .empty   { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<header>
  <span style="font-size:20px">🔭</span>
  <h1>VibeRadar</h1>
  <span class="header-project" id="projectName">—</span>
  <span class="header-time" id="scannedAt"></span>
  <button id="covBtn" onclick="runCoverage()" title="Запустить тесты с coverage">🧪 Coverage</button>
  <button id="termBtn" onclick="toggleAgentPanel()" title="Показать/скрыть терминал агента">📟 Terminal</button>
  <span id="liveDot" title="Connecting…" style="
    width:8px; height:8px; border-radius:50%;
    background:var(--dim); display:inline-block;
    margin-left:8px; transition:background 0.3s;
    flex-shrink:0;
  "></span>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="layout">
  <aside class="sidebar">
    <div class="view-tabs" id="viewTabs">
      <div class="view-tab" data-view="features">Features</div>
      <div class="view-tab" data-view="files">Files</div>
    </div>
    <input class="search-input" id="searchInput" type="text" placeholder="Search…" />
    <div id="sidebarExtra"></div>
  </aside>

  <main class="content" id="content">
    <div class="loading" id="loading">Loading…</div>
  </main>
</div>

<div class="panel" id="panel">
  <button class="panel-close" id="panelClose">✕</button>
  <div id="panelContent"></div>
</div>

<div class="agent-panel" id="agentPanel">
  <div class="agent-panel-header">
    <span class="agent-panel-title" id="agentPanelTitle">🤖 Agent</span>
    <span class="agent-panel-status" id="agentPanelStatus">running…</span>
    <button class="agent-panel-cancel" id="agentCancelBtn" onclick="cancelAgent()" title="Сбросить состояние агента" style="display:none">⏹ сброс</button>
    <button class="agent-panel-close" onclick="closeAgentPanel()">✕</button>
  </div>
  <div class="agent-terminal" id="agentTerminal"></div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let D = null;
let view = 'features';
let searchQuery = '';
let activeTypes = new Set();
let activePanelKey = null;
let drillFeatureKey = null;   // null = grid, '__unmapped__' = unmapped, string = feature key
let drillTestType   = null;   // null = feature overview, 'unit'|'integration'|'e2e' = test type drill
let coverageRunning = false;
let coverageHasError = false;

// ─── Coverage button ───────────────────────────────────────────────────────────
function updateCovBtn() {
  const btn = document.getElementById('covBtn');
  if (!btn) return;
  btn.className = '';
  btn.disabled = coverageRunning;
  if (coverageRunning) {
    btn.className = 'cov-running';
    btn.textContent = '⏳ Running...';
  } else if (coverageHasError) {
    btn.className = 'cov-error';
    btn.textContent = '❌ Coverage failed';
  } else {
    btn.textContent = '🧪 Coverage';
  }
}

async function runCoverage() {
  if (coverageRunning) return;
  await fetch('/api/run-coverage', { method: 'POST' });
  // SSE events will update state
}

// ─── Agent ────────────────────────────────────────────────────────────────────
let agentRunning = false;

async function setAgent(agent) {
  await fetch('/api/set-agent', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ agent }),
  });
  // scheduleRescan will fire → data-updated → D.agent updates
}

function setAgentRunning(val) {
  agentRunning = val;
  document.getElementById('agentCancelBtn').style.display = val ? 'inline-block' : 'none';
}

async function cancelAgent() {
  await fetch('/api/cancel-agent', { method: 'POST' });
  setAgentRunning(false);
  document.getElementById('agentPanelStatus').textContent = '⏹ сброшен';
  appendTerminalLine('⏹ Состояние агента сброшено', false);
}

async function runAgentTask(task, featureKey, filePath) {
  if (agentRunning) {
    // Show panel so user sees cancel button
    document.getElementById('agentPanel').classList.add('open');
    document.getElementById('termBtn').classList.add('term-active');
    appendTerminalLine('⚠️ Агент уже запущен. Нажми ⏹ сброс чтобы отменить.', true);
    return;
  }
  document.getElementById('agentTerminal').innerHTML = '';
  document.getElementById('agentPanelStatus').textContent = 'запускаю…';
  document.getElementById('agentPanel').classList.add('open');
  document.getElementById('termBtn').classList.add('term-active');
  await fetch('/api/run-agent', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ task, featureKey, filePath: filePath || undefined }),
  });
}

function closeAgentPanel() {
  document.getElementById('agentPanel').classList.remove('open');
  document.getElementById('termBtn').classList.remove('term-active');
}

function toggleAgentPanel() {
  const panel = document.getElementById('agentPanel');
  const btn   = document.getElementById('termBtn');
  panel.classList.toggle('open');
  btn.classList.toggle('term-active', panel.classList.contains('open'));
}

function appendTerminalLine(line, isError, isDim) {
  const term = document.getElementById('agentTerminal');
  const el = document.createElement('div');
  el.className = 'agent-line' + (isError ? ' err' : isDim ? ' dim' : '');
  el.textContent = line;
  term.appendChild(el);
  term.scrollTop = term.scrollHeight;
}

// ─── Color helpers ────────────────────────────────────────────────────────────
const TYPE_COLORS = {
  component: '#58a6ff',
  service:   '#d2a8ff',
  util:      '#ffa657',
  test:      '#3fb950',
  config:    '#e3b341',
  other:     '#484f58',
};

function covColor(pct) {
  if (pct == null) return '#484f58';
  if (pct >= 70)   return '#3fb950';
  if (pct >= 30)   return '#e3b341';
  return '#f85149';
}

function fmt(b) {
  return b < 1024 ? b + ' B' : (b / 1024).toFixed(1) + ' KB';
}

function pluralFiles(n) {
  const m10 = n % 10, m100 = n % 100;
  if (m100 >= 11 && m100 <= 14) return 'файлов';
  if (m10 === 1) return 'файл';
  if (m10 >= 2 && m10 <= 4) return 'файла';
  return 'файлов';
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [res, statusRes] = await Promise.all([
      fetch('/api/data'),
      fetch('/api/status').catch(() => null),
    ]);
    D = await res.json();

    if (statusRes) {
      const status = await statusRes.json().catch(() => ({}));
      coverageRunning  = status.coverageRunning  ?? false;
      coverageHasError = status.coverageError    ?? false;
    }
    updateCovBtn();

    document.getElementById('projectName').textContent = D.projectName;
    document.getElementById('scannedAt').textContent =
      new Date(D.scannedAt).toLocaleTimeString();

    view = D.hasConfig ? 'features' : 'files';

    if (!D.hasConfig) {
      document.querySelector('[data-view="features"]').classList.add('disabled');
    }

    document.getElementById('loading').style.display = 'none';
    renderStats();
    renderSidebar();
    renderContent();
  } catch (err) {
    document.getElementById('loading').textContent = '❌ Failed to load: ' + err.message;
  }
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function renderStats() {
  const src = D.modules.filter(m => m.type !== 'test');
  const tested = src.filter(m => m.hasTests).length;
  const testFiles = D.modules.filter(m => m.type === 'test').length;
  const pct = src.length ? Math.round(tested / src.length * 100) : 0;

  let items;
  if (D.hasConfig && D.features) {
    const unmapped = src.filter(m => !m.isInfra && (!m.featureKeys || m.featureKeys.length === 0)).length;
    items = [
      { v: D.features.length,   l: 'Features' },
      { v: src.length,          l: 'Source Files' },
      { v: pct + '%',           l: 'With Tests' },
      { v: testFiles,           l: 'Test Files' },
      unmapped > 0 ? { v: unmapped, l: 'Unmapped', c: '#e3b341' } : null,
    ].filter(Boolean);
  } else {
    items = [
      { v: D.modules.length, l: 'Modules' },
      { v: tested,           l: 'With Tests' },
      { v: pct + '%',        l: 'Test Coverage' },
      { v: testFiles,        l: 'Test Files' },
    ];
  }

  document.getElementById('statsBar').innerHTML = items.map(s =>
    `<div class="stat">
       <span class="stat-value"${s.c ? ` style="color:${s.c}"` : ''}>${s.v}</span>
       <span class="stat-label">${s.l}</span>
     </div>`
  ).join('');
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  document.querySelectorAll('.view-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.view === view)
  );

  const extra = document.getElementById('sidebarExtra');
  if (view !== 'files') { extra.innerHTML = ''; return; }

  const types = [...new Set(D.modules.map(m => m.type))].sort();
  extra.innerHTML = `
    <div class="sidebar-label">Type</div>
    <div>
      <div class="type-filter ${activeTypes.size === 0 ? 'active' : ''}" data-t="all">
        <span class="type-dot" style="background:#7d8590"></span>
        All
        <span class="type-count">${D.modules.length}</span>
      </div>
      ${types.map(t => `
        <div class="type-filter ${activeTypes.has(t) ? 'active' : ''}" data-t="${t}">
          <span class="type-dot" style="background:${TYPE_COLORS[t] || '#484f58'}"></span>
          ${t}
          <span class="type-count">${D.modules.filter(m => m.type === t).length}</span>
        </div>
      `).join('')}
    </div>`;

  extra.querySelectorAll('.type-filter').forEach(el => {
    el.onclick = () => {
      const t = el.dataset.t;
      if (t === 'all') activeTypes.clear();
      else if (activeTypes.has(t)) activeTypes.delete(t);
      else activeTypes.add(t);
      renderSidebar();
      renderContent();
    };
  });
}

// ─── Content ──────────────────────────────────────────────────────────────────
function renderContent() {
  const c = document.getElementById('content');
  if (view === 'features') {
    if (drillFeatureKey === '__unmapped__') renderUnmappedDetail(c);
    else if (drillFeatureKey) renderFeatureDetail(c);
    else renderFeatureCards(c);
  } else {
    renderModuleGrid(c);
  }
}

function backToFeatureDetail() {
  drillTestType = null;
  activePanelKey = null;
  document.getElementById('panel').classList.remove('open');
  renderContent();
}

function backToFeatures() {
  drillFeatureKey = null;
  drillTestType = null;
  activePanelKey = null;
  document.getElementById('panel').classList.remove('open');
  renderContent();
}

function renderFeatureCards(c) {
  if (!D.hasConfig || !D.features) {
    c.innerHTML = `
      <div class="no-config">
        <div class="no-config-icon">🗺️</div>
        <h2>Карта фич не настроена</h2>
        <p>Запусти команду ниже, вставь промпт в AI-агента —<br>он создаст <code>viberadar.config.json</code> с описанием твоих фич</p>
        <div class="no-config-cmd">npx viberadar init</div>
        <p style="font-size:13px;color:#484f58">После создания конфига перезапусти VibeRadar</p>
      </div>`;
    return;
  }

  const q = searchQuery.toLowerCase();
  const list = D.features.filter(f =>
    !q || f.label.toLowerCase().includes(q) || f.description.toLowerCase().includes(q)
  );

  if (!list.length) { c.innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }

  // Agent setup banner — shown when no agent configured
  const setupBanner = !D.agent ? `
    <div class="agent-setup-banner">
      <h3>🤖 Выбери AI агента</h3>
      <p>VibeRadar будет запускать его прямо из дашборда — писать тесты, разбирать unmapped и не только</p>
      <div class="agent-choices">
        <button class="agent-choice-btn" onclick="setAgent('claude')">⚡ Claude Code</button>
        <button class="agent-choice-btn" onclick="setAgent('codex')">🟢 Codex (OpenAI)</button>
      </div>
    </div>` : '';

  c.innerHTML = setupBanner + '<div class="features-grid" id="featGrid"></div>';
  const grid = document.getElementById('featGrid');

  list.forEach(f => {
    const pct = f.fileCount > 0 ? Math.round(f.testedCount / f.fileCount * 100) : 0;
    const isActive = activePanelKey === f.key;
    const hasCov = f.coveragePct != null;
    const covPct = hasCov ? Math.round(f.coveragePct) : null;

    const card = document.createElement('div');
    card.className = 'feature-card' + (isActive ? ' active' : '');
    card.innerHTML = `
      <div class="feature-accent" style="background:${f.color}"></div>
      <div class="feature-body">
        <div class="feature-title">
          <span>${f.label}</span>
          <span class="feature-file-count">${f.fileCount} ${pluralFiles(f.fileCount)}</span>
        </div>
        ${f.description ? `<div class="feature-desc">${f.description}</div>` : ''}
        ${hasCov ? `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="font-size:24px;font-weight:700;line-height:1;color:${covColor(covPct)}">${covPct}%</span>
          <div style="flex:1">
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.4px">Coverage</div>
            <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">
              <div style="width:${covPct}%;height:100%;background:${covColor(covPct)};border-radius:2px;transition:width 0.4s"></div>
            </div>
          </div>
        </div>` : `
        <div style="font-size:11px;color:var(--dim);margin-bottom:10px">
          coverage: нет данных
        </div>`}
        <div class="feature-progress-wrap">
          <div class="feature-progress-bar">
            <div class="feature-progress-fill" style="width:${pct}%;background:${f.color}"></div>
          </div>
          <span class="feature-progress-label" style="color:${covColor(pct)}">${f.testedCount}/${f.fileCount} с тестами</span>
        </div>
        ${D.agent && f.fileCount > f.testedCount ? `
        <button class="agent-card-btn" data-task="write-tests" data-key="${f.key}">
          ▶ Написать тесты (${f.fileCount - f.testedCount} без тестов)
        </button>` : ''}
      </div>`;
    card.onclick = (e) => {
      if (e.target.closest('.agent-card-btn')) return; // don't drill on agent btn click
      drillFeatureKey = f.key; activePanelKey = null;
      document.getElementById('panel').classList.remove('open');
      renderContent();
    };
    const agentBtn = card.querySelector('.agent-card-btn');
    if (agentBtn) {
      agentBtn.onclick = (e) => {
        e.stopPropagation();
        runAgentTask(agentBtn.dataset.task, agentBtn.dataset.key);
      };
    }
    grid.appendChild(card);
  });

  // ── Unmapped card ──────────────────────────────────────────────────────────
  if (!q) {
    const infraSrc    = D.modules.filter(m => m.type !== 'test' && m.isInfra);
    const unmappedSrc = D.modules.filter(m =>
      m.type !== 'test' && !m.isInfra && (!m.featureKeys || m.featureKeys.length === 0)
    );
    if (unmappedSrc.length > 0) {
      const isActive = activePanelKey === '__unmapped__';
      const card = document.createElement('div');
      card.className = 'feature-card' + (isActive ? ' active' : '');
      card.style.borderStyle = 'dashed';
      card.style.opacity = '0.75';
      const infraNote = infraSrc.length > 0
        ? `<br><span style="color:var(--dim);font-size:11px">+ ${infraSrc.length} infra/system скрыты</span>`
        : '';
      card.innerHTML = `
        <div class="feature-accent" style="background:var(--yellow)"></div>
        <div class="feature-body">
          <div class="feature-title">
            <span style="color:var(--yellow)">⚠ Unmapped</span>
            <span class="feature-file-count">${unmappedSrc.length} ${pluralFiles(unmappedSrc.length)}</span>
          </div>
          <div class="feature-desc">Файлы вне карты фич — не входят ни в одну фичу${infraNote}</div>
          <div class="feature-progress-wrap">
            <div class="feature-progress-bar">
              <div class="feature-progress-fill" style="width:100%;background:var(--border)"></div>
            </div>
            <span class="feature-progress-label" style="color:var(--dim)">нет привязки</span>
          </div>
        </div>`;
      card.onclick = () => {
        drillFeatureKey = '__unmapped__';
        activePanelKey = null;
        document.getElementById('panel').classList.remove('open');
        renderContent();
      };
      grid.appendChild(card);
    }
  }
}

function testTypeCard(type, label, icon, color, count, active) {
  const empty = count === 0 && type !== 'source';
  const subLabel = empty ? 'нет тестов' : (type === 'source' ? 'код приложения' : pluralFiles(count));
  return `
    <div class="test-type-card${empty ? ' tt-empty' : ''}${active ? ' tt-active' : ''}" data-testtype="${type}"
         style="${active ? 'border-color:' + color : ''}">
      <div class="tt-accent" style="background:${color}"></div>
      <div class="tt-label">${icon} ${label}</div>
      <div class="tt-count" style="color:${active || !empty ? color : 'var(--dim)'}">${count}</div>
      <div class="tt-sub">${subLabel}</div>
    </div>`;
}

function renderFeatureDetail(c) {
  const feat = D.features.find(f => f.key === drillFeatureKey);
  if (!feat) { backToFeatures(); return; }

  const mods = D.modules.filter(m => m.featureKeys && m.featureKeys.includes(drillFeatureKey));
  const src  = mods.filter(m => m.type !== 'test');
  const tst  = mods.filter(m => m.type === 'test');
  const testedCount = src.filter(m => m.hasTests).length;
  const pct  = src.length > 0 ? Math.round(testedCount / src.length * 100) : 0;

  const unitCount        = feat.unitTestCount        ?? tst.filter(m => m.testType === 'unit').length;
  const integrationCount = feat.integrationTestCount ?? tst.filter(m => m.testType === 'integration').length;
  const e2eCount         = feat.e2eTestCount         ?? tst.filter(m => m.testType === 'e2e').length;

  // Determine what list to show based on active tab
  // null or 'source' → source files; test type → test files of that type
  const activeTab  = drillTestType || 'source';
  const listFiles  = activeTab === 'source' ? src : tst.filter(m => m.testType === activeTab);
  const isTestList = activeTab !== 'source';
  const meta       = TEST_TYPE_META[activeTab];
  const listLabel  = meta
    ? `${meta.icon} ${meta.label} тесты (${listFiles.length})`
    : `📁 Файлы фичи (${listFiles.length})`;

  const q = searchQuery.toLowerCase();
  const filtered = q ? listFiles.filter(m =>
    m.name.toLowerCase().includes(q) || m.relativePath.toLowerCase().includes(q)
  ) : listFiles;

  c.innerHTML = `
    <div class="drill-header">
      <button class="back-btn" onclick="backToFeatures()">← Все фичи</button>
      <div class="drill-title">
        <div style="width:10px;height:10px;border-radius:50%;background:${feat.color};flex-shrink:0"></div>
        <span>${feat.label}</span>
      </div>
      <div class="drill-stats">
        <span>${src.length} файлов</span>
        <span style="color:${covColor(pct)}">${pct}% с тестами</span>
        ${feat.coveragePct != null
          ? `<span style="color:${covColor(Math.round(feat.coveragePct))};font-weight:700">${Math.round(feat.coveragePct)}% coverage</span>`
          : `<span style="color:var(--dim);font-size:11px" title="Нажми 🧪 Coverage в шапке">coverage: нет данных</span>`
        }
      </div>
    </div>
    ${feat.description ? `<div class="drill-desc">${feat.description}</div>` : ''}

    <div class="test-type-grid">
      ${testTypeCard('source',      'Файлы',       '📁', feat.color, src.length,       activeTab === 'source')}
      ${testTypeCard('unit',        'Unit',        '🧪', '#e3b341',  unitCount,        activeTab === 'unit')}
      ${testTypeCard('integration', 'Integration', '🔗', '#58a6ff',  integrationCount, activeTab === 'integration')}
      ${testTypeCard('e2e',         'E2E',         '🎭', '#d2a8ff',  e2eCount,         activeTab === 'e2e')}
    </div>

    <div class="drill-section-label">${listLabel}</div>
    <div class="file-rows" id="fileRows">
      ${filtered.length === 0
        ? `<div style="padding:20px;text-align:center;border:1px dashed var(--border);border-radius:8px;color:var(--dim);font-size:13px">
            ${isTestList ? 'Нет тестов этого типа для данной фичи' : 'Нет файлов — возможно паттерны в конфиге не совпадают'}
          </div>`
        : filtered.map(m => fileRow(m, isTestList, drillFeatureKey)).join('')
      }
    </div>`;

  c.querySelectorAll('.test-type-card[data-testtype]').forEach(card => {
    card.onclick = () => {
      const type = card.dataset.testtype;
      drillTestType = (type === 'source') ? null : type; // 'source' tab = null state
      activePanelKey = null;
      document.getElementById('panel').classList.remove('open');
      renderContent();
    };
  });

  c.querySelectorAll('.file-row[data-id]').forEach(row => {
    row.onclick = () => {
      const m = D.modules.find(m => m.id === row.dataset.id);
      if (m) openModulePanel(m);
    };
  });
}

const TEST_TYPE_META = {
  unit:        { label: 'Unit',        icon: '🧪', color: '#e3b341', desc: 'Изолированные тесты функций и модулей' },
  integration: { label: 'Integration', icon: '🔗', color: '#58a6ff', desc: 'Тесты с реальной БД и зависимостями' },
  e2e:         { label: 'E2E',         icon: '🎭', color: '#d2a8ff', desc: 'Сквозные тесты через браузер (Playwright)' },
};

function renderTestTypeDetail(c) {
  const feat = D.features.find(f => f.key === drillFeatureKey);
  if (!feat) { backToFeatures(); return; }
  const meta = TEST_TYPE_META[drillTestType] || { label: drillTestType, icon: '🧪', color: '#58a6ff', desc: '' };

  const tests = D.modules.filter(m =>
    m.type === 'test' &&
    m.testType === drillTestType &&
    m.featureKeys && m.featureKeys.includes(drillFeatureKey)
  );

  const q = searchQuery.toLowerCase();
  const filtered = q ? tests.filter(m =>
    m.name.toLowerCase().includes(q) || m.relativePath.toLowerCase().includes(q)
  ) : tests;

  c.innerHTML = `
    <div class="drill-header">
      <button class="back-btn" onclick="backToFeatureDetail()">← ${feat.label}</button>
      <div class="drill-title">
        <span>${meta.icon}</span>
        <span>${meta.label} тесты</span>
      </div>
      <div class="drill-stats">
        <span style="color:${meta.color}">${tests.length} ${pluralFiles(tests.length)}</span>
      </div>
    </div>
    <div style="font-size:12px;color:var(--dim);margin-bottom:16px">${meta.desc}</div>

    <div class="file-rows" id="fileRows">
      ${filtered.length === 0
        ? `<div style="padding:24px;text-align:center;border:1px dashed var(--border);border-radius:8px">
            <div style="font-size:28px;margin-bottom:8px">${meta.icon}</div>
            <div style="font-size:14px;color:var(--muted);margin-bottom:4px">Нет ${meta.label} тестов для этой фичи</div>
            <div style="font-size:12px;color:var(--dim)">Добавь тесты в <code>${drillTestType === 'e2e' ? 'e2e/' : 'tests/'}</code></div>
          </div>`
        : filtered.map(m => fileRow(m, true)).join('')
      }
    </div>`;

  c.querySelectorAll('.file-row[data-id]').forEach(row => {
    row.onclick = () => {
      const m = D.modules.find(m => m.id === row.dataset.id);
      if (m) openModulePanel(m);
    };
  });
}

function renderUnmappedDetail(c) {
  const infraSrc    = D.modules.filter(m => m.type !== 'test' && m.isInfra);
  const unmappedSrc = D.modules.filter(m =>
    m.type !== 'test' && !m.isInfra && (!m.featureKeys || m.featureKeys.length === 0)
  );

  const q = searchQuery.toLowerCase();
  const filtered = q ? unmappedSrc.filter(m =>
    m.name.toLowerCase().includes(q) || m.relativePath.toLowerCase().includes(q)
  ) : unmappedSrc;

  // Build prompt text
  const featureList = (D.features || []).map(f => `  • ${f.key} — ${f.label}`).join('\n');
  const plainList   = unmappedSrc.map(m => '- ' + m.relativePath.replace(/\\/g, '/')).join('\n');
  const promptText  =
    `В проекте ${unmappedSrc.length} файлов без привязки к фичам (unmapped).\n` +
    `\nДля каждого файла из списка реши:\n` +
    `1. Если файл относится к конкретной фиче → добавь его путь в "include" этой фичи в viberadar.config.json\n` +
    `2. Если это инфраструктура (утилиты, конфиги, middleware, типы, бутстрап) → добавь glob в массив "ignore"\n` +
    `3. Если файл явно бизнес-логика новой фичи → создай новую фичу\n` +
    `4. Если непонятно — пропусти\n` +
    `\nСуществующие фичи:\n${featureList}\n` +
    `\nФайлы:\n${plainList}`;

  const infraNote = infraSrc.length > 0
    ? `<span style="color:var(--dim);font-size:12px">+ ${infraSrc.length} infra/system скрыты (в ignore)</span>`
    : '';

  c.innerHTML = `
    <div class="drill-header">
      <button class="back-btn" onclick="backToFeatures()">← Все фичи</button>
      <div class="drill-title">
        <span style="color:var(--yellow)">⚠</span>
        <span>Unmapped файлы</span>
      </div>
      <div class="drill-stats">
        <span style="color:var(--yellow)">${unmappedSrc.length} без привязки</span>
        ${infraNote}
      </div>
    </div>
    <div style="padding:0 0 12px;display:flex;gap:8px;flex-wrap:wrap">
      ${D.agent ? `<button id="runAgentUnmapped" style="
        padding:7px 14px; background:var(--blue); border:none;
        border-radius:6px; color:#000; font-size:12px; font-weight:700; cursor:pointer;
      ">▶ Разобрать через ${D.agent === 'claude' ? 'Claude Code' : 'Codex'}</button>` : ''}
      <button id="copyUnmappedDrill" style="
        padding:7px 14px; background:var(--bg-card); border:1px solid var(--border);
        border-radius:6px; color:var(--blue); font-size:12px; cursor:pointer;
      ">📋 Скопировать промпт для AI-агента (${unmappedSrc.length} файлов)</button>
    </div>
    <div class="file-rows" id="fileRows">
      ${filtered.length === 0
        ? '<div style="font-size:13px;color:var(--dim)">Ничего не найдено</div>'
        : filtered.map(m => fileRow(m)).join('')
      }
    </div>`;

  const runAgentUnmappedBtn = document.getElementById('runAgentUnmapped');
  if (runAgentUnmappedBtn) {
    runAgentUnmappedBtn.onclick = () => runAgentTask('map-unmapped');
  }

  document.getElementById('copyUnmappedDrill').onclick = function() {
    navigator.clipboard.writeText(promptText).then(() => {
      this.textContent = '✅ Скопировано!';
      this.style.color = 'var(--green)';
      setTimeout(() => {
        this.textContent = `📋 Скопировать промпт для AI-агента (${unmappedSrc.length} файлов)`;
        this.style.color = 'var(--blue)';
      }, 3000);
    });
  };

  c.querySelectorAll('.file-row[data-id]').forEach(row => {
    row.onclick = () => {
      const m = D.modules.find(m => m.id === row.dataset.id);
      if (m) openModulePanel(m);
    };
  });
}

function fileRow(m, isTest = false, featureKey = null) {
  const parts = m.relativePath.replace(/\\/g, '/').split('/');
  const name  = parts[parts.length - 1];
  const dir   = parts.slice(0, -1).join('/');
  const icon  = isTest ? '🧪' : (m.testStale ? '⚠️' : m.hasTests ? '✅' : '⬜');
  const isActive = activePanelKey === m.id;
  // Agent button: "написать тест" for untested, "обновить тест" for stale
  const showAgentBtn = D.agent && !isTest && !m.isInfra && featureKey && (!m.hasTests || m.testStale);
  const agentBtnLabel = m.testStale ? '↻ обновить тест' : '✍ написать тест';
  const agentBtnTitle = m.testStale ? 'Файл изменился — обновить тесты' : 'Написать тест для этого файла';
  const agentTask     = m.testStale ? 'write-tests-file' : 'write-tests-file';
  const agentBtn = showAgentBtn
    ? `<button class="file-row-agent-btn${m.testStale ? ' stale' : ''}" title="${agentBtnTitle}"
         onclick="event.stopPropagation();runAgentTask('${agentTask}','${featureKey}','${m.relativePath.replace(/\\/g, '/')}')">
         ${agentBtnLabel}</button>`
    : '';
  return `
    <div class="file-row${isActive ? ' active' : ''}" data-id="${m.id}">
      <span class="file-row-icon">${icon}</span>
      <span class="file-row-name">${name}</span>
      ${agentBtn}
      <span class="file-row-dir">${dir}</span>
    </div>`;
}

function renderModuleGrid(c) {
  const q = searchQuery.toLowerCase();
  const list = D.modules.filter(m => {
    if (activeTypes.size > 0 && !activeTypes.has(m.type)) return false;
    if (q && !m.name.toLowerCase().includes(q) && !m.relativePath.toLowerCase().includes(q)) return false;
    return true;
  });

  if (!list.length) { c.innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }

  c.innerHTML = '<div class="module-grid" id="modGrid"></div>';
  const grid = document.getElementById('modGrid');

  list.forEach(m => {
    const cov = m.coverage?.lines;
    const isActive = activePanelKey === m.id;
    const card = document.createElement('div');
    card.className = 'module-card' + (isActive ? ' active' : '');
    card.innerHTML = `
      <div class="module-name">${m.name}</div>
      <div class="module-path">${m.relativePath}</div>
      <div class="module-meta">
        <span style="display:flex;align-items:center;gap:4px">
          <span class="type-dot" style="background:${TYPE_COLORS[m.type] || '#484f58'}"></span>${m.type}
        </span>
        <span class="badge ${m.hasTests ? 'badge-green' : 'badge-red'}">${m.hasTests ? '✓' : '✗'}</span>
      </div>
      ${cov != null ? `<div class="cov-bar"><div class="cov-fill" style="width:${cov}%;background:${covColor(cov)}"></div></div>` : ''}`;
    card.onclick = () => openModulePanel(m);
    grid.appendChild(card);
  });
}

// ─── Panels ───────────────────────────────────────────────────────────────────
function openFeaturePanel(key) {
  activePanelKey = key;
  renderContent();

  const feat = D.features.find(f => f.key === key);
  const mods = D.modules.filter(m => m.featureKeys && m.featureKeys.includes(key));
  const src  = mods.filter(m => m.type !== 'test');
  const tst  = mods.filter(m => m.type === 'test');
  const testedSrc = src.filter(m => m.hasTests).length;
  const pct = src.length > 0 ? Math.round(testedSrc / src.length * 100) : 0;

  document.getElementById('panelContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="width:12px;height:12px;border-radius:50%;background:${feat.color};flex-shrink:0"></div>
      <div class="panel-title">${feat.label}</div>
    </div>
    ${feat.description ? `<div class="panel-subtitle">${feat.description}</div>` : ''}

    <div class="panel-stats">
      <div class="panel-stat">
        <div class="panel-stat-val">${src.length}</div>
        <div class="panel-stat-lbl">Файлов</div>
      </div>
      <div class="panel-stat">
        <div class="panel-stat-val" style="color:${covColor(pct)}">${pct}%</div>
        <div class="panel-stat-lbl">С тестами</div>
      </div>
      <div class="panel-stat">
        <div class="panel-stat-val">${tst.length}</div>
        <div class="panel-stat-lbl">Тест-файлов</div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-label">Исходные файлы (${src.length})</div>
      <div class="file-list">
        ${src.length === 0
          ? '<div style="font-size:13px;color:var(--dim);padding:8px 0">Нет файлов — возможно паттерны не совпадают</div>'
          : src.map(m => fileItem(m)).join('')
        }
      </div>
    </div>

    ${tst.length > 0 ? `
    <div class="panel-section">
      <div class="panel-section-label">Тест-файлы (${tst.length})</div>
      <div class="file-list">${tst.map(m => fileItem(m, true)).join('')}</div>
    </div>` : ''}`;

  document.getElementById('panel').classList.add('open');
}

function fileItem(m, isTest = false) {
  const parts = m.relativePath.replace(/\\/g, '/').split('/');
  const name  = parts[parts.length - 1];
  const dir   = parts.slice(0, -1).join('/');
  const icon  = isTest ? '🧪' : (m.hasTests ? '✅' : '⬜');
  return `
    <div class="file-item">
      <span class="file-item-icon">${icon}</span>
      <div>
        <div class="file-item-name">${name}</div>
        ${dir ? `<div class="file-item-dir">${dir}</div>` : ''}
      </div>
    </div>`;
}

function openModulePanel(m) {
  activePanelKey = m.id;
  renderContent();

  const cov = m.coverage;
  const featureLabels = m.featureKeys && m.featureKeys.length > 0
    ? m.featureKeys.map(k => D.features?.find(f => f.key === k)?.label || k).join(', ')
    : null;

  document.getElementById('panelContent').innerHTML = `
    <div class="panel-title">${m.name}</div>
    <div class="panel-subtitle">${m.relativePath}</div>

    <div class="panel-section">
      <div class="panel-section-label">Информация</div>
      <div class="detail-row">
        <span>Тип</span>
        <span style="color:${TYPE_COLORS[m.type] || '#484f58'}">${m.type}</span>
      </div>
      <div class="detail-row">
        <span>Размер</span>
        <span>${fmt(m.size)}</span>
      </div>
      <div class="detail-row">
        <span>Тесты</span>
        <span class="badge ${m.hasTests ? 'badge-green' : 'badge-red'}">${m.hasTests ? '✓ есть' : '✗ нет'}</span>
      </div>
      ${m.testCount != null ? `<div class="detail-row"><span>Тест-кейсов</span><span style="color:var(--green);font-weight:600">${m.testCount}</span></div>` : ''}
      ${m.testStale ? `<div class="detail-row"><span>Статус тестов</span><span style="color:var(--yellow);font-weight:600">⚠️ устарели — файл изменился</span></div>` : ''}
      ${m.testFile ? `<div class="detail-row"><span>Тест-файл</span><span class="detail-row-right">${m.testFile}</span></div>` : ''}
      ${featureLabels ? `<div class="detail-row"><span>Фичи</span><span class="detail-row-right">${featureLabels}</span></div>` : ''}
    </div>

    ${cov ? `
    <div class="panel-section">
      <div class="panel-section-label">Coverage</div>
      <div class="cov-grid">
        ${['lines','statements','functions','branches'].map(k => `
          <div class="cov-metric">
            <div class="cov-metric-val" style="color:${covColor(cov[k])}">${cov[k]?.toFixed(1)}%</div>
            <div class="cov-metric-lbl">${k}</div>
          </div>`).join('')}
      </div>
    </div>` : ''}

    ${m.dependencies.length > 0 ? `
    <div class="panel-section">
      <div class="panel-section-label">Импорты (${m.dependencies.length})</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        ${m.dependencies.map(d => `<div class="dep-item">${d}</div>`).join('')}
      </div>
    </div>` : ''}`;

  document.getElementById('panel').classList.add('open');
}

function openUnmappedPanel(files, infraFiles) {
  infraFiles = infraFiles || [];
  activePanelKey = '__unmapped__';
  renderContent();

  // Group by top-level directory
  const byDir = {};
  files.forEach(m => {
    const parts = m.relativePath.replace(/\\/g, '/').split('/');
    const dir = parts.length > 1 ? parts[0] : '(root)';
    if (!byDir[dir]) byDir[dir] = [];
    byDir[dir].push(m);
  });
  const dirs = Object.keys(byDir).sort();

  // Build feature list for context
  const featureList = (D.features || []).map(f => `  • ${f.key} — ${f.label}`).join('\n');

  // Build plain-text list for copying to AI agent
  const plainList = files
    .map(m => '- ' + m.relativePath.replace(/\\/g, '/'))
    .join('\n');

  const promptText =
    `В проекте ${files.length} файлов без привязки к фичам (unmapped).\n` +
    `\nДля каждого файла из списка реши:\n` +
    `1. Если файл относится к конкретной фиче → добавь его путь в "include" этой фичи в viberadar.config.json\n` +
    `2. Если это инфраструктура (утилиты, конфиги, middleware, типы, бутстрап) → добавь glob в массив "ignore"\n` +
    `3. Если файл явно бизнес-логика новой фичи → создай новую фичу\n` +
    `4. Если непонятно — пропусти\n` +
    `\nСуществующие фичи:\n${featureList}\n` +
    `\nФайлы:\n${plainList}`;

  const infraNote = infraFiles.length > 0
    ? `<div style="margin-bottom:12px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--dim)">
        🔒 <b style="color:var(--text)">${infraFiles.length} infra/system файлов</b> скрыты (добавлены в <code>ignore</code>)<br>
        Они не считаются unmapped и не показываются в карте фич.
      </div>`
    : '';

  document.getElementById('panelContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="font-size:16px">⚠</span>
      <div class="panel-title" style="color:var(--yellow)">Unmapped файлы</div>
    </div>
    <div class="panel-subtitle" style="margin-bottom:12px">
      Не входят ни в одну фичу. Скопируй список и отправь AI-агенту.
    </div>

    ${infraNote}

    <button id="copyUnmapped" style="
      width:100%; padding:8px 12px; margin-bottom:16px;
      background:var(--bg); border:1px solid var(--border);
      border-radius:6px; color:var(--blue); font-size:12px;
      cursor:pointer; text-align:left;
    ">📋 Скопировать промпт для AI-агента (${files.length} файлов)</button>

    ${dirs.map(dir => `
      <div class="panel-section">
        <div class="panel-section-label">${dir}/ (${byDir[dir].length})</div>
        <div class="file-list">
          ${byDir[dir].map(m => fileItem(m)).join('')}
        </div>
      </div>
    `).join('')}`;

  document.getElementById('copyUnmapped').onclick = function() {
    navigator.clipboard.writeText(promptText).then(() => {
      this.textContent = '✅ Скопировано! Вставь в AI-агента';
      this.style.color = 'var(--green)';
      setTimeout(() => {
        this.textContent = '📋 Скопировать список для AI-агента';
        this.style.color = 'var(--blue)';
      }, 3000);
    });
  };

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  activePanelKey = null;
  document.getElementById('panel').classList.remove('open');
  renderContent();
}

// ─── Events ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.view-tab').forEach(tab => {
  tab.onclick = () => {
    if (tab.classList.contains('disabled')) return;
    view = tab.dataset.view;
    drillFeatureKey = null;
    drillTestType = null;
    activePanelKey = null;
    searchQuery = '';
    activeTypes.clear();
    document.getElementById('searchInput').value = '';
    document.getElementById('panel').classList.remove('open');
    renderSidebar();
    renderContent();
  };
});

document.getElementById('searchInput').oninput = e => {
  searchQuery = e.target.value.toLowerCase();
  renderContent();
};

document.getElementById('panelClose').onclick = closePanel;
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ─── Live reload ──────────────────────────────────────────────────────────────
function setLiveDot(color, title) {
  const dot = document.getElementById('liveDot');
  dot.style.background = color;
  dot.title = title;
}

async function refreshData() {
  try {
    const res = await fetch('/api/data');
    D = await res.json();

    // Update header timestamp
    document.getElementById('scannedAt').textContent =
      new Date(D.scannedAt).toLocaleTimeString();

    renderStats();
    renderSidebar();
    renderContent();

    // Re-render drill-down or re-open panel
    const panelOpen = document.getElementById('panel').classList.contains('open');
    if (panelOpen && activePanelKey) {
      if (drillFeatureKey === '__unmapped__') {
        renderContent(); // already routes to renderUnmappedDetail
      } else if (view === 'features' && D.features) {
        openFeaturePanel(activePanelKey);
      } else {
        const m = D.modules.find(m => m.id === activePanelKey);
        if (m) openModulePanel(m);
        else closePanel();
      }
    }

    // Brief green flash on the dot to signal fresh data
    setLiveDot('#3fb950', 'Live — обновлено только что');
    setTimeout(() => setLiveDot('#3fb950', 'Live — автообновление включено'), 1500);
  } catch (err) {
    console.error('Refresh failed:', err);
  }
}

function connectSSE() {
  const es = new EventSource('/api/events');

  es.onopen = () => setLiveDot('#3fb950', 'Live — автообновление включено');

  es.addEventListener('data-updated', () => {
    setLiveDot('#e3b341', 'Обновляю данные…');
    refreshData();
  });

  es.addEventListener('coverage-started', () => {
    coverageRunning  = true;
    coverageHasError = false;
    updateCovBtn();
  });

  es.addEventListener('coverage-done', () => {
    coverageRunning  = false;
    coverageHasError = false;
    updateCovBtn();
    // data-updated fires separately and triggers refreshData()
  });

  es.addEventListener('coverage-error', () => {
    coverageRunning  = false;
    coverageHasError = true;
    updateCovBtn();
    setTimeout(() => { coverageHasError = false; updateCovBtn(); }, 8000);
  });

  es.addEventListener('agent-started', (e) => {
    setAgentRunning(true);
    const { title } = JSON.parse(e.data);
    document.getElementById('agentPanelTitle').textContent = '🤖 ' + title;
    document.getElementById('agentPanelStatus').textContent = 'запускаю…';
    document.getElementById('agentPanel').classList.add('open');
    document.getElementById('termBtn').classList.add('term-active');
    document.getElementById('agentTerminal').innerHTML = '';
  });

  es.addEventListener('agent-output', (e) => {
    const { line, isError, isDim } = JSON.parse(e.data);
    appendTerminalLine(line, !!isError, !!isDim);
    document.getElementById('agentPanelStatus').textContent = 'работает…';
  });

  es.addEventListener('agent-done', () => {
    setAgentRunning(false);
    document.getElementById('agentPanelStatus').textContent = '✅ готово';
    renderContent();
  });

  es.addEventListener('agent-summary', (e) => {
    const { passed, failed, files } = JSON.parse(e.data);
    const term = document.getElementById('agentTerminal');
    const allOk = failed === 0;
    const box = document.createElement('div');
    box.style.cssText = `
      margin: 10px 0 4px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid ${allOk ? 'var(--green)' : 'var(--red)'};
      background: ${allOk ? '#0d2a1a' : '#2a0d0d'};
      font-family: inherit;
    `;
    box.innerHTML = `
      <div style="font-size:13px;font-weight:700;color:${allOk ? 'var(--green)' : 'var(--red)'}">
        ${allOk ? '✅' : '⚠️'} Тесты: ${passed} passed${failed > 0 ? ', ' + failed + ' failed' : ''}
      </div>
      ${files.map(f => `<div style="font-size:11px;color:var(--dim);margin-top:3px">📄 ${f}</div>`).join('')}
    `;
    term.appendChild(box);
    term.scrollTop = term.scrollHeight;
  });

  es.addEventListener('agent-error', (e) => {
    setAgentRunning(false);
    const { message } = JSON.parse(e.data);
    document.getElementById('agentPanelStatus').textContent = '❌ ошибка';
    appendTerminalLine('❌ ' + (message || 'Ошибка агента'), true);
  });

  es.onerror = () => {
    setLiveDot('var(--dim)', 'Нет соединения — переподключаюсь…');
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

init().then(() => connectSSE());
</script>
</body>
</html>
