  scenarios: { view: 'list', searchQuery: '', activeTypes: new Set(), drillFeatureKey: null, drillTestType: null, activePanelKey: null, showOnlyUntestedInFeature: false, testNavType: 'all', testNavFeature: null, testNavProblem: null },
  services: { view: 'graph', searchQuery: '', activeTypes: new Set(), drillFeatureKey: null, drillTestType: null, activePanelKey: null, showOnlyUntestedInFeature: false, testNavType: 'all', testNavFeature: null, testNavProblem: null, svcTab: 'graph' },
  load:     { view: 'features', searchQuery: '', activeTypes: new Set(), drillFeatureKey: null, drillTestType: null, activePanelKey: null, showOnlyUntestedInFeature: false, testNavType: 'all', testNavFeature: null, testNavProblem: null },
};

function getModeFromPath(pathname = window.location.pathname) {
  if (pathname.startsWith('/radar/observability')) return 'observability';
  if (pathname.startsWith('/radar/docs')) return 'docs';
  if (pathname.startsWith('/radar/services')) return 'services';
  if (pathname.startsWith('/radar/load')) return 'load';
  return 'qa';
}

function routePathForMode(mode) {
  if (mode === 'observability') return '/radar/observability';
  if (mode === 'docs') return '/radar/docs';
  if (mode === 'services') return '/radar/services';
  if (mode === 'load') return '/radar/load';
  return '/radar/qa';
}

function setModeRoute(mode, replace = false) {
  const target = routePathForMode(mode) + window.location.search + window.location.hash;
  if (replace) history.replaceState(null, '', target);
  else history.pushState(null, '', target);
}

function saveModeState(mode) {
  modeStore[mode] = {
    view,
    searchQuery,
    activeTypes: new Set(activeTypes),
    drillFeatureKey,
    drillTestType,
    activePanelKey,
    showOnlyUntestedInFeature,
    testNavType,
    testNavFeature,
    testNavProblem,
  };
}

function restoreModeState(mode) {
  const state = modeStore[mode];
  view = state.view;
  searchQuery = state.searchQuery;
  activeTypes = new Set(state.activeTypes);
  drillFeatureKey = state.drillFeatureKey;
  drillTestType = state.drillTestType;
  activePanelKey = state.activePanelKey;
  showOnlyUntestedInFeature = !!state.showOnlyUntestedInFeature;
  testNavType = state.testNavType || 'all';
  testNavFeature = state.testNavFeature || null;
  testNavProblem = state.testNavProblem || null;
}

function switchMode(nextMode) {
  if (nextMode === contextMode) return;
  saveModeState(contextMode);
  contextMode = nextMode;
  restoreModeState(contextMode);
  if (contextMode === 'observability' || contextMode === 'docs' || contextMode === 'services' || contextMode === 'load') {
    view = 'features';
    drillFeatureKey = null;
    drillTestType = null;
    activePanelKey = null;
    clearFeatureHash();
  }
  if (contextMode === 'load' && loadK6Available === null) { checkK6(); }
  if (contextMode === 'load') { loadRefreshScripts(); }
  setModeRoute(contextMode);
  document.getElementById('searchInput').value = searchQuery;
  document.getElementById('panel').classList.remove('open');
  renderStats();
  renderSidebar();
  renderContent();
}
// ─── Run All Tests button ──────────────────────────────────────────────────────
let runAllRunning = false;
let refreshDataInFlight = false;
let refreshDataQueued = false;
let refreshDataTimer = null;
let rescanPending = false;

function escapeHtml(text) {
  return String(text || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}


function clearFeatureHash() {
  if (!window.location.hash) return;
  history.replaceState(null, '', window.location.pathname + window.location.search);
}

function buildFeatureTabUrl(featureKey) {
  const url = new URL(window.location.href);
  url.hash = `feature=${encodeURIComponent(featureKey)}`;
  return url.toString();
}

function openFeatureInNewTab(featureKey) {
  window.open(buildFeatureTabUrl(featureKey), '_blank', 'noopener');
}

function setFeatureDrill(featureKey, syncHash = true) {
  view = 'features';
  drillFeatureKey = featureKey;
  drillTestType = null;
  activePanelKey = null;
  selectedSourceFiles.clear();
  document.getElementById('panel').classList.remove('open');
  if (syncHash) {
    if (featureKey) window.location.hash = `feature=${encodeURIComponent(featureKey)}`;
    else clearFeatureHash();
  }
  renderContent();
}

function selectedFilesForFeature(featureKey, visibleSourceFiles = null) {
  const visibleSet = visibleSourceFiles ? new Set(visibleSourceFiles.map(p => p.replace(/\\/g, '/'))) : null;
  return Array.from(selectedSourceFiles).filter((relPath) => {
    if (visibleSet && !visibleSet.has(relPath)) return false;
    const mod = D?.modules?.find((m) => m.relativePath.replace(/\\/g, '/') === relPath);
    return !!mod && mod.type !== 'test' && mod.featureKeys?.includes(featureKey);
  });
}

function getFileRowsWindow(items, renderKey) {
  if (fileRowsRenderKey !== renderKey) {
    fileRowsRenderKey = renderKey;
    fileRowsRenderLimit = FILE_ROWS_INITIAL_LIMIT;
  }
  const visibleRows = items.slice(0, fileRowsRenderLimit);
  const hiddenRows = Math.max(0, items.length - visibleRows.length);
  return { visibleRows, hiddenRows, hasMoreRows: hiddenRows > 0 };
}

function increaseFileRowsLimit() {
  fileRowsRenderLimit += FILE_ROWS_LIMIT_STEP;
}

function bindFileRowsClick(container) {
  const fileRows = container.querySelector('#fileRows');
  if (!fileRows) return;
  fileRows.onclick = (event) => {
    const row = event.target.closest('.file-row[data-id]');
    if (!row) return;
    const moduleId = row.dataset.id;
    const mod = D.modules.find((m) => String(m.id) === moduleId);
    if (mod) openModulePanel(mod);
  };
}

function applyHashRoute() {
  const hash = (window.location.hash || '').replace(/^#/, '');
  if (!hash) {
    if (view === 'features' && drillFeatureKey) {
      drillFeatureKey = null;
      drillTestType = null;
      activePanelKey = null;
    }
    return;
  }
  const params = new URLSearchParams(hash);

  // tests view hash: #view=tests&type=e2e&problem=stale&feature=auth
  if (params.get('view') === 'tests') {
    view = 'tests';
    testNavType = params.get('type') || 'all';
    testNavProblem = params.get('problem') || null;
    testNavFeature = params.get('tfeature') || null;
    activePanelKey = null;
    return;
  }

  const featureKey = params.get('feature');
  if (!featureKey) return;
  const isKnownFeature = Array.isArray(D?.features) && D.features.some(f => f.key === featureKey);
  if (featureKey === '__unmapped__' || isKnownFeature) {
    view = 'features';
    drillFeatureKey = featureKey;
    drillTestType = null;
    activePanelKey = null;
  }
}

function updateRunAllBtn(state) {
  const btn = document.getElementById('runAllBtn');
  if (!btn) return;
  btn.className = state || '';
  btn.disabled = state === 'running';
  if (state === 'running') {
    btn.textContent = '⏳ Тесты...';
  } else if (state === 'done-ok') {
    btn.textContent = '✅ Все прошли';
    setTimeout(() => updateRunAllBtn(null), 5000);
  } else if (state === 'done-fail') {
    btn.textContent = '❌ Есть падения';
    setTimeout(() => updateRunAllBtn(null), 8000);
  } else {
    btn.textContent = '▶ Все тесты';
  }
}

async function runAllTests() {
  if (runAllRunning) return;
  runAllRunning = true;
  updateRunAllBtn('running');
  await fetch('/api/run-all-tests', { method: 'POST' });
}

// ─── Agent ────────────────────────────────────────────────────────────────────
let agentRunning = false;
const agentRunningPaths = new Set(); // paths of files currently being processed by agent
const agentQueuedPaths  = new Set(); // paths of files waiting in queue
let agentQueueState = [];
let docActualizeRunningKey = null; // featureKey currently being actualized

function setDocActualizeStatus(key, html) {
  docActualizeRunningKey = key;
  const el = document.getElementById('docActualizeStatus');
  if (!el) return;
  if (html) { el.style.display = 'block'; el.innerHTML = html; }
  else { el.style.display = 'none'; el.innerHTML = ''; }
}
let agentRunsState = [];
let agentActiveRun = null;
let currentRunId = null;

// ─── Console Sessions ─────────────────────────────────────────────────────────
const consoleSessions  = [];   // { id, title, lines, status, startTime }
let activeSessionId    = null; // currently viewed tab
let runningSessionId   = null; // tab that is currently receiving output
const runSessionMap    = new Map(); // runId -> sessionId
const sessionRunMap    = new Map(); // sessionId -> runId
const SESSION_MAX      = 25;
const SESSION_LINE_LIMIT = 3000;
const RENDER_LINE_LIMIT  = 500;  // max DOM nodes rendered at once
const SESSIONS_KEY     = 'viberadar_sessions';
let terminalSearchQuery = '';
let terminalSearchErrorsOnly = false;
let terminalSearchCurrentRunOnly = false;
let terminalSearchRegex = false;
let terminalMatchRefs = [];
let terminalCommandRefs = [];
let terminalErrorRefs = [];
let terminalMatchCursor = -1;
let terminalCommandCursor = -1;
let terminalErrorCursor = -1;

function _sessionId() {
  return 's' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
}

function saveSessions() {
  try {
    const data = consoleSessions.slice(-SESSION_MAX).map(s => ({
      ...s,
      runId: sessionRunMap.get(s.id) || s.runId || null,
      lines: s.lines.slice(-500)
    }));
    localStorage.setItem(SESSIONS_KEY, JSON.stringify(data));
  } catch {}
}

function restoreSessions() {
  try {
    const raw = localStorage.getItem(SESSIONS_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    consoleSessions.push(...saved);
    for (const s of consoleSessions) {
      if (s.runId) {
        runSessionMap.set(s.runId, s.id);
        sessionRunMap.set(s.id, s.runId);
      }
    }
    if (consoleSessions.length > 0) {
      activeSessionId = consoleSessions[consoleSessions.length - 1].id;
      renderTabs();
      renderActiveSession();
    }
  } catch {}
}

function createSession(title, status = 'running', runId = null) {
  if (consoleSessions.length >= SESSION_MAX) {
    const dropped = consoleSessions.shift();
    if (dropped?.id) {
      const droppedRunId = sessionRunMap.get(dropped.id);
      if (droppedRunId) runSessionMap.delete(droppedRunId);
      sessionRunMap.delete(dropped.id);
    }
  }
  const s = { id: _sessionId(), title, lines: [], status, startTime: Date.now(), runId };
  consoleSessions.push(s);
  activeSessionId = s.id;
  if (runId) {
    runSessionMap.set(runId, s.id);
    sessionRunMap.set(s.id, runId);
  }
  document.getElementById('agentPanel').classList.add('open');
  document.getElementById('termBtn').classList.add('term-active');
  renderTabs();
  renderActiveSession();
  saveSessions();
  return s.id;
}

function switchSession(id) {
  activeSessionId = id;
  currentRunId = sessionRunMap.get(id) || null;
  const s = consoleSessions.find(s => s.id === id);
  if (s) {
    const statusText = s.status === 'running' ? 'работает…'
      : s.status === 'ok'    ? '✅ готово'
      : s.status === 'error' ? '❌ ошибка'
      : '';
    document.getElementById('agentPanelTitle').textContent  = s.title;
    document.getElementById('agentPanelStatus').textContent = statusText;
  }
  renderTabs();
  renderActiveSession();
}

function closeSession(id) {
  const idx = consoleSessions.findIndex(s => s.id === id);
  if (idx === -1) return;
  const runId = sessionRunMap.get(id);
  if (runId) {
    sessionRunMap.delete(id);
    runSessionMap.delete(runId);
  }
  consoleSessions.splice(idx, 1);
  if (activeSessionId === id) {
    activeSessionId = consoleSessions.length > 0
      ? consoleSessions[Math.min(idx, consoleSessions.length - 1)].id
      : null;
  }
  renderTabs();
  renderActiveSession();
  saveSessions();
}

function appendToSession(id, lineOrNode, isError = false, isDim = false) {
  const s = consoleSessions.find(s => s.id === id);
  if (!s) return;
  let stored;
  if (typeof lineOrNode === 'string') {
    stored = { text: lineOrNode, isError, isDim };
  } else {
    stored = { html: lineOrNode.outerHTML };
  }
  s.lines.push(stored);
  if (s.lines.length > SESSION_LINE_LIMIT) {
    s.lines.splice(0, s.lines.length - SESSION_LINE_LIMIT);
  }
  if (activeSessionId === id) {
    renderActiveSession();
  }
}

function updateSessionStatus(id, status) {
  const s = consoleSessions.find(s => s.id === id);
  if (!s) return;
  s.status = status;
  renderTabs();
  saveSessions();
}

function renderTabs() {
  const bar = document.getElementById('agentTabsBar');
  if (!bar) return;
  bar.innerHTML = consoleSessions.map(s => {
    const isActive = s.id === activeSessionId;
    const safe = s.title.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return `<div class="agent-tab${isActive ? ' active' : ''}"
        onclick="switchSession('${s.id}')"
        onmousedown="if(event.button===1){event.preventDefault();event.stopPropagation();closeSession('${s.id}')}">
      <span class="tab-dot tab-dot-${s.status}"></span>
      <span class="agent-tab-title" title="${safe}">${safe}</span>
      <button class="agent-tab-close" onclick="event.stopPropagation();closeSession('${s.id}')" title="Закрыть вкладку">×</button>
    </div>`;
  }).join('');
  const active = bar.querySelector('.agent-tab.active');
  if (active) active.scrollIntoView({ block: 'nearest', inline: 'nearest' });
}

function copyTerminalContent() {
  const s = consoleSessions.find(s => s.id === activeSessionId);
  if (!s || s.lines.length === 0) return;
  // Extract plain text from each line (strip HTML for rich nodes)
  const text = s.lines.map(l => {
    if (l.text !== undefined) return l.text;
    if (l.html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = l.html;
      return tmp.innerText;
    }
    return '';
  }).filter(Boolean).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('agentCopyBtn');
    if (!btn) return;
    const prev = btn.textContent;
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = prev; btn.classList.remove('copied'); }, 1500);
  });
}

function downloadTextArtifact(filename, content) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    URL.revokeObjectURL(a.href);
    a.remove();
  }, 100);
}

function getActiveRunForExport() {
  const runId = sessionRunMap.get(activeSessionId) || currentRunId;
  if (runId) {
    const fromState = (agentRunsState || []).find((r) => r.runId === runId);
    if (fromState) return fromState;
  }
  return null;
}

function exportActiveRun() {
  const run = getActiveRunForExport();
  const session = consoleSessions.find((s) => s.id === activeSessionId);
  if (!run && !session) {
    flashToolbarHint('Нечего экспортировать');
    return;
  }
  const mode = window.prompt('Формат экспорта: md или json', 'md');
  const format = (mode || 'md').trim().toLowerCase() === 'json' ? 'json' : 'md';
  const ts = new Date().toISOString().replace(/[:.]/g, '-');
  const runId = run?.runId || sessionRunMap.get(activeSessionId) || 'session';
  if (format === 'json') {
    const payload = {
      run,
      sessionTitle: session?.title || null,
      lines: (session?.lines || []).map((line) => extractLineText(line)),
      exportedAt: new Date().toISOString(),
    };
    downloadTextArtifact(`viberadar-run-${runId}-${ts}.json`, JSON.stringify(payload, null, 2));
    return;
  }
  const lines = (session?.lines || []).map((line) => extractLineText(line)).filter(Boolean);
  const outcomes = Array.isArray(run?.fileOutcomes) ? run.fileOutcomes : [];
  const stats = run?.validationStats || {};
  const md = [
    `# VibeRadar Run Export`,
    ``,
    `- runId: ${run?.runId || runId}`,
    `- title: ${run?.title || session?.title || '-'}`,
    `- phase: ${run?.phase || '-'}`,
    `- exportedAt: ${new Date().toISOString()}`,
    ``,
    `## Validation`,
    ``,
    `- covered: ${stats.covered ?? 0}`,
    `- not-covered: ${stats.notCovered ?? 0}`,
    `- blocked: ${stats.blocked ?? 0}`,
    `- infra: ${stats.infra ?? 0}`,
    ``,
    `## File Outcomes`,
    ``,
    ...outcomes.map((o) => `- ${o.status}: ${o.sourcePath}${o.testFile ? ` -> ${o.testFile}` : ''}${o.reason ? ` (${o.reason})` : ''}`),
    ``,
    `## Logs`,
    ``,
    '```text',
    ...lines,
    '```',
  ].join('\n');
  downloadTextArtifact(`viberadar-run-${runId}-${ts}.md`, md);
}

function renderActiveSession() {
  const term = document.getElementById('agentTerminal');
  if (!term) return;
  term.innerHTML = '';
  terminalMatchRefs = [];
  terminalCommandRefs = [];
  terminalErrorRefs = [];
  terminalMatchCursor = -1;
  terminalCommandCursor = -1;
  terminalErrorCursor = -1;
  const s = consoleSessions.find(s => s.id === activeSessionId);
  if (!s) {
    document.getElementById('agentSearchMeta').textContent = '0 matches';
    updateToolbarButtonsState();
    return;
  }
  const normalizedQuery = (terminalSearchQuery || '').trim();
  let regex = null;
  if (normalizedQuery && terminalSearchRegex) {
    try { regex = new RegExp(normalizedQuery, 'i'); } catch { regex = null; }
  }

  // Cap rendered lines to avoid browser freeze on large agent output
  const allLines = s.lines;
  const renderStart = Math.max(0, allLines.length - RENDER_LINE_LIMIT);
  if (renderStart > 0) {
    const notice = document.createElement('div');
    notice.className = 'agent-line dim';
    notice.textContent = `... показаны последние ${RENDER_LINE_LIMIT} из ${allLines.length} строк ...`;
    term.appendChild(notice);
  }

  for (let i = renderStart; i < allLines.length; i++) {
    const ln = allLines[i];
    const text = extractLineText(ln);
    // Exclude diff lines (+/-) from error detection to avoid false positives
    const isDiffLine = /^[+\-]/.test(text.trimStart());
    const isErrorLine = !!ln.isError || /(^|\s)❌/.test(text) || (!isDiffLine && /\berror\b/i.test(text));
    const isCommandLine = /^\s*⚡\s*\$/.test(text);
    if (terminalSearchCurrentRunOnly && currentRunId && s.runId && s.runId !== currentRunId) continue;
    if (terminalSearchErrorsOnly && !isErrorLine) continue;
    let isMatch = false;
    if (!normalizedQuery) {
      isMatch = false;
    } else if (regex) {
      isMatch = regex.test(text);
    } else {
      isMatch = text.toLowerCase().includes(normalizedQuery.toLowerCase());
    }
    if (normalizedQuery && !isMatch) continue;

    const el = document.createElement('div');
    if (ln.html) {
      el.innerHTML = ln.html;
    } else {
      el.className = 'agent-line' + (ln.isError ? ' err' : ln.isDim ? ' dim' : '');
      el.textContent = ln.text;
    }
    if (isCommandLine) el.classList.add('command');
    if (isMatch) el.classList.add('match');
    el.dataset.lineIndex = String(i);
    term.appendChild(el);
    if (isMatch) terminalMatchRefs.push(el);
    if (isCommandLine) terminalCommandRefs.push(el);
    if (isErrorLine) terminalErrorRefs.push(el);
  }
  term.scrollTop = term.scrollHeight;
  document.getElementById('agentSearchMeta').textContent =
    `${terminalMatchRefs.length} matches • ${terminalCommandRefs.length} commands • ${terminalErrorRefs.length} errors`;
  updateToolbarButtonsState();
}

function updateToolbarButtonsState() {
  const setState = (id, enabled) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.disabled = !enabled;
  };
  setState('btnMatchPrev', terminalMatchRefs.length > 0);
  setState('btnMatchNext', terminalMatchRefs.length > 0);
  setState('btnCmdPrev', terminalCommandRefs.length > 0);
  setState('btnCmdNext', terminalCommandRefs.length > 0);
  setState('btnErrPrev', terminalErrorRefs.length > 0);
  setState('btnErrNext', terminalErrorRefs.length > 0);
  const hasExport = !!getActiveRunForExport() || !!consoleSessions.find((s) => s.id === activeSessionId);
  setState('btnExportRun', hasExport);
}

function flashToolbarHint(text) {
  const meta = document.getElementById('agentSearchMeta');
  if (!meta) return;
  const previous = meta.textContent;
  meta.textContent = text;
  meta.style.color = 'var(--yellow)';
  setTimeout(() => {
    meta.style.color = '';
    if (meta.textContent === text) {
      meta.textContent = previous || '0 matches';
    }
  }, 1400);
}

function extractLineText(line) {
  if (!line) return '';
  if (line.text !== undefined) return String(line.text || '');
  if (line.html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = line.html;
    return tmp.innerText || '';
  }
  return '';
}

function jumpByRefs(refs, dir, cursorName) {
  if (!refs.length) {
    const label = cursorName === 'match' ? 'совпадений' : cursorName === 'command' ? 'команд' : 'ошибок';
    flashToolbarHint(`Нет ${label} для навигации`);
    return;
  }
  if (cursorName === 'match') {
    terminalMatchCursor = (terminalMatchCursor + dir + refs.length) % refs.length;
    refs[terminalMatchCursor].scrollIntoView({ block: 'center', behavior: 'smooth' });
    return;
  }
  if (cursorName === 'command') {
    terminalCommandCursor = (terminalCommandCursor + dir + refs.length) % refs.length;
    refs[terminalCommandCursor].scrollIntoView({ block: 'center', behavior: 'smooth' });
    return;
  }
  terminalErrorCursor = (terminalErrorCursor + dir + refs.length) % refs.length;
  refs[terminalErrorCursor].scrollIntoView({ block: 'center', behavior: 'smooth' });
}

function jumpTerminalMatch(dir) {
  jumpByRefs(terminalMatchRefs, dir > 0 ? 1 : -1, 'match');
}

function jumpCommand(dir) {
  jumpByRefs(terminalCommandRefs, dir > 0 ? 1 : -1, 'command');
}

function jumpError(dir) {
  jumpByRefs(terminalErrorRefs, dir > 0 ? 1 : -1, 'error');
}

// Returns array of normalized relative paths affected by a given task
function getTaskFilePaths(task, featureKey, filePath, selectedFilePaths) {
  if ((task === 'write-tests-file' || task === 'fix-tests') && filePath) {
    return [filePath.replace(/\\/g, '/')];
  }
  if ((task === 'write-tests-selected' || task === 'refresh-tests-selected') && Array.isArray(selectedFilePaths)) {
    return selectedFilePaths.map(p => p.replace(/\\/g, '/'));
  }
  if ((task === 'write-tests' || task === 'fix-tests-all') && featureKey && D?.modules) {
    return D.modules
      .filter(m => m.featureKeys?.includes(featureKey) && m.type !== 'test' && (!m.hasTests || m.testStale))
      .map(m => m.relativePath.replace(/\\/g, '/'));
  }
  return [];
}

// Returns 'running', 'queued', or null for a given relative path
function isFileAgentActive(relPath) {
  const n = relPath.replace(/\\/g, '/');
  if (agentRunningPaths.has(n)) return 'running';
  if (agentQueuedPaths.has(n))  return 'queued';
  return null;
}

function updateQueueBadge(n) {
  document.getElementById('agentQueueCount').textContent = n;
  document.getElementById('agentQueueBadge').style.display = n > 0 ? 'inline' : 'none';
  document.getElementById('agentQueueClearBtn').style.display = n > 0 ? 'inline-block' : 'none';
  renderQueuePanel();
}

function renderQueuePanel() {
  const panel = document.getElementById('agentQueuePanel');
  if (!panel) return;
  if (!Array.isArray(agentQueueState) || agentQueueState.length === 0) {
    panel.style.display = 'none';
    panel.innerHTML = '';
    return;
  }
  panel.style.display = 'block';
  panel.innerHTML = `
    <div class="agent-queue-title">Очередь задач (${agentQueueState.length})</div>
    ${agentQueueState.map((item, idx) => `
      <div class="agent-queue-item">
        <span class="agent-queue-pos">#${item.position ?? idx + 1}</span>
        <span title="${escapeHtml(item.title || '')}">${escapeHtml(item.title || item.task || item.runId)}</span>
        <span style="color:var(--dim)">(${escapeHtml(item.task || 'task')})</span>
        <div class="agent-queue-actions">
          <button class="agent-queue-action" onclick="reorderQueueItem('${item.runId}','up')" title="Сдвинуть вверх">↑</button>
          <button class="agent-queue-action" onclick="reorderQueueItem('${item.runId}','down')" title="Сдвинуть вниз">↓</button>
          <button class="agent-queue-action" onclick="cancelQueueItem('${item.runId}')" title="Отменить задачу">✕</button>
          <button class="agent-queue-action" onclick="retryRun('${item.runId}')" title="Retry">↻</button>
        </div>
      </div>
    `).join('')}
  `;
}

async function cancelQueueItem(runId) {
  await fetch(`/api/queue/${encodeURIComponent(runId)}/cancel`, { method: 'POST' });
  await loadAgentState();
}

async function retryRun(runId) {
  await fetch(`/api/queue/${encodeURIComponent(runId)}/retry`, { method: 'POST' });
  await loadAgentState();
}

async function reorderQueueItem(runId, direction) {
  await fetch(`/api/queue/${encodeURIComponent(runId)}/reorder`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ direction }),
  });
  await loadAgentState();
}

function ensureSessionForRun(run, makeActive = false) {
  if (!run?.runId) return null;
  let sessionId = runSessionMap.get(run.runId);
  if (!sessionId) {
    sessionId = createSession(run.title || `Run ${run.runId}`, run.phase === 'failed' ? 'error' : run.phase === 'completed' ? 'ok' : 'running', run.runId);
    const meta = [`runId: ${run.runId}`, `phase: ${run.phase}`];
    if (Array.isArray(run.targetSourcePaths) && run.targetSourcePaths.length > 0) {
      meta.push(`targets: ${run.targetSourcePaths.length}`);
    }
    appendToSession(sessionId, `ℹ ${meta.join(' • ')}`, false, true);
  }
  if (makeActive) switchSession(sessionId);
  return sessionId;
}

function applyAgentStateSnapshot(state) {
  if (!state) return;
  agentQueueState = Array.isArray(state.queue) ? state.queue : [];
  agentRunsState = Array.isArray(state.runs) ? state.runs : [];
  agentActiveRun = state.activeRun || null;
  updateQueueBadge(agentQueueState.length);
  if (agentActiveRun?.runId) {
    currentRunId = agentActiveRun.runId;
    ensureSessionForRun(agentActiveRun);
    setAgentRunning(['starting', 'running', 'validating'].includes(agentActiveRun.phase));
  } else {
    setAgentRunning(false);
  }
}

async function loadAgentState() {
  try {
    const res = await fetch('/api/agent/state');
    if (!res.ok) return;
    const state = await res.json();
    applyAgentStateSnapshot(state);
  } catch {}
}

function upsertRunState(run) {
  if (!run?.runId) return;
  const idx = agentRunsState.findIndex((r) => r.runId === run.runId);
  if (idx >= 0) agentRunsState[idx] = { ...agentRunsState[idx], ...run };
  else agentRunsState.push(run);
  if (agentRunsState.length > 80) {
    agentRunsState = agentRunsState.slice(agentRunsState.length - 80);
  }
}

function updateSessionFromRun(run) {
  if (!run?.runId) return;
  upsertRunState(run);
  if (['starting', 'running', 'validating'].includes(run.phase)) {
    setAgentRunning(true);
    currentRunId = run.runId;
    const sid = ensureSessionForRun(run);
    if (sid) {
      runningSessionId = sid;
      if (activeSessionId === sid) {
        document.getElementById('agentPanelTitle').textContent = '🤖 ' + (run.title || 'Agent');
        document.getElementById('agentPanelStatus').textContent = run.phase === 'validating' ? 'проверяю…' : 'работает…';
      }
    }
    return;
  }
  const sid = runSessionMap.get(run.runId);
  if (sid) {
    const status = run.phase === 'completed' ? 'ok' : run.phase === 'canceled' ? 'error' : run.phase === 'failed' ? 'error' : 'info';
    updateSessionStatus(sid, status);
    if (runningSessionId === sid) runningSessionId = null;
    if (activeSessionId === sid) {
      document.getElementById('agentPanelStatus').textContent =
        run.phase === 'completed' ? '✅ готово' : run.phase === 'canceled' ? '⏹ отменено' : run.phase === 'failed' ? '❌ ошибка' : run.phase;
    }
  }
  if (run.phase === 'completed' || run.phase === 'failed' || run.phase === 'canceled') {
    if (agentActiveRun?.runId === run.runId) agentActiveRun = null;
    if (currentRunId === run.runId) currentRunId = null;
    setAgentRunning(false);
  }
}

function refreshPathActivityFromState() {
  agentQueuedPaths.clear();
  (agentQueueState || []).forEach((q) => {
    getTaskFilePaths(q.task, q.featureKey, q.filePath, q.selectedFilePaths).forEach((p) => agentQueuedPaths.add(p));
  });
  if (!agentActiveRun || !['starting', 'running', 'validating'].includes(agentActiveRun.phase)) {
    agentRunningPaths.clear();
  }
}

async function cancelAgent() {
  await fetch('/api/cancel-agent', { method: 'POST' });
  await loadAgentState();
  document.getElementById('agentPanelStatus').textContent = '⏹ сброшен';
  if (runningSessionId) {
    appendToSession(runningSessionId, '⏹ Состояние агента сброшено (очередь очищена)', false);
    updateSessionStatus(runningSessionId, 'error');
    runningSessionId = null;
  } else {
    appendTerminalLine('⏹ Состояние агента сброшено (очередь очищена)', false);
  }
}

async function clearAgentQueue() {
  await fetch('/api/clear-queue', { method: 'POST' });
  await loadAgentState();

function obsUpdateSelectedCount(groupId) {
  const container = document.getElementById('obs-detail-' + groupId);
  if (!container) return;
  const checked = container.querySelectorAll('input[type="checkbox"]:checked').length;
  const btn = container.querySelector('.obs-run-selected');
  if (btn) {
    const fieldName = btn.dataset.obsFieldName;
    if (fieldName) {
      const n = checked;
      const suffix = n === 1 ? 'модуль' : n < 5 ? 'модуля' : 'модулей';
      btn.textContent = n > 0 ? `Добавить \`${fieldName}\` в ${n} ${suffix}` : `Добавить \`${fieldName}\``;
    } else {
      const baseLabel = btn.dataset.baseLabel || btn.textContent.replace(/\s*\(\d+\)$/, '');
      btn.dataset.baseLabel = baseLabel;
      btn.textContent = checked > 0 ? `${baseLabel} (${checked})` : baseLabel;
    }
    btn.disabled = checked === 0;
  }
  // Update floating action bar
  const bar = document.getElementById('obsFloatingBar');
  if (!bar) return;
  if (checked > 0) {
    const action = container.dataset.obsAction || '';
    const actionLabels = { missing: 'добавить логи', field: 'Добавить поле', rec: 'исправить' };
    const groupLabel = container.dataset.obsLabel || '';
    const fieldMeta = action === 'field' && container.dataset.obsMeta ? JSON.parse(container.dataset.obsMeta) : null;
    bar.dataset.groupId = groupId;
    document.getElementById('obsFloatingCount').textContent = `${checked} выбрано`;
    document.getElementById('obsFloatingLabel').textContent = fieldMeta ? `\`${fieldMeta.fieldName}\`` : groupLabel;
    document.getElementById('obsFloatingBtn').textContent = actionLabels[action] || 'исправить';
    bar.classList.add('visible');
  } else {
    if (bar.dataset.groupId === groupId) {
      bar.classList.remove('visible');
      delete bar.dataset.groupId;
    }
  }
}

function obsDispatchFloating() {
  const bar = document.getElementById('obsFloatingBar');
  if (!bar) return;
  const groupId = bar.dataset.groupId;
  if (!groupId) return;
  const container = document.getElementById('obs-detail-' + groupId);
  if (!container) return;
  const action = container.dataset.obsAction || '';
  if (action === 'missing') {
    obsMissingRunSelected(groupId);
  } else {
    const meta = container.dataset.obsMeta ? JSON.parse(container.dataset.obsMeta) : {};
    obsRunSelected(groupId, 'obs-fix-selected', meta);
  }
  bar.classList.remove('visible');
}

function obsTimeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return `${s}с назад`;
  if (s < 3600) return `${Math.floor(s / 60)} мин назад`;
  if (s < 86400) return `${Math.floor(s / 3600)}ч назад`;
  return `${Math.floor(s / 86400)}д назад`;
}

function obsResetBaseline(key) {

function obsFloatingDismiss() {
  const bar = document.getElementById('obsFloatingBar');
  if (!bar) return;
  const groupId = bar.dataset.groupId;
  if (groupId) {
    const container = document.getElementById('obs-detail-' + groupId);
    if (container) {
      container.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      const btn = container.querySelector('.obs-run-selected');
      if (btn) { btn.textContent = btn.dataset.baseLabel || btn.textContent.replace(/\s*\(\d+\)$/, ''); btn.disabled = true; }
    }
    delete bar.dataset.groupId;
  }
  bar.classList.remove('visible');
}

function obsToggleAll(groupId) {
  const container = document.getElementById('obs-detail-' + groupId);
  if (!container) return;
  const boxes = container.querySelectorAll('input[type="checkbox"]');
  const allChecked = Array.from(boxes).every(b => b.checked);
  boxes.forEach(b => b.checked = !allChecked);
  obsUpdateSelectedCount(groupId);
}

function obsRunSelected(groupId, task, baseMeta) {
  const container = document.getElementById('obs-detail-' + groupId);
  if (!container) return;
  const paths = [];
  container.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
    if (cb.dataset.path) paths.push(cb.dataset.path);
  });
  if (paths.length === 0) return;
  runAgentTask('obs-fix-selected', null, null, null, { ...baseMeta, catalogPaths: paths });
}

function obsMissingRunSelected(groupId) {
  const container = document.getElementById('obs-detail-' + groupId);
  if (!container) return;
  const indices = [];
  container.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.missingIdx, 10);
    if (!isNaN(idx)) indices.push(idx);
  });
  if (indices.length === 0) return;
  runAgentTask('obs-fix-selected', null, null, null, { missingLogIndices: indices, recommendationType: 'add event' });
}

// ─── Rescan ───────────────────────────────────────────────────────────────────
async function rescan() {
  const btn = document.getElementById('rescanBtn');
  const statusEl = document.getElementById('rescanStatus');
  if (!btn || btn.classList.contains('spinning')) return;

  btn.classList.add('spinning');
  rescanPending = true;
  if (statusEl) { statusEl.className = 'status-scanning'; statusEl.textContent = 'Сканирую…'; }

  try {
    // Server returns 202 immediately, scans in background.
    // When done it broadcasts 'data-updated' via SSE → refreshData() fires and clears the spinner.
    const res = await fetch('/api/rescan', { method: 'POST' });
    if (!res.ok) throw new Error('rescan ' + res.status);
  } catch (e) {
    console.error('Rescan error:', e);
    rescanPending = false;
    btn.classList.remove('spinning');
    if (statusEl) { statusEl.className = 'status-error'; statusEl.textContent = '⚠ ошибка сканирования'; }
  }
}

async function init() {

      fetch('/api/data'),
      fetch('/api/status').catch(() => null),
    ]);
    D = await res.json();

    if (statusRes) {
      const status = await statusRes.json().catch(() => ({}));
      D.agentRunning = status.agentRunning ?? false;
    }
    updateAgentBtn();
    updateAgentRightsInfo();

    document.getElementById('projectName').textContent = D.projectName;
    document.getElementById('scannedAt').textContent =
      new Date(D.scannedAt).toLocaleTimeString();

    contextMode = getModeFromPath();
    view = D.hasConfig ? 'features' : 'files';
    const _obsHash = window.location.hash;
    if (_obsHash.startsWith('#obs-tab=')) obsActiveTab = _obsHash.replace('#obs-tab=', '');
    applyHashRoute();

    if (!D.hasConfig) {
      document.querySelector('[data-view="features"]').classList.add('disabled');
      modeStore.qa.view = 'files';
    }
    modeStore.qa.view = D.hasConfig ? modeStore.qa.view : 'files';
    restoreModeState(contextMode);
    if (contextMode === 'observability') {
      view = 'files';
      drillFeatureKey = null;
      drillTestType = null;
      activePanelKey = null;
    }
    setModeRoute(contextMode, true);
    document.getElementById('searchInput').value = searchQuery;

    document.getElementById('loading').style.display = 'none';
    renderStats();
    renderSidebar();
    renderContent();
  } catch (err) {
    document.getElementById('loading').textContent = '❌ Failed to load: ' + err.message;
  }
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function renderStats() {
  const src = D.modules.filter(m => m.type !== 'test');
  const tested = src.filter(m => m.hasTests).length;
  const testFiles = D.modules.filter(m => m.type === 'test').length;
  const pct = src.length ? Math.round(tested / src.length * 100) : 0;

  let items;
  if (contextMode === 'observability') {
    const o = D.observability;
    if (o) {
      const noiseRatio = Math.round(o.metrics.noise_ratio * 100);
      const structPct = Math.round(o.metrics.structured_completeness * 100);
      const v2 = o.missingCriticalLogsV2 || [];
      const missingCoverage = v2.length || o.missingCriticalLogs.length;
      const totalFPs = v2.reduce((s,m) => s + m.failurePoints.length, 0);
      const noisyCount = o.topNoisyPatterns.length;
      items = [
        { v: o.catalog.length, l: 'Источники логов' },
        { v: noiseRatio + '%', l: 'Коэффициент шума', c: noiseRatio > 30 ? '#f85149' : noiseRatio > 10 ? '#e3b341' : undefined },
        { v: structPct + '%', l: 'Структурированность', c: structPct < 50 ? '#f85149' : structPct < 80 ? '#e3b341' : undefined },
        { v: totalFPs || missingCoverage, l: totalFPs ? 'Точек отказа' : 'Нет покрытия', c: totalFPs > 10 ? '#f85149' : (totalFPs || missingCoverage) ? '#e3b341' : undefined },
        { v: noisyCount, l: 'Шумных паттернов', c: noisyCount ? '#e3b341' : undefined },
      ];
    } else {
      const serviceSources = src.filter(m => m.type === 'service' || m.type === 'util' || m.type === 'other');
      items = [
        { v: serviceSources.length, l: 'Источники логов' },
        { v: '—', l: 'Коэффициент шума' },
        { v: '—', l: 'Структурированность' },
        { v: '—', l: 'Нет покрытия' },
        { v: '—', l: 'Шумных паттернов' },
      ];
    }
  } else if (contextMode === 'services') {
    const sm = D.serviceMap;
    if (sm) {
      items = [
        { v: sm.nodes.length, l: 'Сервисов' },
        { v: sm.edges.length, l: 'Зависимостей' },
        { v: sm.pipelines.length, l: 'Пайплайнов' },
        { v: sm.autodiscovery.dockerServices + sm.autodiscovery.envConnections + sm.autodiscovery.npmServices, l: 'Автодискаверинг' },
        sm.nodes.filter(n => n.alerts && n.alerts.length > 0).length > 0
          ? { v: sm.nodes.reduce((s, n) => s + (n.alerts?.length || 0), 0), l: 'Алертов' }
          : null,
      ].filter(Boolean);
    } else {
      items = [
        { v: 0, l: 'Сервисов' },
        { v: '—', l: 'Зависимостей' },
        { v: '—', l: 'Пайплайнов' },
      ];
    }
  } else if (D.hasConfig && D.features) {
    const unmapped = src.filter(m => !m.isInfra && (!m.featureKeys || m.featureKeys.length === 0)).length;
    items = [
      { v: D.features.length,   l: 'Features' },
      { v: src.length,          l: 'Source Files' },
      { v: pct + '%',           l: 'With Tests' },
      { v: testFiles,           l: 'Test Files' },
      unmapped > 0 ? { v: unmapped, l: 'Unmapped', c: '#e3b341' } : null,
    ].filter(Boolean);
  } else {
    items = [
      { v: D.modules.length, l: 'Modules' },
      { v: tested,           l: 'With Tests' },
      { v: pct + '%',        l: 'Test Coverage' },
      { v: testFiles,        l: 'Test Files' },
    ];
  }

  document.getElementById('statsBar').innerHTML = items.map(s =>
    `<div class="stat">
       <span class="stat-value"${s.c ? ` style="color:${s.c}"` : ''}>${s.v}</span>
       <span class="stat-label">${s.l}</span>
     </div>`
  ).join('');
}

      <div style="padding:0 6px;font-size:12px">
        <div style="color:var(--dim);margin-bottom:4px">Статус</div>
        <div style="color:${statusColor};font-weight:600">${statusLabel}</div>
      </div>
      ${ls && ls.status !== 'idle' ? `
        <div style="padding:8px 6px 0;font-size:12px;color:var(--muted)">
          <div>Запросов: <span style="color:var(--text)">${ls.totalRequests || 0}</span></div>
          <div>Ошибок: <span style="color:${(ls.totalErrors||0)>0?'var(--red)':'var(--text)'}">${ls.totalErrors || 0}</span></div>
          ${ls.summary ? `<div>RPS: <span style="color:var(--text)">${(ls.summary.rps||0).toFixed(1)}</span></div>
          <div>avg: <span style="color:var(--text)">${Math.round(ls.summary.avgDuration||0)}ms</span></div>
          <div>p90: <span style="color:var(--text)">${Math.round(ls.summary.p90Duration||0)}ms</span></div>` : ''}
        </div>` : ''}
      ${loadK6Available === false ? `<div style="padding:8px 6px;font-size:11px;color:var(--red)">⚠ k6 не найден.<br>Установите: <code>choco install k6</code></div>` : ''}`;
    return;
  }

  if (contextMode === 'services') {
    tabs.style.display = 'none';
    const svcTab = modeStore.services.svcTab || 'graph';
    extra.innerHTML = `
      <div class="sidebar-label">Карта сервисов</div>
      <div style="font-size:12px;color:var(--muted);padding:0 6px;line-height:1.45;margin-bottom:12px">
        Зависимости, пайплайны, экспорт для мониторинга.
      </div>
      <div class="svc-sidebar-tabs">
        <button class="svc-sidebar-tab ${svcTab === 'graph' ? 'active' : ''}" data-svctab="graph">Граф</button>
        <button class="svc-sidebar-tab ${svcTab === 'pipelines' ? 'active' : ''}" data-svctab="pipelines">Пайплайны</button>
        <button class="svc-sidebar-tab ${svcTab === 'export' ? 'active' : ''}" data-svctab="export">Экспорт</button>
      </div>`;
    extra.querySelectorAll('.svc-sidebar-tab').forEach(btn => {
      btn.onclick = () => {
        modeStore.services.svcTab = btn.dataset.svctab;
        renderSidebar();
        renderContent();
      };
    });
    return;
  }

  tabs.style.display = 'flex';
  document.querySelectorAll('.view-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.view === view)
  );

  if (view === 'tests') { renderTestNavSidebar(extra); return; }
  if (view !== 'files') { extra.innerHTML = ''; return; }

  const types = [...new Set(D.modules.map(m => m.type))].sort();
  extra.innerHTML = `
    <div class="sidebar-label">Type</div>
    <div>
      <div class="type-filter ${activeTypes.size === 0 ? 'active' : ''}" data-t="all">
        <span class="type-dot" style="background:#7d8590"></span>
        All
        <span class="type-count">${D.modules.length}</span>
      </div>
      ${types.map(t => `
        <div class="type-filter ${activeTypes.has(t) ? 'active' : ''}" data-t="${t}">
          <span class="type-dot" style="background:${TYPE_COLORS[t] || '#484f58'}"></span>
          ${t}
          <span class="type-count">${D.modules.filter(m => m.type === t).length}</span>
        </div>
      `).join('')}
    </div>`;

  extra.querySelectorAll('.type-filter').forEach(el => {
    el.onclick = () => {
      const t = el.dataset.t;
      if (t === 'all') activeTypes.clear();
      else if (activeTypes.has(t)) activeTypes.delete(t);
      else activeTypes.add(t);
      renderSidebar();
      renderContent();
    };
  });
}

// ─── Content ──────────────────────────────────────────────────────────────────
function renderContent() {
  const c = document.getElementById('content');
  if (contextMode === 'observability') {
    renderObservability(c);
    return;
  }
  if (contextMode === 'docs') {
    renderDocumentation(c);
    return;
  }
  if (contextMode === 'scenarios') {
    renderScenarios(c);
    return;
  }
  if (contextMode === 'services') {
    renderServiceMap(c);
    return;
  }
  if (contextMode === 'load') {
    renderLoad(c);
    return;
  }

  if (view === 'features') {
    if (drillFeatureKey === '__unmapped__') renderUnmappedDetail(c);
    else if (drillFeatureKey) renderFeatureDetail(c);
    else renderFeatureCards(c);
  } else if (view === 'tests') {
    renderTestNavigator(c);
  } else {
    renderModuleGrid(c);
  }
}

// ─── Service Map rendering ──────────────────────────────────────────────────

const SVC_CATEGORY_COLORS = {
  'database':         { fill: '#1a3a2a', stroke: '#3fb950', text: '#3fb950' },
  'cache':            { fill: '#3a2a1a', stroke: '#ffa657', text: '#ffa657' },
  'queue':            { fill: '#2a1a3a', stroke: '#d2a8ff', text: '#d2a8ff' },
  'storage':          { fill: '#1a2a3a', stroke: '#58a6ff', text: '#58a6ff' },
  'external-api':     { fill: '#3a1a2a', stroke: '#f85149', text: '#f85149' },
  'internal-service': { fill: '#1a2a2a', stroke: '#79c0ff', text: '#79c0ff' },
  'worker':           { fill: '#2a2a1a', stroke: '#e3b341', text: '#e3b341' },
  'gateway':          { fill: '#2a1a2a', stroke: '#a371f7', text: '#a371f7' },
};

const SVC_GROUP_ORDER = ['gateway', 'external', 'services', 'workers', 'queues', 'cache', 'storage', 'databases'];
const SVC_GROUP_LABELS = { gateway: 'Шлюзы', external: 'Внешние API', services: 'Сервисы', workers: 'Воркеры', queues: 'Очереди', cache: 'Кэш', storage: 'Хранилище', databases: 'Базы данных' };

function renderServiceMap(c) {
  const sm = D.serviceMap;
  if (!sm || sm.nodes.length === 0) {
    c.innerHTML = `<div class="svc-empty">
      <h3>Карта сервисов пуста</h3>
      <p>Автодискаверинг не нашёл сервисов. Добавь секцию <code>services</code> в <code>viberadar.config.json</code> или убедись что в проекте есть docker-compose.yml / .env файлы.</p>
    </div>`;
    return;
  }
  const svcTab = modeStore.services.svcTab || 'graph';
  if (svcTab === 'graph') renderSvcGraph(c, sm);
  else if (svcTab === 'pipelines') renderSvcPipelines(c, sm);
  else if (svcTab === 'export') renderSvcExport(c, sm);
}

function renderSvcGraph(c, sm) {
  // Group nodes
  const groups = {};
  for (const node of sm.nodes) {
    const g = node.group || 'services';
    if (!groups[g]) groups[g] = [];
    groups[g].push(node);
  }

  const NODE_W = 130, NODE_H = 56, PAD_X = 40, PAD_Y = 24, GROUP_PAD = 50;
  const orderedGroups = SVC_GROUP_ORDER.filter(g => groups[g]?.length > 0);

  // Calculate positions
  const positions = {};
  let maxRowW = 0;
  for (const g of orderedGroups) {
    const row = groups[g];
    maxRowW = Math.max(maxRowW, row.length * (NODE_W + PAD_X));
  }

  const svgW = Math.max(maxRowW + PAD_X * 2, 600);
  let curY = GROUP_PAD;
  const groupYPositions = {};

  for (const g of orderedGroups) {
    const row = groups[g];
    groupYPositions[g] = curY;
    const totalW = row.length * NODE_W + (row.length - 1) * PAD_X;
    const startX = (svgW - totalW) / 2;
    row.forEach((node, i) => {
      positions[node.id] = {
        x: startX + i * (NODE_W + PAD_X) + NODE_W / 2,
        y: curY + NODE_H / 2 + 20,  // 20px for group label
      };
    });
    curY += NODE_H + PAD_Y + GROUP_PAD;
  }
  const svgH = curY + GROUP_PAD;

  // Build SVG
  let svg = `<svg class="svc-graph-svg" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<defs>
    <marker id="svc-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="var(--border)"/>
    </marker>
    <marker id="svc-arrow-critical" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#f85149"/>
    </marker>
    <marker id="svc-arrow-hl" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="var(--accent)"/>
    </marker>
  </defs>`;

  // Group labels
  for (const g of orderedGroups) {
    const y = groupYPositions[g];
    svg += `<text x="16" y="${y + 12}" class="svc-group-label">${SVC_GROUP_LABELS[g] || g}</text>`;
  }

  // Edges
  for (const edge of sm.edges) {
    const from = positions[edge.from];
    const to = positions[edge.to];
    if (!from || !to) continue;
    const cls = edge.critical ? 'svc-edge critical' : 'svc-edge';
    const marker = edge.critical ? 'url(#svc-arrow-critical)' : 'url(#svc-arrow)';
    // Bezier curve
    const dy = to.y - from.y;
    const dx = to.x - from.x;
    const cp = Math.abs(dy) * 0.4;
    const path = `M ${from.x} ${from.y + NODE_H/2} C ${from.x} ${from.y + NODE_H/2 + cp}, ${to.x} ${to.y - NODE_H/2 - cp}, ${to.x} ${to.y - NODE_H/2}`;
    svg += `<path d="${path}" class="${cls}" marker-end="${marker}" data-from="${edge.from}" data-to="${edge.to}"/>`;
    if (edge.label) {
      const mx = (from.x + to.x) / 2;
      const my = (from.y + to.y) / 2;
      svg += `<text x="${mx}" y="${my}" class="svc-edge-label" text-anchor="middle">${edge.label}</text>`;
    }
  }

  // Nodes
  for (const node of sm.nodes) {
    const pos = positions[node.id];
    if (!pos) continue;
    const colors = SVC_CATEGORY_COLORS[node.category] || SVC_CATEGORY_COLORS['internal-service'];
    const x = pos.x - NODE_W / 2;
    const y = pos.y - NODE_H / 2;
    svg += `<g class="svc-node-group" data-nodeid="${node.id}" transform="translate(${x},${y})">`;
    svg += `<rect class="svc-node-rect" width="${NODE_W}" height="${NODE_H}" fill="${colors.fill}" stroke="${colors.stroke}"/>`;
    svg += `<text class="svc-node-icon" x="${NODE_W/2}" y="22" text-anchor="middle">${node.icon || '📦'}</text>`;
    svg += `<text class="svc-node-label" x="${NODE_W/2}" y="36" text-anchor="middle">${truncateText(node.label, 16)}</text>`;
    svg += `<text class="svc-node-category" x="${NODE_W/2}" y="48" text-anchor="middle">${node.category}</text>`;
    svg += `</g>`;
  }

  svg += `</svg>`;

  // Legend
  const legendItems = Object.entries(SVC_CATEGORY_COLORS)
    .filter(([cat]) => sm.nodes.some(n => n.category === cat))
    .map(([cat, colors]) => `<div class="svc-legend-item"><div class="svc-legend-dot" style="background:${colors.stroke}"></div>${cat}</div>`)
    .join('');

  c.innerHTML = `<div class="svc-graph-wrap">${svg}<div class="svc-legend">${legendItems}</div></div>`;

  // Interactivity
  c.querySelectorAll('.svc-node-group').forEach(g => {
    g.addEventListener('mouseenter', () => {
      const id = g.dataset.nodeid;
      c.querySelectorAll('.svc-edge').forEach(e => {
        if (e.dataset.from === id || e.dataset.to === id) {
          e.classList.add('highlighted');
          e.setAttribute('marker-end', 'url(#svc-arrow-hl)');
        }
      });
    });
    g.addEventListener('mouseleave', () => {
      c.querySelectorAll('.svc-edge').forEach(e => {
        e.classList.remove('highlighted');
        const isCrit = e.classList.contains('critical');
        e.setAttribute('marker-end', isCrit ? 'url(#svc-arrow-critical)' : 'url(#svc-arrow)');
      });
    });
    g.addEventListener('click', () => {
      const id = g.dataset.nodeid;
      openSvcPanel(id);
    });
  });
}

function truncateText(text, maxLen) {
  return text.length > maxLen ? text.slice(0, maxLen - 1) + '…' : text;
}

function renderSvcPipelines(c, sm) {
  const features = D.features || [];
  const hasPipelines = sm.pipelines && sm.pipelines.length > 0;
  const hasFeatures = features.length > 0;
  const agentAvailable = !!D.agent;

  // Render existing pipelines
  let pipelinesHtml = '';
  if (hasPipelines) {
    pipelinesHtml = sm.pipelines.map(p => {
      const triggers = (p.triggers || []).map(t => `<span class="svc-pipeline-trigger">${t}</span>`).join('');
      const steps = p.steps.map((s, i) => {
        const arrow = i < p.steps.length - 1 ? '<span class="svc-step-arrow">→</span>' : '';
        const svcNode = s.serviceId ? sm.nodes.find(n => n.id === s.serviceId) : null;
        const svcLabel = svcNode ? `${svcNode.icon || ''} ${svcNode.label}` : (s.serviceId || '');
        const descTooltip = s.description ? ` title="${(s.description||'').replace(/"/g, '&quot;')}"` : '';
        return `<div class="svc-step">
          <div class="svc-step-box" ${s.serviceId ? `data-svcid="${s.serviceId}"` : ''}${descTooltip}>
            <div class="svc-step-label">${s.label}</div>
            ${svcLabel ? `<div class="svc-step-service">${svcLabel}</div>` : ''}
          </div>
        </div>${arrow}`;
      }).join('');
      return `<div class="svc-pipeline">
        <div class="svc-pipeline-title">${p.label}</div>
        ${p.description ? `<div class="svc-pipeline-desc">${p.description}</div>` : ''}
        ${triggers ? `<div class="svc-pipeline-triggers">${triggers}</div>` : ''}
        <div class="svc-pipeline-steps">${steps}</div>
      </div>`;
    }).join('');
  }

  // Generate per-feature cards
  let generateHtml = '';
  if (hasFeatures && agentAvailable) {
    const featureCards = features.map(f => {
      const matchingPipes = (sm.pipelines || []).filter(p =>
        p.id.includes(f.key) || p.label.toLowerCase().includes(f.label.toLowerCase())
      );
      const hasPipe = matchingPipes.length > 0;
      return `<div class="svc-gen-card" style="border-left:3px solid ${f.color}">
        <div class="svc-gen-card-header">
          <span class="svc-gen-card-label">${f.label}</span>
          <span class="svc-gen-card-files">${f.fileCount} файлов</span>
        </div>
        ${f.description ? `<div class="svc-gen-card-desc">${f.description}</div>` : ''}
        ${hasPipe ? `<div class="svc-gen-card-status">✅ ${matchingPipes.length} пайплайн(ов)</div>` : ''}
        <button class="svc-gen-btn" data-feature="${f.key}">
          ${hasPipe ? '🔄 Перегенерировать' : '▶ Сгенерировать'}
        </button>
      </div>`;
    }).join('');

    const allAtOnceBtn = features.length > 1
      ? `<button class="svc-gen-all-btn" id="svcGenAll">🚀 Сгенерировать для всех фич (по очереди)</button>`
      : '';

    generateHtml = `
      <div class="svc-gen-section">
        <div class="svc-gen-section-title">Генерация пайплайнов по фичам</div>
        <div class="svc-gen-section-hint">AI-агент прочитает файлы каждой фичи и найдёт все потоки данных, алгоритмы, дефолты и зависимости между сервисами.</div>
        <div class="svc-gen-cards">${featureCards}</div>
        ${allAtOnceBtn}
      </div>`;
  } else if (!agentAvailable && hasFeatures) {
    generateHtml = `<div class="svc-gen-section">
      <div class="svc-gen-section-hint" style="color:var(--muted)">⚠️ Для генерации пайплайнов укажи <code>agent</code> в <code>viberadar.config.json</code> (claude или codex).</div>
    </div>`;
  } else if (!hasFeatures) {
    generateHtml = `<div class="svc-gen-section">
      <div class="svc-gen-section-hint" style="color:var(--muted)">⚠️ Для генерации пайплайнов нужны фичи. Запусти <code>viberadar init</code> для создания конфига.</div>
    </div>`;
  }

  c.innerHTML = `<div class="svc-pipeline-container">${pipelinesHtml}${generateHtml}</div>`;

  // Click on step to open service detail
  c.querySelectorAll('.svc-step-box[data-svcid]').forEach(box => {
    box.onclick = () => openSvcPanel(box.dataset.svcid);
  });

  // Generate pipelines per feature
  c.querySelectorAll('.svc-gen-btn').forEach(btn => {
    btn.onclick = () => {
      const featureKey = btn.dataset.feature;
      btn.disabled = true;
      btn.textContent = '⏳ В очереди…';
      runAgentTask('generate-pipelines', featureKey);
    };
  });

  // Generate all at once
  const genAllBtn = document.getElementById('svcGenAll');
  if (genAllBtn) {
    genAllBtn.onclick = () => {
      genAllBtn.disabled = true;
      genAllBtn.textContent = '⏳ Добавляю в очередь…';
      const featureKeys = features.map(f => f.key);
      featureKeys.forEach((fk, i) => {
        setTimeout(() => runAgentTask('generate-pipelines', fk), i * 200);
      });
      setTimeout(() => {
        genAllBtn.textContent = `✅ ${featureKeys.length} задач в очереди`;
      }, featureKeys.length * 200 + 100);
    };
  }
}

function renderSvcExport(c, sm) {
