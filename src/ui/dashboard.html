// ─── Rescan ───────────────────────────────────────────────────────────────────
async function rescan() {
  const btn = document.getElementById('rescanBtn');
  const statusEl = document.getElementById('rescanStatus');
  if (!btn || btn.classList.contains('spinning')) return;

  btn.classList.add('spinning');
  rescanPending = true;
  if (statusEl) { statusEl.className = 'status-scanning'; statusEl.textContent = 'Сканирую…'; }

  try {
    // Server returns 202 immediately, scans in background.
    // When done it broadcasts 'data-updated' via SSE → refreshData() fires and clears the spinner.
    const res = await fetch('/api/rescan', { method: 'POST' });
    if (!res.ok) throw new Error('rescan ' + res.status);
  } catch (e) {
    console.error('Rescan error:', e);
    rescanPending = false;
    btn.classList.remove('spinning');
    if (statusEl) { statusEl.className = 'status-error'; statusEl.textContent = '⚠ ошибка сканирования'; }
  }
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function renderStats() {
  const src = D.modules.filter(m => m.type !== 'test');
  const tested = src.filter(m => m.hasTests).length;
  const testFiles = D.modules.filter(m => m.type === 'test').length;
  const pct = src.length ? Math.round(tested / src.length * 100) : 0;

  let items;
  if (contextMode === 'observability') {
    const o = D.observability;
    if (o) {
      const noiseRatio = Math.round(o.metrics.noise_ratio * 100);
      const structPct = Math.round(o.metrics.structured_completeness * 100);
      const v2 = o.missingCriticalLogsV2 || [];
      const missingCoverage = v2.length || o.missingCriticalLogs.length;
      const totalFPs = v2.reduce((s,m) => s + m.failurePoints.length, 0);
      const noisyCount = o.topNoisyPatterns.length;
      items = [
        { v: o.catalog.length, l: 'Источники логов' },
        { v: noiseRatio + '%', l: 'Коэффициент шума', c: noiseRatio > 30 ? '#f85149' : noiseRatio > 10 ? '#e3b341' : undefined },
        { v: structPct + '%', l: 'Структурированность', c: structPct < 50 ? '#f85149' : structPct < 80 ? '#e3b341' : undefined },
        { v: totalFPs || missingCoverage, l: totalFPs ? 'Точек отказа' : 'Нет покрытия', c: totalFPs > 10 ? '#f85149' : (totalFPs || missingCoverage) ? '#e3b341' : undefined },
        { v: noisyCount, l: 'Шумных паттернов', c: noisyCount ? '#e3b341' : undefined },
      ];
    } else {
      const serviceSources = src.filter(m => m.type === 'service' || m.type === 'util' || m.type === 'other');
      items = [
        { v: serviceSources.length, l: 'Источники логов' },
        { v: '—', l: 'Коэффициент шума' },
        { v: '—', l: 'Структурированность' },
        { v: '—', l: 'Нет покрытия' },
        { v: '—', l: 'Шумных паттернов' },
      ];
    }
  } else if (D.hasConfig && D.features) {
    const unmapped = src.filter(m => !m.isInfra && (!m.featureKeys || m.featureKeys.length === 0)).length;
    items = [
      { v: D.features.length,   l: 'Features' },
      { v: src.length,          l: 'Source Files' },
      { v: pct + '%',           l: 'With Tests' },
      { v: testFiles,           l: 'Test Files' },
      unmapped > 0 ? { v: unmapped, l: 'Unmapped', c: '#e3b341' } : null,
    ].filter(Boolean);
  } else {
    items = [
      { v: D.modules.length, l: 'Modules' },
      { v: tested,           l: 'With Tests' },
      { v: pct + '%',        l: 'Test Coverage' },
      { v: testFiles,        l: 'Test Files' },
    ];
  }

  document.getElementById('statsBar').innerHTML = items.map(s =>
    `<div class="stat">
       <span class="stat-value"${s.c ? ` style="color:${s.c}"` : ''}>${s.v}</span>
       <span class="stat-label">${s.l}</span>
     </div>`
  ).join('');
}

}

function renderObservability(c) {
  const o = D.observability;
  if (!o) {
    c.innerHTML = `<div class="onboarding-block"><h3>Наблюдаемость</h3><p>Данные анализа логов недоступны. Пересканируй проект.</p></div>`;
    return;
  }

  // Feature-based routing (mirrors QA coverage pattern)
  if (D.hasConfig && D.features && o.byFeature && !drillFeatureKey) {
    renderObsFeatureCards(c);
    return;
  }
  if (drillFeatureKey) {
    renderObsFeatureDetail(c);
    return;
  }

  renderObsGlobalDetail(c);
}

function renderObsGlobalDetail(c, filterFeatureKey) {
  const o = D.observability;
  if (!o) return;

  // If filtering by feature, scope data to that feature's modules
  let catalog = o.catalog;
  let missingV2 = o.missingCriticalLogsV2 || [];
  let topNoisy = o.topNoisyPatterns;
  let fieldGapsData = o.fieldGaps || {};
  let metricsData = o.metrics;

  if (filterFeatureKey) {
    const isUnmapped = filterFeatureKey === '__unmapped__';
    catalog = o.catalog.filter(ci => isUnmapped ? (!ci.featureKeys || ci.featureKeys.length === 0) : (ci.featureKeys || []).includes(filterFeatureKey));
    // Build set of module paths in this feature for missingV2 filtering
    const featureModulePaths = new Set(
      (D.modules || []).filter(m => {
        if (isUnmapped) return !m.featureKeys || m.featureKeys.length === 0;
        return (m.featureKeys || []).includes(filterFeatureKey);
      }).map(m => m.relativePath)
    );
    missingV2 = (o.missingCriticalLogsV2 || []).filter(m => featureModulePaths.has(m.modulePath));
    // Re-derive noisy patterns from filtered catalog
    const noisyAgg = new Map();
    for (const ci of catalog) {
      for (const nm of (ci.noisyMessages || [])) {
        noisyAgg.set(nm, (noisyAgg.get(nm) || 0) + 1);
      }
    }
    topNoisy = Array.from(noisyAgg.entries())
      .sort((a, b) => b[1] - a[1])
      .slice(0, 8)
      .map(([pattern, count], i) => ({
        pattern, count,
        priority: i < 3 ? 'high' : i < 6 ? 'medium' : 'low',
        recommendation: count >= 3 ? 'suppress' : 'downgrade level',
      }));
    // Re-derive field gaps from filtered catalog
    fieldGapsData = {};
    for (const ci of catalog) {
      for (const f of (ci.missingFields || [])) {
        fieldGapsData[f] = (fieldGapsData[f] || 0) + 1;
      }
    }
    // Use per-feature metrics if available
    if (!isUnmapped && o.byFeature) {
      const bf = o.byFeature.find(f => f.key === filterFeatureKey);
      if (bf) metricsData = bf.metrics;
    }
  }

  const noiseRatio  = Math.round(metricsData.noise_ratio * 100);
  const structPct   = Math.round(metricsData.structured_completeness * 100);
  const actionPct   = Math.round(metricsData.error_actionability * 100);
  const coveragePct = Math.round(metricsData.coverage_of_key_flows * 100);

  function metricColor(val, goodThreshold, warnThreshold, invert) {
    if (invert) return val > warnThreshold ? 'var(--red)' : val > goodThreshold ? 'var(--yellow)' : 'var(--green)';
    return val < warnThreshold ? 'var(--red)' : val < goodThreshold ? 'var(--yellow)' : 'var(--green)';
  }

  // ── Baseline & delta tracking ──
  const _bsKey = String(D.currentFeatureKey || 'global').replace(/[^a-z0-9_-]/gi, '_');
  let _bl = null;
  try { _bl = JSON.parse(localStorage.getItem('vr_obs_bl_' + _bsKey) || 'null'); } catch(e) {}

  // Pre-compute current snapshot values (before tierSections so _d is in scope)
  const _blCurrMissing = missingV2.length;
  const _blCurrFPs = missingV2.reduce((s, m) => s + (m.failurePoints || []).length, 0);
  const _blCurrNoise = topNoisy.length;
  const _blCurrEnrich = Object.entries(fieldGapsData).filter(([, v]) => v > 0).length;
  const _blCurrTiers = {};
  ['critical', 'important', 'normal'].forEach(tier => {
    const items = missingV2.filter(m => m.riskTier === tier);
    _blCurrTiers[tier] = { modules: items.length, fps: items.reduce((s, m) => s + (m.failurePoints || []).length, 0) };
  });

  if (!_bl) {
    _bl = { ts: Date.now(), noiseRatio, structPct, actionPct, coveragePct,
            missing: _blCurrMissing, fps: _blCurrFPs, noise: _blCurrNoise, enrich: _blCurrEnrich,
            tiers: _blCurrTiers };
    try { localStorage.setItem('vr_obs_bl_' + _bsKey, JSON.stringify(_bl)); } catch(e) {}
  }

  // Delta badge helpers
  const _d = (curr, base, invert = false) => {
    if (base == null || curr === base) return '';
    const diff = curr - base;
    const good = invert ? diff > 0 : diff < 0;
    const color = good ? '#3fb950' : '#f85149';
    const sign = diff > 0 ? '+' : '';
    return `<span style="color:${color};font-size:11px;font-weight:700;margin-left:5px">(${sign}${diff})</span>`;
  };
  const _dp = (curr, base, invert = false) => {
    if (base == null || curr === base) return '';
    const diff = curr - base;
    const good = invert ? diff > 0 : diff < 0;
    const color = good ? '#3fb950' : '#f85149';
    const arrow = good ? '↓' : '↑';
    return `<span class="obs-kpi-delta" style="color:${color}">${arrow}${Math.abs(diff)}%</span>`;
  };

  const formatLabels = { structured: 'structured', mixed: 'mixed', unstructured: 'unstructured' };
  const sourceByFormat = [
    { label: 'Structured', count: catalog.filter(c => c.format === 'structured').length, color: 'var(--green)' },
    { label: 'Mixed', count: catalog.filter(c => c.format === 'mixed').length, color: 'var(--yellow)' },
    { label: 'Unstructured', count: catalog.filter(c => c.format === 'unstructured').length, color: 'var(--red)' },
  ].filter(x => x.count > 0);

  const recLabels = {
    'suppress': 'убрать',
    'downgrade level': 'понизить уровень',
    'enrich fields': 'обогатить поля',
    'add event': 'добавить событие',
  };
  const hasAgent = !!D.agent;

  // Store catalog for buttons to reference by index (avoids inline JSON in onclick)
  window.__obsCatalog = catalog;

  const noisyRows = topNoisy.map(i => {
    const safePattern = escapeHtml(i.pattern).replace(/'/g, '&#39;');
    const btn = hasAgent
      ? `<button class="obs-action-btn" onclick="event.stopPropagation();runAgentTask('obs-suppress-pattern',null,null,null,{pattern:'${safePattern}',recommendation:'${i.recommendation}'})">убрать</button>`
      : '';
    return `
    <div class="obs-list-item">
      <span class="obs-priority-${i.priority}" style="flex-shrink:0">[${i.priority}]</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(i.pattern)}">${escapeHtml(i.pattern)}</span>
      <strong style="flex-shrink:0;color:var(--red)">×${i.count} → ${recLabels[i.recommendation] || i.recommendation}</strong>
      ${btn}
    </div>`;
  }).join('') || '<div class="obs-sub">Шумных паттернов не обнаружено</div>';

  // ── Missing critical logs (V2: grouped by risk tier with failure points) ──
  const v2Data = missingV2.filter(m => m.failurePoints.length > 0);
  window.__obsMissingV2 = v2Data;
  const fpTypeLabels = {
    'empty-catch':'пустой catch','catch-no-log':'catch без лога','promise-catch-no-log':'.catch без лога',
    'http-no-error-handling':'HTTP без обработки','db-no-error-handling':'DB без обработки',
    'throw-no-log':'throw без лога','error-check-no-log':'if(err) без лога',
  };
  let missingSection = '';
  if (v2Data.length > 0) {
    const tierLabels = { critical:'Критичные', important:'Важные', normal:'Обычные' };
    const tiers = ['critical','important','normal'];
    const tierSections = tiers.map(tier => {
      const items = v2Data.filter(m => m.riskTier === tier);
      if (!items.length) return '';
      const groupId = 'missing-' + tier;
      const expandBtn = hasAgent ? `<button class="obs-expand-btn" onclick="event.stopPropagation();toggleObsDetail('${groupId}')">▼</button>` : '';
      const totalFPs = items.reduce((s,m) => s + m.failurePoints.length, 0);
      const detailItems = items.map(m => {
        const globalIdx = v2Data.indexOf(m);
        const fpCount = m.failurePoints.length;
        const fpPreview = m.failurePoints.slice(0,3).map(fp =>
          `<div class="obs-fp-item"><span class="obs-fp-type">${fpTypeLabels[fp.type]||fp.type}</span><span class="obs-fp-line">~${fp.lineApprox}</span></div>`
        ).join('');
        const moreCount = fpCount > 3 ? `<div class="obs-fp-item" style="color:var(--dim)">...и ещё ${fpCount-3}</div>` : '';
        const covBadge = m.hasAnyWarnError ? '<span style="font-size:10px;color:var(--dim)" title="Есть warn/error, но не все точки покрыты">частично</span>' : '';
        return `<label class="obs-detail-item" style="flex-wrap:wrap">
          <input type="checkbox" data-missing-idx="${globalIdx}" onchange="obsUpdateSelectedCount('${groupId}')">
          <span title="${escapeHtml(m.modulePath)}" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(m.modulePath.split('/').slice(-2).join('/'))}</span>
          <span style="color:var(--dim);flex-shrink:0;font-size:10px">${escapeHtml(m.roleHint)}</span>
          <span style="color:var(--yellow);flex-shrink:0">${fpCount} точек</span>
          ${covBadge}
          ${fpPreview || moreCount ? `<div class="obs-fp-list" style="width:100%">${fpPreview}${moreCount}</div>` : ''}
        </label>`;
      }).join('');
      const addBtn = hasAgent ? `<button class="obs-run-selected" disabled onclick="obsMissingRunSelected('${groupId}')">добавить логи выбранным</button>` : '';
      const detail = hasAgent ? `
        <div id="obs-detail-${groupId}" class="obs-detail" data-obs-action="missing" data-obs-label="${tierLabels[tier]}">
          <div class="obs-detail-bar" style="border-top:none;padding-top:0;margin-bottom:4px">
            <button class="obs-select-all" onclick="obsToggleAll('${groupId}')">выбрать все / снять</button>
          </div>
          <div class="obs-detail-list">${detailItems}</div>
          <div class="obs-detail-bar">${addBtn}</div>
        </div>` : '';
      const _blTier = _bl?.tiers?.[tier];
      return `<div class="obs-tier-group">
        <div class="obs-tier-group-header">
          <span class="obs-tier-badge obs-tier-${tier}">${tierLabels[tier]}</span>
          <span>${items.length}${_d(items.length, _blTier?.modules)} модулей, ${totalFPs}${_d(totalFPs, _blTier?.fps)} точек отказа</span>
          ${expandBtn}
        </div>
        ${detail}
      </div>`;
    }).join('');
    missingSection = tierSections || '<div class="obs-sub" style="color:var(--green)">Критичные сценарии покрыты</div>';
  } else {
    missingSection = '<div class="obs-sub" style="color:var(--green)">Критичные сценарии покрыты</div>';
  }

  const fieldGaps = fieldGapsData;
  const fieldGapEntries = Object.entries(fieldGaps).filter(([,v]) => v > 0).sort((a,b) => b[1] - a[1]);
  const fieldGapRows = fieldGapEntries.map(([name, count]) => {
    const groupId = 'field-' + name.replace(/[^a-z0-9]/gi, '_');
    const affectedItems = catalog.filter(c => (c.missingFields||[]).includes(name));
    const expandBtn = hasAgent ? `<button class="obs-expand-btn" onclick="event.stopPropagation();toggleObsDetail('${groupId}')">▼</button>` : '';
    const detailItems = affectedItems.map(ci => {
      const catIdx = catalog.indexOf(ci);
      return `<label class="obs-detail-item"><input type="checkbox" data-idx="${catIdx}" onchange="obsUpdateSelectedCount('${groupId}')"><span title="${escapeHtml(ci.modulePath)}">${escapeHtml(ci.modulePath.split('/').slice(-2).join('/'))}</span><span style="color:var(--dim);flex-shrink:0">${ci.format}</span></label>`;
    }).join('');
    const detail = hasAgent ? `
      <div id="obs-detail-${groupId}" class="obs-detail" data-obs-action="field" data-obs-meta='{"fieldName":"${escapeHtml(name)}"}' data-obs-label="поле ${escapeHtml(name)}">
        <div class="obs-detail-bar" style="border-top:none;padding-top:0;margin-bottom:4px">
          <button class="obs-select-all" onclick="obsToggleAll('${groupId}')">выбрать все / снять</button>
        </div>
        <div class="obs-detail-list">${detailItems}</div>
        <div class="obs-detail-bar">
          <button class="obs-run-selected" disabled onclick="obsRunSelected('${groupId}','obs-fix-selected',{fieldName:'${escapeHtml(name)}'})">обогатить выбранные</button>
        </div>
      </div>` : '';
    return `<div>
      <div class="obs-list-item">
        <span><code>${escapeHtml(name)}</code></span>
        <strong style="color:${count > 20 ? 'var(--red)' : count > 5 ? 'var(--yellow)' : 'var(--muted)'}">${count} пропусков</strong>
        ${expandBtn}
      </div>
      ${detail}
    </div>`;
  }).join('') || '<div class="obs-sub" style="color:var(--green)">Все обязательные поля на месте</div>';

  const catalogRows = catalog.map((i, idx) => {
    const missing = (i.missingFields || []);
    const missingStr = missing.length ? missing.join(', ') : '—';
    const btn = hasAgent
      ? `<button class="obs-action-btn" onclick="event.stopPropagation();runAgentTask('obs-fix-module',null,null,null,{catalogIndex:${idx}})">исправить</button>`
      : '';
    return `
    <div class="obs-cat-row">
      <span title="${escapeHtml(i.modulePath)}">${escapeHtml(i.modulePath.split('/').slice(-2).join('/'))}</span>
      <span>${i.level}</span>
      <span style="color:${i.format==='structured'?'var(--green)':i.format==='mixed'?'var(--yellow)':'var(--red)'}">${i.format}</span>
      <span style="color:${missing.length > 4 ? 'var(--red)' : missing.length > 0 ? 'var(--yellow)' : 'var(--green)'}">${missing.length}/8</span>
      <span title="${escapeHtml(missingStr)}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(missingStr)}</span>
      <span style="color:${i.recommendation==='suppress'?'var(--red)':i.recommendation==='add event'?'var(--yellow)':'var(--muted)'}">${recLabels[i.recommendation] || i.recommendation}</span>
      ${btn}
    </div>`}).join('');

  const noisyCount = topNoisy.length;
  const missingCount = v2Data.length;
  const enrichCount = fieldGapEntries.length;
  const catalogCount = catalog.length;

  // ── Build progress banner comparing to baseline ──
  const _blItems = [];
  if (_bl.missing != null && missingCount !== _bl.missing)
    _blItems.push({ label: `модулей без логов: ${_bl.missing} → ${missingCount}`, good: missingCount < _bl.missing });
  if (_bl.fps != null && _blCurrFPs !== _bl.fps)
    _blItems.push({ label: `точек отказа: ${_bl.fps} → ${_blCurrFPs}`, good: _blCurrFPs < _bl.fps });
  if (_bl.noise != null && noisyCount !== _bl.noise)
    _blItems.push({ label: `шумных паттернов: ${_bl.noise} → ${noisyCount}`, good: noisyCount < _bl.noise });
  if (_bl.enrich != null && enrichCount !== _bl.enrich)
    _blItems.push({ label: `нужно обогатить: ${_bl.enrich} → ${enrichCount}`, good: enrichCount < _bl.enrich });

  const _hasReg = _blItems.some(x => !x.good);
  const _hasImp = _blItems.some(x => x.good);
  const _progressBanner = _blItems.length ? `
    <div class="obs-progress-banner${_hasReg ? ' has-regression' : ''}">
      <span class="obs-pb-title${_hasReg && _hasImp ? ' mixed' : _hasReg ? ' obs-pb-worse' : ''}">📊 прогресс</span>
      ${_blItems.map(it => `<span class="${it.good ? 'obs-pb-item' : 'obs-pb-worse'}">${it.good ? '✅' : '⚠️'} ${it.label}</span>`).join('')}
    </div>` : '';

  const _baselineStrip = `
    <div class="obs-baseline-strip">
      <span>📍 baseline: ${obsTimeAgo(_bl.ts)}</span>
      <button onclick="obsResetBaseline('${_bsKey}')">обновить</button>
    </div>`;

  // Feature drill-down header
  const _featureHeader = filterFeatureKey ? (() => {
    const isUnmapped = filterFeatureKey === '__unmapped__';
    const bf = !isUnmapped && o.byFeature ? o.byFeature.find(f => f.key === filterFeatureKey) : null;
    const label = isUnmapped ? 'Unmapped' : (bf ? bf.label : filterFeatureKey);
    const color = isUnmapped ? '#e3b341' : (bf ? bf.color : '#484f58');
    const score = bf ? bf.score : null;
    return `<div class="feature-detail-header">
      <button class="back-btn" onclick="setFeatureDrill(null)">← Все фичи</button>
      <span class="feature-detail-name">
        <span class="feature-dot" style="background:${color}"></span>
        ${escapeHtml(label)}
      </span>
      ${score != null ? `<span style="font-size:20px;font-weight:700;color:${covColor(score)}">${score}%</span>` : ''}
    </div>`;
  })() : '';

  c.innerHTML = `
    ${_featureHeader}
    ${!filterFeatureKey ? `<div class="onboarding-block">
      <h3>Наблюдаемость: что это?</h3>
      <p>Аудит покрытия логами: что добавить, что убрать, что обогатить — на основе статического анализа лог-вызовов.</p>
    </div>` : ''}

    ${_progressBanner}
    ${_baselineStrip}

    <div class="obs-kpi-strip">
      <div class="obs-kpi">
        <span class="obs-kpi-value" style="color:${metricColor(noiseRatio,10,30,true)}">${noiseRatio}%</span>
        ${_dp(noiseRatio, _bl?.noiseRatio, true)}
        <span class="obs-kpi-label">Шум</span>
      </div>
      <div class="obs-kpi">
        <span class="obs-kpi-value" style="color:${metricColor(structPct,80,50,false)}">${structPct}%</span>
        ${_dp(structPct, _bl?.structPct)}
        <span class="obs-kpi-label">Структурированность</span>
      </div>
      <div class="obs-kpi">
        <span class="obs-kpi-value" style="color:${metricColor(actionPct,80,50,false)}">${actionPct}%</span>
        ${_dp(actionPct, _bl?.actionPct)}
        <span class="obs-kpi-label">Actionable ошибки</span>
      </div>
      <div class="obs-kpi">
        <span class="obs-kpi-value" style="color:${metricColor(coveragePct,80,50,false)}">${coveragePct}%</span>
        ${_dp(coveragePct, _bl?.coveragePct)}
        <span class="obs-kpi-label">Покрытие сценариев</span>
      </div>
    </div>

    <div class="obs-tabs">
      <div class="obs-tab" data-obstab="overview">Обзор</div>
      <div class="obs-tab" data-obstab="remove">Убрать${noisyCount ? `<span class="obs-tab-badge red">${noisyCount}</span>` : ''}</div>
      <div class="obs-tab" data-obstab="add">Добавить${missingCount ? `<span class="obs-tab-badge yellow">${missingCount}</span>` : ''}</div>
      <div class="obs-tab" data-obstab="enrich">Обогатить${enrichCount ? `<span class="obs-tab-badge yellow">${enrichCount}</span>` : ''}</div>
      <div class="obs-tab" data-obstab="catalog">Каталог${catalogCount ? `<span class="obs-tab-badge muted">${catalogCount}</span>` : ''}</div>
    </div>

    <div class="obs-tab-content" data-obstab="overview">
      <div class="obs-hint" id="obs-hint-overview">
        <button class="obs-hint-toggle" onclick="toggleObsHint('obs-hint-overview')">
          <span class="obs-hint-icon">?</span>
          Что такое «Обзор» и как читать эти числа?
          <span class="obs-hint-chevron">▼</span>
        </button>
        <div class="obs-hint-body">
          <p>Обзор — это «пульс» логирования в проекте. Четыре метрики наверху показывают, насколько логи полезны прямо сейчас.</p>
          <div class="obs-hint-section">
            <div class="obs-hint-section-title">Что означает каждая метрика</div>
            <div class="obs-hint-code"><span class="hl-red">Шум 40%</span>        — почти половина логов бесполезны. Они засоряют Kibana/Datadog
                             и скрывают реальные ошибки.

<span class="hl-yellow">Структурированность 20%</span> — большинство логов — просто строки вроде
                             <span class="hl-dim">"Starting process..."</span>. Их нельзя фильтровать, группировать,
                             строить алерты. Цель — 80%+.

<span class="hl-yellow">Actionable ошибки 50%</span>  — половина ошибок логируется без контекста.
                             Инженер видит <span class="hl-dim">"Error occurred"</span> — и ничего больше.

<span class="hl-red">Покрытие сценариев 24%</span> — 76% модулей вообще не имеют warn/error логов.
                             Когда они сломаются — узнаешь только от пользователей.</div>
          </div>
          <div class="obs-hint-section">
            <div class="obs-hint-section-title">Блок «Рекомендации»</div>
            <p>Итоговый план действий по всему проекту: сколько источников нужно <span style="color:var(--red)">убрать</span>, <span style="color:var(--yellow)">обогатить</span>, <span style="color:var(--yellow)">добавить</span>. Каждая строчка раскрывается — можно выбрать файлы и отдать агенту.</p>
          </div>
        </div>
      </div>
      <div class="obs-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:12px">
        <div class="obs-card">
          <div class="obs-title">Источники по формату</div>
          <div class="obs-list">
            ${sourceByFormat.map(g => `
              <div class="obs-list-item">
                <span style="color:${g.color}">${g.label}</span>
                <strong>${g.count}</strong>
              </div>`).join('') || '<div class="obs-sub">Нет данных</div>'}
          </div>
        </div>
        <div class="obs-card">
          <div class="obs-title">Классификация логов</div>
          <div class="obs-list">
            <div class="obs-list-item"><span style="color:var(--red)">Мусор (убрать)</span><strong>${o.classification.trash}</strong></div>
            <div class="obs-list-item"><span style="color:var(--green)">Полезные</span><strong>${o.classification.useful}</strong></div>
            <div class="obs-list-item"><span style="color:var(--blue)">Критичные</span><strong>${o.classification.critical}</strong></div>
          </div>
        </div>
        <div class="obs-card">
          <div class="obs-title">Рекомендации</div>
          <div class="obs-list" style="gap:2px">
            ${['suppress','enrich fields','add event','downgrade level'].map(rec => {
              const items = catalog.filter(c => c.recommendation === rec);
              if (!items.length) return '';
              const groupId = 'rec-' + rec.replace(/\s+/g, '-');
              const expandBtn = hasAgent ? `<button class="obs-expand-btn" onclick="event.stopPropagation();toggleObsDetail('${groupId}')">▼</button>` : '';
              const detailItems = items.map((ci, i) => {
                const catIdx = catalog.indexOf(ci);
                const mf = (ci.missingFields||[]).join(', ') || '—';
                return `<label class="obs-detail-item"><input type="checkbox" data-idx="${catIdx}" onchange="obsUpdateSelectedCount('${groupId}')"><span title="${escapeHtml(ci.modulePath)}">${escapeHtml(ci.modulePath.split('/').slice(-2).join('/'))}</span><span style="color:var(--dim);flex-shrink:0">${ci.format}</span></label>`;
              }).join('');
              const detail = hasAgent ? `
                <div id="obs-detail-${groupId}" class="obs-detail" data-obs-action="rec" data-obs-meta='{"recommendationType":"${rec}"}' data-obs-label="${recLabels[rec] || rec}">
                  <div class="obs-detail-bar" style="border-top:none;padding-top:0;margin-bottom:4px">
                    <button class="obs-select-all" onclick="obsToggleAll('${groupId}')">выбрать все / снять</button>
                  </div>
                  <div class="obs-detail-list">${detailItems}</div>
                  <div class="obs-detail-bar">
                    <button class="obs-run-selected" disabled onclick="obsRunSelected('${groupId}','obs-fix-selected',{recommendationType:'${rec}'})">исправить выбранные</button>
                  </div>
                </div>` : '';
              return `<div>
                <div class="obs-list-item"><span>${recLabels[rec]}</span><strong>${items.length}</strong>${expandBtn}</div>
                ${detail}
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>

function renderObsFeatureCards(c) {
  const o = D.observability;
  if (!o || !o.byFeature) return;

  const q = searchQuery.toLowerCase();
  const list = o.byFeature.filter(f =>
    !q || f.label.toLowerCase().includes(q) || f.key.toLowerCase().includes(q)
  );

  // Global KPI strip (compact)
  const gNoiseRatio  = Math.round(o.metrics.noise_ratio * 100);
  const gStructPct   = Math.round(o.metrics.structured_completeness * 100);
  const gActionPct   = Math.round(o.metrics.error_actionability * 100);
  const gCoveragePct = Math.round(o.metrics.coverage_of_key_flows * 100);
  function mc(val, good, warn, inv) {
    if (inv) return val > warn ? 'var(--red)' : val > good ? 'var(--yellow)' : 'var(--green)';
    return val < warn ? 'var(--red)' : val < good ? 'var(--yellow)' : 'var(--green)';
  }

  const globalStrip = `
    <div class="obs-kpi-strip" style="margin-bottom:16px">
      <div class="obs-kpi"><span class="obs-kpi-value" style="color:${mc(gNoiseRatio,10,30,true)}">${gNoiseRatio}%</span><span class="obs-kpi-label">Шум</span></div>
      <div class="obs-kpi"><span class="obs-kpi-value" style="color:${mc(gStructPct,80,50,false)}">${gStructPct}%</span><span class="obs-kpi-label">Структ.</span></div>
      <div class="obs-kpi"><span class="obs-kpi-value" style="color:${mc(gActionPct,80,50,false)}">${gActionPct}%</span><span class="obs-kpi-label">Actionable</span></div>
      <div class="obs-kpi"><span class="obs-kpi-value" style="color:${mc(gCoveragePct,80,50,false)}">${gCoveragePct}%</span><span class="obs-kpi-label">Покрытие</span></div>
    </div>`;

  c.innerHTML = globalStrip + '<div class="features-grid" id="obsGrid"></div>';
  const grid = document.getElementById('obsGrid');

  list.forEach(f => {
    const card = document.createElement('div');
    card.className = 'feature-card';

    // Per-feature baseline
    const bsKey = String(f.key).replace(/[^a-z0-9_-]/gi, '_');
    let bl = null;
    try { bl = JSON.parse(localStorage.getItem('vr_obs_bl_' + bsKey) || 'null'); } catch(e) {}
    const scoreDelta = bl && bl.score != null && f.score !== bl.score
      ? (() => {
        const diff = f.score - bl.score;
        const good = diff > 0;
        const color = good ? '#3fb950' : '#f85149';
        const sign = diff > 0 ? '+' : '';
        return `<span style="color:${color};font-size:11px;font-weight:700;margin-left:4px">(${sign}${diff})</span>`;
      })() : '';

    // Mini KPI
    const n = Math.round(f.metrics.noise_ratio * 100);
    const s = Math.round(f.metrics.structured_completeness * 100);
    const a = Math.round(f.metrics.error_actionability * 100);
    const cv = Math.round(f.metrics.coverage_of_key_flows * 100);

    // Issue counts for badges
    const issues = f.noisyPatternCount + f.missingCriticalCount + f.fieldGapCount;

    card.innerHTML = `
      <div class="feature-accent" style="background:${f.color}"></div>
      <div class="feature-body">
        <div class="feature-title">
          <span>${escapeHtml(f.label)}</span>
          <span class="feature-file-count">${f.catalogCount} лог-модулей</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="font-size:24px;font-weight:700;line-height:1;color:${covColor(f.score)}">${f.score}%</span>
          ${scoreDelta}
          <div style="flex:1">
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.4px">Observability Score</div>
            <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">
              <div style="width:${f.score}%;height:100%;background:${covColor(f.score)};border-radius:2px;transition:width 0.4s"></div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:12px;font-size:11px;color:var(--dim);margin-bottom:8px">
          <span title="Шум">🔇 <span style="color:${mc(n,10,30,true)}">${n}%</span></span>
          <span title="Структурированность">📋 <span style="color:${mc(s,80,50,false)}">${s}%</span></span>
          <span title="Actionable ошибки">🎯 <span style="color:${mc(a,80,50,false)}">${a}%</span></span>
          <span title="Покрытие сценариев">🛡️ <span style="color:${mc(cv,80,50,false)}">${cv}%</span></span>
        </div>
        ${issues > 0 ? `<div style="font-size:11px;color:var(--muted)">
          ${f.noisyPatternCount ? `<span style="color:var(--red)">${f.noisyPatternCount} шум</span> ` : ''}
          ${f.missingCriticalCount ? `<span style="color:var(--yellow)">${f.missingCriticalCount} без логов</span> ` : ''}
          ${f.failurePointCount ? `<span style="color:var(--yellow)">${f.failurePointCount} точек отказа</span> ` : ''}
          ${f.fieldGapCount ? `<span style="color:var(--muted)">${f.fieldGapCount} пробелов</span>` : ''}
        </div>` : '<div style="font-size:11px;color:var(--green)">Всё ок</div>'}
      </div>`;

    card.onclick = () => setFeatureDrill(f.key);
    card.onmousedown = (e) => { if (e.button === 1) e.preventDefault(); };
    card.onauxclick = (e) => {
      if (e.button !== 1) return;
      e.preventDefault();
      openFeatureInNewTab(f.key);
    };
    grid.appendChild(card);
  });

  // Unmapped card
  const unmappedCatalog = o.catalog.filter(ci => !ci.featureKeys || ci.featureKeys.length === 0);
  if (unmappedCatalog.length > 0) {
    const uCard = document.createElement('div');
    uCard.className = 'feature-card unmapped-card';
    uCard.innerHTML = `
      <div class="feature-accent" style="background:#e3b341"></div>
      <div class="feature-body">
        <div class="feature-title">
          <span>Unmapped</span>
          <span class="feature-file-count">${unmappedCatalog.length} лог-модулей</span>
        </div>
        <div style="font-size:12px;color:var(--dim);margin-top:4px">Модули с логами, не привязанные к фичам</div>
      </div>`;
    uCard.onclick = () => setFeatureDrill('__unmapped__');
    grid.appendChild(uCard);
  }
}

function toPct(v) {
  return Math.round((v || 0) * 100) + '%';
}

function renderObservabilityOverview(c) {
  const o = D.observability;
  if (!o) return '';
  const metrics = [
    ['Коэффициент шума', toPct(o.metrics.noise_ratio)],
    ['Действия по ошибкам', toPct(o.metrics.error_actionability)],
    ['Полнота структуры', toPct(o.metrics.structured_completeness)],
    ['Покрытие ключевых сценариев', toPct(o.metrics.coverage_of_key_flows)],
  ];
  const noisy = (o.topNoisyPatterns || []).slice(0, 5).map(i =>
    `<div class="obs-row"><span class="obs-priority-${i.priority}">[${i.priority}]</span> ${escapeHtml(i.pattern)} · x${i.count} → <b>${i.recommendation}</b></div>`
  ).join('') || '<div class="obs-row">Нет шумных паттернов</div>';

  const v2Missing = o.missingCriticalLogsV2 || [];
  let missing;
  if (v2Missing.length) {
    const tierLabels = { critical: '🔴 крит', important: '🟡 важн', normal: '⚪ обычн' };
    missing = v2Missing.slice(0, 8).map(m =>
      `<div class="obs-row"><span class="obs-tier-badge obs-tier-${m.riskTier}">${tierLabels[m.riskTier]}</span> ${escapeHtml(m.modulePath)} · ${m.failurePoints.length} точек отказа</div>`
    ).join('');
    if (v2Missing.length > 8) missing += `<div class="obs-row" style="color:var(--dim)">...и ещё ${v2Missing.length - 8}</div>`;
  } else {
    missing = (o.missingCriticalLogs || []).slice(0, 5).map(i =>
      `<div class="obs-row"><span class="obs-priority-${i.priority}">[${i.priority}]</span> ${escapeHtml(i.pattern)} → <b>${i.recommendation}</b></div>`
    ).join('') || '<div class="obs-row">Критичные логи покрыты</div>';
  }

  const catalogRows = (o.catalog || []).slice(0, 10).map(i =>
    `<div class="obs-cat-row"><span>${escapeHtml(i.modulePath)}</span><span>${i.level}</span><span>${i.format}</span><span>${i.frequency}</span><span>${escapeHtml(i.owner)}</span><span>${i.recommendation}</span></div>`
  ).join('');

  return `
    <div class="observability-panel">
      <div class="observability-title">Наблюдаемость</div>
      <div class="obs-metrics">
        ${metrics.map(([l,v]) => `<div class="obs-metric"><div class="obs-metric-v">${v}</div><div class="obs-metric-l">${l}</div></div>`).join('')}
      </div>
      <div class="obs-columns">
        <div class="obs-list">
          <h4>Топ шумных паттернов</h4>
          ${noisy}
        </div>
        <div class="obs-list">
          <h4>Отсутствующие критичные логи</h4>
          ${missing}
        </div>
      </div>
      <div class="obs-catalog">

function renderDocFeatureCards(c) {
  const doc = D.documentation;
  if (!doc || !doc.features.length) {
    c.innerHTML = `<div class="onboarding-block"><h3>Документация</h3><p>Фичи не найдены. Добавьте фичи в viberadar.config.json.</p></div>`;
    return;
  }

  const q = searchQuery.toLowerCase();
  const filtered = doc.features.filter(f => !q || f.label.toLowerCase().includes(q) || f.key.toLowerCase().includes(q));

  const docPct = doc.totalFeatures > 0 ? Math.round(((doc.freshCount + doc.staleCount) / doc.totalFeatures) * 100) : 0;

  let html = `
    <div class="doc-kpi-strip">
      <div class="doc-kpi"><span class="doc-kpi-val">${doc.totalFeatures}</span><span class="doc-kpi-lbl">Всего фич</span></div>
      <div class="doc-kpi"><span class="doc-kpi-val" style="color:var(--green)">${doc.freshCount}</span><span class="doc-kpi-lbl">Актуальных</span></div>
      <div class="doc-kpi"><span class="doc-kpi-val" style="color:var(--yellow)">${doc.staleCount}</span><span class="doc-kpi-lbl">Устаревших</span></div>
      <div class="doc-kpi"><span class="doc-kpi-val" style="color:var(--red)">${doc.missingCount}</span><span class="doc-kpi-lbl">Без доки</span></div>
      <div class="doc-kpi"><span class="doc-kpi-val">${docPct}%</span><span class="doc-kpi-lbl">Задокументировано</span></div>
    </div>
    <div class="features-grid">`;

  for (const f of filtered) {
    const statusColor = !f.docExists ? 'var(--red)' : f.isStale ? 'var(--yellow)' : 'var(--green)';
    const statusText = !f.docExists ? 'Отсутствует' : f.isStale ? `Устарела (${f.changedFilesSinceDoc.length} файл.)` : 'Актуальна';
    const statusDot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${statusColor};margin-right:6px"></span>`;
    const lastUpd = f.lastUpdated ? new Date(f.lastUpdated).toLocaleDateString('ru-RU') : '—';
    const freshFiles = f.docExists ? (f.sourceFileCount - f.changedFilesSinceDoc.length) : 0;
    const progressPct = f.sourceFileCount > 0 ? Math.round((freshFiles / f.sourceFileCount) * 100) : 0;
    const progressColor = !f.docExists ? 'var(--red)' : f.isStale ? 'var(--yellow)' : 'var(--green)';

    const versionBadge = f.latestVersion
      ? `<span style="font-size:10px;color:var(--muted);margin-left:6px">v${f.latestVersion}</span>`
      : '';
    const actualizeBtn = `<button class="agent-card-btn doc-agent-btn" data-task="actualize-docs" data-key="${f.key}" style="margin-top:8px">Актуализировать документацию</button>`;
    const agentBtn = (f.docExists && !f.isStale)
      ? `<div style="margin-top:8px;font-size:11px;color:var(--green)">✓ Актуальна${versionBadge}</div>${actualizeBtn}`
      : actualizeBtn;

    html += `
      <div class="feature-card doc-feature-card" data-key="${f.key}">
        <div class="feature-accent" style="background:${f.color}"></div>
        <div class="feature-body">
          <div class="feature-title">
            <span>${escapeHtml(f.label)}</span>
            <span class="feature-file-count">${f.sourceFileCount} файл.</span>
          </div>
          <div style="display:flex;align-items:center;gap:4px;margin:6px 0;font-size:12px">
            ${statusDot}<span style="color:${statusColor};font-weight:600">${statusText}</span>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Обновлено: ${lastUpd}</div>
          <div class="feature-progress-bar">
            <div class="feature-progress-fill" style="width:${f.docExists ? progressPct : 0}%;background:${progressColor}"></div>
          </div>
          <div class="feature-progress-label">${f.docExists ? (f.isStale ? `${f.changedFilesSinceDoc.length} из ${f.sourceFileCount} изменены` : `${f.sourceFileCount} из ${f.sourceFileCount} актуальны`) : 'Документация отсутствует'}</div>
          ${agentBtn}
        </div>
      </div>`;
  }
  html += '</div>';
  c.innerHTML = html;

  // Card click → drill-down
  c.querySelectorAll('.doc-feature-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.doc-agent-btn')) return;
      setFeatureDrill(card.dataset.key);
    });
  });

  // Agent button clicks
  c.querySelectorAll('.doc-agent-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      runAgentTask(btn.dataset.task, btn.dataset.key);
    });
  });
}

// Lightweight markdown → HTML renderer
function renderMarkdownToHtml(md) {
  let html = '';
  const lines = md.split('\n');
  let inCodeBlock = false;
  let codeBlockContent = '';
  let inList = false;
  let listType = '';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // Code blocks
    if (line.trimStart().startsWith('```')) {
      if (inCodeBlock) {
        html += `<pre class="doc-code"><code>${escapeHtml(codeBlockContent.trimEnd())}</code></pre>`;
        codeBlockContent = '';
        inCodeBlock = false;
      } else {
        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        inCodeBlock = true;
      }
      continue;
    }
    if (inCodeBlock) {
      codeBlockContent += line + '\n';
      continue;
    }

    // Headings
    const headingMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if (headingMatch) {
      if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
      const level = headingMatch[1].length;
      html += `<h${level} class="doc-h">${inlineFormat(headingMatch[2])}</h${level}>`;
      continue;
    }

    // Unordered list
    if (/^\s*[-*]\s+/.test(line)) {
      if (!inList || listType !== 'ul') {
        if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
        html += '<ul class="doc-list">';
        inList = true;
        listType = 'ul';
      }
      html += `<li>${inlineFormat(line.replace(/^\s*[-*]\s+/, ''))}</li>`;
      continue;
    }

    // Ordered list
    if (/^\s*\d+\.\s+/.test(line)) {
      if (!inList || listType !== 'ol') {
        if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
        html += '<ol class="doc-list">';
        inList = true;
        listType = 'ol';
      }
      html += `<li>${inlineFormat(line.replace(/^\s*\d+\.\s+/, ''))}</li>`;
      continue;
    }

    // End list
    if (inList && line.trim() === '') {
      html += listType === 'ul' ? '</ul>' : '</ol>';
      inList = false;
    }

    // Empty line
    if (line.trim() === '') continue;

    // Image line: ![alt](screenshots/file.png)
    const imgMatch = line.trim().match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if (imgMatch) {
      if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
      const alt = escapeHtml(imgMatch[1]);
      let src = imgMatch[2];
      // Rewrite relative screenshot paths to API endpoint
      if (src.startsWith('screenshots/') && drillFeatureKey) {
        src = '/api/docs/screenshot/' + drillFeatureKey + '/' + src;
      }
      html += `<div style="margin:12px 0;text-align:center"><img src="${src}" alt="${alt}" style="max-width:100%;border-radius:8px;border:1px solid var(--border)"><div style="font-size:11px;color:var(--muted);margin-top:4px">${alt}</div></div>`;
      continue;
    }

    // Paragraph
    if (!inList) {
      html += `<p class="doc-p">${inlineFormat(line)}</p>`;
    }
  }

  if (inCodeBlock) {
    html += `<pre class="doc-code"><code>${escapeHtml(codeBlockContent.trimEnd())}</code></pre>`;
  }
  if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
  return html;
}

function inlineFormat(text) {
  let s = escapeHtml(text);
  s = s.replace(/`([^`]+)`/g, '<code class="doc-inline-code">$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--blue)">$1</a>');
  return s;
}

let docContentCache = {};

async function renderDocFeatureDetail(c) {
  const doc = D.documentation;
  const f = doc?.features.find(x => x.key === drillFeatureKey);
  if (!f) {
    c.innerHTML = `<div class="onboarding-block"><p>Фича не найдена.</p></div>`;
    return;
  }

  const statusColor = !f.docExists ? 'var(--red)' : f.isStale ? 'var(--yellow)' : 'var(--green)';
  const statusText = !f.docExists ? 'Отсутствует' : f.isStale ? `Устарела (${f.changedFilesSinceDoc.length} файл.)` : 'Актуальна';
  const statusDot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${statusColor};margin-right:6px"></span>`;
  const lastUpd = f.lastUpdated ? new Date(f.lastUpdated).toLocaleDateString('ru-RU') : '—';

  // Single action button
  const detailActualizeLabel = !f.docExists
    ? 'Актуализировать документацию'
    : f.isStale
      ? `Актуализировать документацию (${f.changedFilesSinceDoc.length} изм. файл.) → v${(f.latestVersion || 0) + 1}`
      : `Актуализировать документацию → v${(f.latestVersion || 0) + 1}`;
  const detailActualizeHint = !f.docExists
    ? 'Агент читает все файлы фичи и создаёт v1 пользовательской документации.'
    : f.isStale
      ? 'Агент читает изменившиеся файлы и создаёт новую версию документации.'
      : 'Агент перечитывает файлы и создаёт обновлённую версию документации.';
  const versionsHtml = f.docVersions && f.docVersions.length > 0
    ? `<div style="font-size:11px;color:var(--muted);margin-top:6px">Версии: ${f.docVersions.map((v, i) => `<span style="${i === f.docVersions.length - 1 ? 'color:var(--text)' : ''}">${v.split('/').pop()}</span>`).join(' · ')}</div>`
    : '';
  const detailActionsHtml = `
    <div class="doc-detail-actions">
      <div class="doc-action-step">
        <div>
          <div class="doc-step-label">${detailActualizeLabel}</div>
          <div class="doc-step-hint">${detailActualizeHint}</div>
          <button class="agent-card-btn doc-detail-agent-btn" data-task="actualize-docs" data-key="${f.key}" style="margin-top:8px">Актуализировать документацию</button>
          ${versionsHtml}
        </div>
      </div>
    </div>`;

  let changedFilesHtml = '';
  if (f.isStale && f.changedFilesSinceDoc.length > 0) {
    changedFilesHtml = `
      <div class="doc-changed-section">
        <div class="doc-changed-header" onclick="this.parentElement.classList.toggle('open')">
          Изменённые файлы (${f.changedFilesSinceDoc.length})
          <span class="doc-changed-arrow">&#9654;</span>
        </div>
        <div class="doc-changed-list">
          ${f.changedFilesSinceDoc.map(fp => `<div class="doc-changed-file">${escapeHtml(fp)}</div>`).join('')}
        </div>
      </div>`;
  }

  let docContentHtml = '';
  if (f.docExists) {
    // Fetch content if not cached
    if (!docContentCache[f.key]) {
      try {
        const resp = await fetch('/api/docs/content?feature=' + encodeURIComponent(f.key));
        const data = await resp.json();
        if (data.exists && data.content) docContentCache[f.key] = data.content;
      } catch {}
    }
    const raw = docContentCache[f.key] || '';
    docContentHtml = raw ? `<div class="doc-content">${renderMarkdownToHtml(raw)}</div>` : '<div style="color:var(--muted);padding:16px">Не удалось загрузить содержимое документации.</div>';
  } else {
    docContentHtml = `<div style="color:var(--muted);padding:16px;text-align:center">Документация ещё не создана. Нажмите кнопку ниже, чтобы сгенерировать.</div>`;
  }

  c.innerHTML = `
    <div style="margin-bottom:16px">
      <button class="back-btn" id="docBackBtn">&#8592; Все фичи</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div style="width:4px;height:28px;border-radius:2px;background:${f.color}"></div>
      <h2 style="margin:0;font-size:18px;color:var(--text)">${escapeHtml(f.label)}</h2>
      <div style="display:flex;align-items:center;font-size:13px">${statusDot}<span style="color:${statusColor};font-weight:600">${statusText}</span></div>
      <span style="font-size:12px;color:var(--muted)">Обновлено: ${lastUpd}</span>
    </div>
    ${detailActionsHtml}
    ${changedFilesHtml}
    ${docContentHtml}`;

  document.getElementById('docBackBtn').onclick = () => backToFeatures();

  c.querySelectorAll('.doc-detail-agent-btn').forEach(btn => {
    btn.addEventListener('click', () => runAgentTask(btn.dataset.task, btn.dataset.key));
  });
}

function renderFeatureCards(c) {
  if (!D.hasConfig || !D.features) {
    c.innerHTML = `
      <div class="no-config">
        <div class="no-config-icon">🗺️</div>
        <h2>Карта фич не настроена</h2>
        <p>Запусти команду ниже, вставь промпт в AI-агента —<br>он создаст <code>viberadar.config.json</code> с описанием твоих фич</p>
        <div class="no-config-cmd">npx viberadar init</div>
        <p style="font-size:13px;color:#484f58">После создания конфига перезапусти VibeRadar</p>
      </div>`;
    return;
  }

  const q = searchQuery.toLowerCase();
  const list = D.features.filter(f =>
    !q || f.label.toLowerCase().includes(q) || f.description.toLowerCase().includes(q)
  );

  if (!list.length) { c.innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }

  // Agent setup banner — shown when no agent configured
  const setupBanner = !D.agent ? `
    <div class="agent-setup-banner">
      <h3>🤖 Выбери AI агента</h3>
      <p>VibeRadar будет запускать его прямо из дашборда — писать тесты, разбирать unmapped и не только</p>
      <div class="agent-choices">
        <button class="agent-choice-btn" onclick="setAgent('claude')">⚡ Claude Code</button>
        <button class="agent-choice-btn" onclick="setAgent('codex')">🟢 Codex (OpenAI)</button>
      </div>
    </div>` : '';

  c.innerHTML = setupBanner + '<div class="features-grid" id="featGrid"></div>';
  const grid = document.getElementById('featGrid');

  list.forEach(f => {
    const pct = f.fileCount > 0 ? Math.round(f.testedCount / f.fileCount * 100) : 0;
    const isActive = activePanelKey === f.key;
    const hasCov = f.coveragePct != null;
    const covPct = hasCov ? Math.round(f.coveragePct) : null;

    const card = document.createElement('div');
    card.className = 'feature-card' + (isActive ? ' active' : '');
    card.innerHTML = `
      <div class="feature-accent" style="background:${f.color}"></div>
      <div class="feature-body">
        <div class="feature-title">
          <span>${f.label}</span>
          <span class="feature-file-count">${f.fileCount} ${pluralFiles(f.fileCount)}</span>
        </div>
        ${f.description ? `<div class="feature-desc">${f.description}</div>` : ''}
        ${hasCov ? `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="font-size:24px;font-weight:700;line-height:1;color:${covColor(covPct)}">${covPct}%</span>
          <div style="flex:1">
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.4px">Coverage</div>
            <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">
              <div style="width:${covPct}%;height:100%;background:${covColor(covPct)};border-radius:2px;transition:width 0.4s"></div>
            </div>
          </div>
        </div>` : `
        <div style="font-size:11px;color:var(--dim);margin-bottom:10px">
          coverage: нет данных
        </div>`}
        <div class="feature-progress-wrap">
          <div class="feature-progress-bar">
            <div class="feature-progress-fill" style="width:${pct}%;background:${f.color}"></div>
          </div>
          <span class="feature-progress-label" style="color:${covColor(pct)}">${f.testedCount}/${f.fileCount} с тестами</span>
        </div>
        ${D.agent && f.fileCount > f.testedCount ? `
        <button class="agent-card-btn" data-task="write-tests" data-key="${f.key}">
          ▶ Написать тесты (${f.fileCount - f.testedCount} без тестов)
        </button>` : ''}
      </div>`;
    card.onmousedown = (e) => {
      if (e.button === 1 && !e.target.closest('.agent-card-btn')) e.preventDefault();
    };
    card.onauxclick = (e) => {
      if (e.button !== 1 || e.target.closest('.agent-card-btn')) return;
      e.preventDefault();
      openFeatureInNewTab(f.key);
    };
    card.onclick = (e) => {
      if (e.target.closest('.agent-card-btn')) return; // don't drill on agent btn click
      if (e.metaKey || e.ctrlKey) {
        openFeatureInNewTab(f.key);
        return;
      }
      setFeatureDrill(f.key);
    };
    const agentBtn = card.querySelector('.agent-card-btn');
    if (agentBtn) {
      agentBtn.onclick = (e) => {
        e.stopPropagation();
        runAgentTask(agentBtn.dataset.task, agentBtn.dataset.key);
      };
    }
    grid.appendChild(card);
  });

  // ── Unmapped card ──────────────────────────────────────────────────────────
  if (!q) {
    const infraSrc    = D.modules.filter(m => m.type !== 'test' && m.isInfra);
    const unmappedSrc = D.modules.filter(m =>
      m.type !== 'test' && !m.isInfra && (!m.featureKeys || m.featureKeys.length === 0)
    );
    if (unmappedSrc.length > 0) {
      const isActive = activePanelKey === '__unmapped__';
      const card = document.createElement('div');
      card.className = 'feature-card' + (isActive ? ' active' : '');
      card.style.borderStyle = 'dashed';
      card.style.opacity = '0.75';
      const infraNote = infraSrc.length > 0
        ? `<br><span style="color:var(--dim);font-size:11px">+ ${infraSrc.length} infra/system скрыты</span>`
        : '';
      card.innerHTML = `
        <div class="feature-accent" style="background:var(--yellow)"></div>
        <div class="feature-body">
          <div class="feature-title">
            <span style="color:var(--yellow)">⚠ Unmapped</span>
            <span class="feature-file-count">${unmappedSrc.length} ${pluralFiles(unmappedSrc.length)}</span>
          </div>
          <div class="feature-desc">Файлы вне карты фич — не входят ни в одну фичу${infraNote}</div>
          <div class="feature-progress-wrap">
            <div class="feature-progress-bar">
              <div class="feature-progress-fill" style="width:100%;background:var(--border)"></div>
            </div>
            <span class="feature-progress-label" style="color:var(--dim)">нет привязки</span>
          </div>
        </div>`;
      card.onmousedown = (e) => {
        if (e.button === 1) e.preventDefault();
      };
      card.onauxclick = (e) => {
        if (e.button !== 1) return;
        e.preventDefault();
        openFeatureInNewTab('__unmapped__');
      };
      card.onclick = (e) => {
        if (e.metaKey || e.ctrlKey) {
          openFeatureInNewTab('__unmapped__');
          return;
        }
        setFeatureDrill('__unmapped__');
      };
      grid.appendChild(card);
    }
  }
}

// ─── E2E Plan functions ────────────────────────────────────────────────────────

async function generateE2ePlan(featureKey) {
  if (D.agentRunning) { alert('Агент уже запущен'); return; }
  await fetch('/api/e2e/generate-plan', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ featureKey })
  });
}

async function loadE2ePlan(featureKey) {
  e2ePlanLoading = true;
  e2ePlan = null;
  try {
    const r = await fetch(`/api/e2e/plan/${encodeURIComponent(featureKey)}`);
    if (r.ok) e2ePlan = await r.json();
  } catch {}
  e2ePlanLoading = false;
}

async function reviewE2eCase(featureKey, testCaseId, status) {
  const r = await fetch('/api/e2e/review', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ featureKey, testCaseId, status })
  });
  if (r.ok) { const data = await r.json(); e2ePlan = data.plan; renderContent(); }
}

async function reviewAllE2e(featureKey, status) {
  const r = await fetch('/api/e2e/review-all', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ featureKey, status })
  });
  if (r.ok) { const data = await r.json(); e2ePlan = data.plan; renderContent(); }
}

async function writeE2eTests(featureKey) {
  if (D.agentRunning) { alert('Агент уже запущен'); return; }
  await fetch('/api/e2e/write-tests', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ featureKey })
  });
}

async function runE2eTests(featureKey) {
  await fetch('/api/e2e/run-tests', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ featureKey })
  });
}

function openScreenshot(src) {
  const modal = document.createElement('div');
  modal.className = 'e2e-screenshot-modal';
  modal.innerHTML = `<img src="${src}" />`;
  modal.onclick = () => modal.remove();
  document.body.appendChild(modal);
}

function statusBadge(status) {
  const labels = { pending:'⏳ ожидает', approved:'✅ одобрен', rejected:'❌ отклонён', written:'✍ написан', passed:'✅ прошёл', failed:'❌ упал' };
  return `<span class="e2e-status-badge ${status}">${labels[status] || status}</span>`;
}

function renderE2eTestCase(tc, featureKey) {
  const screenshots = (tc.screenshotPaths || []).map(p =>
    `<img class="e2e-screenshot" src="/api/e2e/screenshot/${encodeURIComponent(p)}" onclick="openScreenshot(this.src)" />`
  ).join('');
  const screenshotStrip = screenshots ? `<div class="e2e-screenshot-strip">${screenshots}</div>` : '';
  const errorBlock = tc.lastError ? `<div class="e2e-error">❌ ${tc.lastError}</div>` : '';
  return `
    <div class="e2e-case ${tc.status}" id="e2e-case-${tc.id}">
      <div class="e2e-case-header">
        <div class="e2e-case-name">${tc.name}</div>
        ${statusBadge(tc.status)}
      </div>
      <div class="e2e-case-desc">${tc.description}</div>
      <div class="e2e-steps"><ol>${tc.steps.map(s => `<li>${s}</li>`).join('')}</ol></div>
      <div class="e2e-expected">Ожидается: ${tc.expectedResults.join('; ')}</div>
      ${errorBlock}
      ${screenshotStrip}
      <div class="e2e-case-actions">
        <button class="e2e-btn e2e-btn-approve" onclick="reviewE2eCase('${featureKey}','${tc.id}','approved')">✅ Одобрить</button>
        <button class="e2e-btn e2e-btn-reject"  onclick="reviewE2eCase('${featureKey}','${tc.id}','rejected')">❌ Отклонить</button>
      </div>
    </div>`;
}

function renderE2ePlanView(c) {
  const featureKey = drillFeatureKey;
  const feat = D.features.find(f => f.key === featureKey);

  if (e2ePlanLoading) {
    c.innerHTML = `<div style="padding:40px;text-align:center;color:var(--dim)">Загружаю план…</div>`;
    return;
  }

  if (!e2ePlan) {
    const hasPW = D.hasPlaywright;
    c.innerHTML = `
      <div class="drill-header">
        <button class="back-btn" onclick="drillTestType=null;renderContent()">← Назад</button>
        <div class="drill-title"><span>🎭 E2E план — ${feat?.label || featureKey}</span></div>
      </div>
      <div style="padding:40px;text-align:center;border:1px dashed var(--border);border-radius:8px;margin-top:16px">
        ${!hasPW ? '<div style="color:#f85149;margin-bottom:12px">⚠️ @playwright/test не найден в проекте</div>' : ''}
        <div style="color:var(--dim);margin-bottom:16px">E2E план не создан. AI проанализирует файлы фичи и предложит тест-кейсы.</div>
        <button class="e2e-btn e2e-btn-primary" onclick="generateE2ePlan('${featureKey}')">▶ Сгенерировать план</button>
      </div>`;
    return;
  }

  const total    = e2ePlan.testCases.length;
  const approved = e2ePlan.testCases.filter(t => t.status === 'approved').length;
  const rejected = e2ePlan.testCases.filter(t => t.status === 'rejected').length;
  const written  = e2ePlan.testCases.filter(t => ['written','passed','failed'].includes(t.status)).length;
  const passed   = e2ePlan.testCases.filter(t => t.status === 'passed').length;
  const failed   = e2ePlan.testCases.filter(t => t.status === 'failed').length;

  c.innerHTML = `
    <div class="drill-header">
      <button class="back-btn" onclick="drillTestType=null;renderContent()">← Назад</button>
      <div class="drill-title"><span>🎭 E2E план — ${feat?.label || featureKey}</span></div>
    </div>
    <div class="e2e-plan-container">
      <div class="e2e-batch-bar">
        <button class="e2e-btn e2e-btn-approve" onclick="reviewAllE2e('${featureKey}','approved')">✅ Одобрить все</button>
        <button class="e2e-btn e2e-btn-reject"  onclick="reviewAllE2e('${featureKey}','rejected')">❌ Отклонить все</button>
        <button class="e2e-btn e2e-btn-primary"  onclick="writeE2eTests('${featureKey}')" ${approved===0?'disabled':''}>✍ Написать тесты (${approved})</button>
        <button class="e2e-btn e2e-btn-secondary" onclick="runE2eTests('${featureKey}')" ${written===0?'disabled':''}>▶ Запустить E2E</button>
        <button class="e2e-btn e2e-btn-secondary" onclick="generateE2ePlan('${featureKey}')">🔄 Перегенерировать</button>
        <span class="e2e-stats">${total} кейсов · ✅ ${passed} · ❌ ${failed} · одобрено: ${approved} · отклонено: ${rejected}</span>
      </div>
      ${e2ePlan.testCases.map(tc => renderE2eTestCase(tc, featureKey)).join('')}
    </div>`;
}

function testTypeCard(type, label, icon, color, count, active, featureKey, failedCount = 0) {
  const empty     = count === 0 && type !== 'source' && type !== 'e2e';
  const hasFailed = failedCount > 0 && type !== 'source';
  const subLabel  = type === 'source' ? 'файлов'
    : type === 'e2e' ? (count > 0 ? pluralFiles(count) : (D.e2ePlansExist?.[featureKey] ? '📋 план создан' : 'нет тестов'))
    : (empty ? 'нет тестов' : pluralFiles(count));
  const accentColor = hasFailed ? 'var(--red)' : color;
  const countColor  = hasFailed ? 'var(--red)' : (active || !empty || type === 'e2e' ? color : 'var(--dim)');

  const failedBadge = hasFailed
    ? `<span class="tt-failed-badge">❌ ${failedCount}</span>`
    : '';

  const runBtn = !empty && type !== 'source' && type !== 'e2e' && featureKey
    ? `<button class="tt-run-btn" onclick="event.stopPropagation();runTests('${featureKey}','${type}')">▶ запустить тесты</button>`
    : '';
  const fixAllBtn = hasFailed && D.agent && featureKey
    ? `<button class="tt-run-btn tt-fix-btn" onclick="event.stopPropagation();runAgentTask('fix-tests-all','${featureKey}','${type}')">🔧 починить все</button>`
    : '';
  const writeBtn = type !== 'source' && type !== 'e2e' && D.agent && featureKey
    ? `<button class="tt-run-btn tt-write-btn" onclick="event.stopPropagation();runAgentTask('write-tests','${featureKey}')">✍ написать тесты</button>`
    : '';
  const actions = (runBtn || fixAllBtn || writeBtn)
    ? `<div class="tt-card-actions">${runBtn}${fixAllBtn}${writeBtn}</div>`
    : '';

  return `
    <div class="test-type-card${empty ? ' tt-empty' : ''}${active ? ' tt-active' : ''}${hasFailed ? ' tt-failed' : ''}"
         data-testtype="${type}" style="border-top-color:${accentColor}">
      <div class="tt-card-header">
        <span class="tt-label">${icon} ${label}</span>
        ${failedBadge}
      </div>
      <span class="tt-count" style="color:${countColor}">${count}</span>
      <span class="tt-sub">${subLabel}</span>
      ${actions}
    </div>`;
}

function renderFeatureDetail(c) {
  const feat = D.features.find(f => f.key === drillFeatureKey);
  if (!feat) { backToFeatures(); return; }

  // E2E tab → show plan view instead of file list
  if (drillTestType === 'e2e') {
    renderE2ePlanView(c);
    return;
  }

  const mods = D.modules.filter(m => m.featureKeys && m.featureKeys.includes(drillFeatureKey));
  const src  = mods.filter(m => m.type !== 'test');
  const untestedSrc = src.filter(m => !m.hasTests);
  const tst  = mods.filter(m => m.type === 'test');
  const testedCount = src.filter(m => m.hasTests).length;
  const pct  = src.length > 0 ? Math.round(testedCount / src.length * 100) : 0;

  const unitCount        = feat.unitTestCount        ?? tst.filter(m => m.testType === 'unit').length;
  const integrationCount = feat.integrationTestCount ?? tst.filter(m => m.testType === 'integration').length;
  const e2eCount         = feat.e2eTestCount         ?? tst.filter(m => m.testType === 'e2e').length;

  // Count failing test files per type (from last test run)
  const te = D.testErrors || {};
  const unitFailed        = tst.filter(m => m.testType === 'unit'        && te[m.relativePath.replace(/\\/g, '/')]).length;
  const integrationFailed = tst.filter(m => m.testType === 'integration' && te[m.relativePath.replace(/\\/g, '/')]).length;
  const e2eFailed         = tst.filter(m => m.testType === 'e2e'         && te[m.relativePath.replace(/\\/g, '/')]).length;

  // Determine what list to show based on active tab
  // null or 'source' → source files; test type → test files of that type
  const activeTab  = drillTestType || 'source';
  const sourceList = showOnlyUntestedInFeature ? untestedSrc : src;
  const listFiles  = activeTab === 'source' ? sourceList : tst.filter(m => m.testType === activeTab);
  const isTestList = activeTab !== 'source';
  const showUntestedToggle = activeTab === 'source';
  const meta       = TEST_TYPE_META[activeTab];
  const listLabel  = meta
    ? `${meta.icon} ${meta.label} тесты (${listFiles.length})`
    : `📁 Файлы фичи (${listFiles.length})`;

  const q = searchQuery.toLowerCase();
  const filtered = q ? listFiles.filter(m =>
    m.name.toLowerCase().includes(q) || m.relativePath.toLowerCase().includes(q)
  ) : listFiles;
  const rowsRenderKey = `feature:${drillFeatureKey}:${activeTab}:${showOnlyUntestedInFeature ? 1 : 0}:${q}`;
  const { visibleRows, hiddenRows, hasMoreRows } = getFileRowsWindow(filtered, rowsRenderKey);
  const selectableSource = !isTestList && !!D.agent;
  const visibleSourcePaths = selectableSource
    ? visibleRows.map(m => m.relativePath.replace(/\\/g, '/'))
    : [];
  const selectedVisible = selectableSource
    ? selectedFilesForFeature(drillFeatureKey, visibleRows.map(m => m.relativePath))
    : [];
  const selectedCount = selectedVisible.length;

  c.innerHTML = `
    <div class="drill-header">
      <button class="back-btn" onclick="backToFeatures()">← Все фичи</button>
      <div class="drill-title">
        <div style="width:10px;height:10px;border-radius:50%;background:${feat.color};flex-shrink:0"></div>
        <span>${feat.label}</span>
      </div>
      <div class="drill-stats">
        <span>${src.length} файлов</span>
        <span style="color:${covColor(pct)}">${pct}% с тестами</span>
        ${feat.coveragePct != null
          ? `<span style="color:${covColor(Math.round(feat.coveragePct))};font-weight:700">${Math.round(feat.coveragePct)}% coverage</span>`
          : `<span style="color:var(--dim);font-size:11px" title="Coverage не запускался">coverage: нет данных</span>`
        }
      </div>
    </div>
    ${feat.description ? `<div class="drill-desc">${feat.description}</div>` : ''}

    <div class="test-type-grid">
      ${testTypeCard('source',      'Файлы',       '📁', feat.color, src.length,       activeTab === 'source',      drillFeatureKey, 0)}
      ${testTypeCard('unit',        'Unit',        '🧪', '#e3b341',  unitCount,        activeTab === 'unit',        drillFeatureKey, unitFailed)}
      ${testTypeCard('integration', 'Integration', '🔗', '#58a6ff',  integrationCount, activeTab === 'integration', drillFeatureKey, integrationFailed)}
      ${testTypeCard('e2e',         'E2E',         '🎭', '#d2a8ff',  e2eCount,         activeTab === 'e2e',         drillFeatureKey, e2eFailed)}
    </div>

    <div class="drill-section-label">${listLabel}</div>
    ${showUntestedToggle ? `
      <div class="feature-file-filters">
        <label class="feature-filter-toggle">
          <input type="checkbox" id="untestedOnlyToggle" ${showOnlyUntestedInFeature ? 'checked' : ''}>
          <span>Только без тестов</span>
          <span class="feature-filter-meta">(${untestedSrc.length})</span>
        </label>
      </div>` : ''}
    ${selectableSource ? `
      <div class="bulk-actions">
        <span class="bulk-actions-count">Выбрано файлов: <b>${selectedCount}</b></span>
        <button class="bulk-actions-btn" id="bulkSelectAllBtn" ${visibleSourcePaths.length === 0 ? 'disabled' : ''}>☑ Выбрать все (${visibleSourcePaths.length})</button>
        <button class="bulk-actions-btn" id="bulkClearBtn" ${selectedCount === 0 ? 'disabled' : ''}>Снять выбор</button>
        <button class="bulk-actions-btn primary" id="bulkWriteTestsBtn" ${selectedCount === 0 ? 'disabled' : ''}>✍ Написать тесты для выбранных</button>
        <button class="bulk-actions-btn" id="bulkRefreshTestsBtn" ${selectedCount === 0 ? 'disabled' : ''}>↻ Актуализировать тесты</button>
      </div>` : ''}
    <div class="file-rows" id="fileRows">
      ${filtered.length === 0
        ? `<div style="padding:20px;text-align:center;border:1px dashed var(--border);border-radius:8px;color:var(--dim);font-size:13px">
            ${isTestList
              ? 'Нет тестов этого типа для данной фичи'
              : (showOnlyUntestedInFeature
                  ? 'Все файлы этой фичи уже покрыты тестами'
                  : 'Нет файлов — возможно паттерны в конфиге не совпадают')}
          </div>`
        : visibleRows.map(m => fileRow(m, isTestList, drillFeatureKey, selectableSource)).join('')
      }
    </div>
    ${hasMoreRows ? `
      <div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg-card);font-size:12px;color:var(--dim)">
        <span>Показано ${visibleRows.length} из ${filtered.length} файлов</span>
        <button class="bulk-actions-btn" id="fileRowsLoadMoreBtn">Показать ещё ${Math.min(FILE_ROWS_LIMIT_STEP, hiddenRows)}</button>
      </div>` : ''}`;

  const untestedOnlyToggle = document.getElementById('untestedOnlyToggle');
  if (untestedOnlyToggle) {
    untestedOnlyToggle.onchange = (e) => {
      showOnlyUntestedInFeature = !!e.target.checked;
      renderContent();
    };
  }

  if (selectableSource) {
    const allVisibleSelected = visibleSourcePaths.length > 0 && visibleSourcePaths.every((p) => selectedSourceFiles.has(p));
    const bulkSelectAllBtn = document.getElementById('bulkSelectAllBtn');
    if (bulkSelectAllBtn) {
      bulkSelectAllBtn.textContent = allVisibleSelected
        ? `☑ Выбраны все (${visibleSourcePaths.length})`
        : `☑ Выбрать все (${visibleSourcePaths.length})`;
      bulkSelectAllBtn.onclick = () => {
        visibleSourcePaths.forEach((p) => selectedSourceFiles.add(p));
        renderContent();
      };
    }
    const bulkClearBtn = document.getElementById('bulkClearBtn');
    if (bulkClearBtn) {
      bulkClearBtn.onclick = () => {
        selectedVisible.forEach((p) => selectedSourceFiles.delete(p));
        renderContent();
      };
    }
    const bulkWriteTestsBtn = document.getElementById('bulkWriteTestsBtn');
    if (bulkWriteTestsBtn) {
      bulkWriteTestsBtn.onclick = () => {
        runAgentTask('write-tests-selected', drillFeatureKey, null, selectedVisible);
        selectedVisible.forEach((p) => selectedSourceFiles.delete(p));
        renderContent();
      };
    }
    const bulkRefreshTestsBtn = document.getElementById('bulkRefreshTestsBtn');
    if (bulkRefreshTestsBtn) {
      bulkRefreshTestsBtn.onclick = () => {
        runAgentTask('refresh-tests-selected', drillFeatureKey, null, selectedVisible);
        selectedVisible.forEach((p) => selectedSourceFiles.delete(p));
        renderContent();
      };
    }
  }

  const fileRowsLoadMoreBtn = document.getElementById('fileRowsLoadMoreBtn');
  if (fileRowsLoadMoreBtn) {
    fileRowsLoadMoreBtn.onclick = () => {
      increaseFileRowsLimit();
      renderContent();
    };
  }

  c.querySelectorAll('.test-type-card[data-testtype]').forEach(card => {
    card.onclick = async () => {
      const type = card.dataset.testtype;
      drillTestType = (type === 'source') ? null : type; // 'source' tab = null state
      activePanelKey = null;
      document.getElementById('panel').classList.remove('open');
      if (type === 'e2e') {
        await loadE2ePlan(drillFeatureKey);
      }
      renderContent();
    };
  });
  bindFileRowsClick(c);
}

  document.getElementById('copyUnmappedDrill').onclick = function() {
    navigator.clipboard.writeText(promptText).then(() => {
      this.textContent = '✅ Скопировано!';
      this.style.color = 'var(--green)';
      setTimeout(() => {
        this.textContent = `📋 Скопировать промпт для AI-агента (${unmappedSrc.length} файлов)`;
        this.style.color = 'var(--blue)';
      }, 3000);
    });
  };

  const unmappedRowsLoadMoreBtn = document.getElementById('unmappedRowsLoadMoreBtn');
  if (unmappedRowsLoadMoreBtn) {
    unmappedRowsLoadMoreBtn.onclick = () => {
      increaseFileRowsLimit();
      renderContent();
    };
  }

  bindFileRowsClick(c);
}

function fileRow(m, isTest = false, featureKey = null, selectable = false) {
  const relPath = m.relativePath.replace(/\\/g, '/');
  const parts   = relPath.split('/');
  const name    = parts[parts.length - 1];
  const dir     = parts.slice(0, -1).join('/');

  // Test errors from last run
  const testErr    = isTest && D.testErrors && D.testErrors[relPath];
  const agentState = !isTest ? isFileAgentActive(relPath) : null;
  const icon       = agentState
    ? `<span class="file-agent-spinner ${agentState}" title="${agentState === 'running' ? 'Агент работает…' : 'В очереди…'}"></span>`
    : (testErr ? '❌' : isTest ? '🧪' : (m.testStale ? '⚠️' : m.hasTests ? '✅' : '⬜'));
  const isActive = activePanelKey === m.id;
  const isSelected = selectedSourceFiles.has(relPath);

  // Write-test button for source files
  // In feature drill-down (featureKey set), show button even for isInfra files — user explicitly added them to the feature
  const showAgentBtn = D.agent && !isTest && featureKey && (!m.hasTests || m.testStale);
  const agentBtnLabel = m.testStale ? '↻ обновить тест' : '✍ написать тест';
  const agentBtnTitle = m.testStale ? 'Файл изменился — обновить тесты' : 'Написать тест для этого файла';
  const agentBtn = showAgentBtn
    ? `<button class="file-row-agent-btn${m.testStale ? ' stale' : ''}" title="${agentBtnTitle}"
         onclick="event.stopPropagation();runAgentTask('write-tests-file','${featureKey}','${relPath}')">
         ${agentBtnLabel}</button>`
    : '';

  // Fix button for test files with errors
  const errBadge = testErr
    ? `<span class="file-row-err-badge" title="${testErr.failed} тестов упало">❌ ${testErr.failed}</span>`
    : '';
  const fixBtn = testErr && D.agent
    ? `<button class="file-row-agent-btn file-row-fix-btn" title="Попросить агента исправить упавшие тесты"
         onclick="event.stopPropagation();runAgentTask('fix-tests','${featureKey || ''}','${relPath}')">
         Починить</button>`
    : '';

  // Inline error list (always shown when there are errors)
  const errHtml = testErr
    ? `<div class="file-row-errors">
        ${testErr.errors.slice(0, 5).map(e => `
          <div class="err-item">
            <span class="err-name">• ${e.testName}</span>
            <span class="err-msg">${e.message}</span>
          </div>`).join('')}
        ${testErr.errors.length > 5 ? `<span class="err-name" style="color:var(--dim)">… ещё ${testErr.errors.length - 5}</span>` : ''}
      </div>`
    : '';

  // "⋯" more menu — always show for source files in feature context
  const moreBtn = !isTest && featureKey
    ? `<div class="file-row-more-wrap">
        <button class="file-row-more-btn" title="Ещё"
          onclick="event.stopPropagation();toggleFileMenu(this,'${featureKey}','${relPath}')">⋯</button>
        <div class="file-row-more-dropdown">
          <button class="file-row-more-item"
            onclick="event.stopPropagation();copyPromptForFile('${featureKey}','${relPath}',this.closest('.file-row-more-dropdown'))">
            📋 Скопировать промпт для агента
          </button>
        </div>
      </div>`
    : '';

  const selectBox = selectable
    ? `<input type="checkbox" class="file-row-select" ${isSelected ? 'checked' : ''}
         onclick="event.stopPropagation();toggleSourceSelection('${relPath}', this.checked)">`
    : '';

  return `
    <div class="file-row${isActive ? ' active' : ''}${testErr ? ' has-errors' : ''}" data-id="${m.id}">
      ${selectBox}
      <span class="file-row-icon">${icon}</span>
      <span class="file-row-name">${name}</span>
      ${errBadge}
      ${agentBtn}
      ${fixBtn}
      ${moreBtn}
      <span class="file-row-dir">${dir}</span>
    </div>
    ${errHtml}`;
}

function toggleSourceSelection(relPath, checked) {
  const n = relPath.replace(/\\/g, '/');
  if (checked) selectedSourceFiles.add(n);
  else selectedSourceFiles.delete(n);
  renderContent();
}

  // Group by top-level directory

  files.forEach(m => {
    const parts = m.relativePath.replace(/\\/g, '/').split('/');

    byDir[dir].push(m);
  });
  const dirs = Object.keys(byDir).sort();

  // Build feature list for context
  const featureList = (D.features || []).map(f => `  • ${f.key} — ${f.label}`).join('\n');

  // Build plain-text list for copying to AI agent
  const plainList = files
    .map(m => '- ' + m.relativePath.replace(/\\/g, '/'))
    .join('\n');

  const promptText =
    `В проекте ${files.length} файлов без привязки к фичам (unmapped).\n` +
    `\nДля каждого файла из списка реши:\n` +
    `1. Если файл относится к конкретной фиче → добавь его путь в "include" этой фичи в viberadar.config.json\n` +
    `2. Если это инфраструктура (утилиты, конфиги, middleware, типы, бутстрап) → добавь glob в массив "ignore"\n` +

    `4. Если непонятно — пропусти\n` +
