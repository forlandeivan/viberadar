    <thead><tr><th>Сервис</th><th>Категория</th><th>Host</th><th>Port</th><th>Источник</th><th>Health Check</th></tr></thead>
    <tbody>${sm.nodes.map(n => `<tr>
      <td>${n.icon || ''} ${n.label}</td>
      <td>${n.category}</td>
      <td>${n.host || '—'}</td>
      <td>${n.port || '—'}</td>
      <td>${n.source}</td>
      <td>${n.healthCheck ? `${n.healthCheck.type}: ${n.healthCheck.target}` : '—'}</td>
    </tr>`).join('')}</tbody>
  </table>`;

  // Dependencies table
  let depsTable = '';
  if (sm.edges.length > 0) {
    depsTable = `<div class="svc-export-section">
      <div class="svc-export-title">Зависимости</div>
      <table class="svc-export-table">
        <thead><tr><th>From</th><th>To</th><th>Тип</th><th>Описание</th><th>Critical</th></tr></thead>
        <tbody>${sm.edges.map(e => `<tr>
          <td>${e.from}</td><td>${e.to}</td><td>${e.type}</td><td>${e.label || '—'}</td>
          <td>${e.critical ? '<span style="color:#f85149">●</span> Да' : '—'}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  // Alerts table
  let alertsTable = '';
  const allAlerts = sm.nodes.flatMap(n => (n.alerts || []).map(a => ({ ...a, service: n.label, serviceId: n.id })));
  if (allAlerts.length > 0) {
    alertsTable = `<div class="svc-export-section">
      <div class="svc-export-title">Рекомендации по алертам</div>
      <table class="svc-export-table">
        <thead><tr><th>Сервис</th><th>Метрика</th><th>Severity</th><th>Описание</th></tr></thead>
        <tbody>${allAlerts.map(a => `<tr>
          <td>${a.service}</td><td><code>${a.metric}</code></td>
          <td><span class="svc-alert-badge ${a.severity}">${a.severity}</span></td>
          <td>${a.description}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  c.innerHTML = `<div class="svc-export">
    <div class="svc-export-section">
      <div class="svc-export-title">Сервисы</div>
      ${servicesTable}
    </div>
    ${depsTable}
    ${alertsTable}
    <div class="svc-export-btns">
      <button class="svc-export-btn" id="svcCopyJson">📋 Copy JSON</button>
      <button class="svc-export-btn" id="svcCopyMd">📄 Copy Markdown</button>
      <button class="svc-export-btn" id="svcCopyProm">⚡ Copy Prometheus Rules</button>
    </div>
  </div>`;

  document.getElementById('svcCopyJson').onclick = async () => {
    try {
      const res = await fetch('/api/service-map?format=json');
      const text = await res.text();
      await navigator.clipboard.writeText(text);
      showToast('JSON скопирован в буфер обмена');
    } catch (e) { showToast('Ошибка копирования'); }
  };
  document.getElementById('svcCopyMd').onclick = async () => {
    try {
      const res = await fetch('/api/service-map?format=markdown');
      const text = await res.text();
      await navigator.clipboard.writeText(text);
      showToast('Markdown скопирован в буфер обмена');
    } catch (e) { showToast('Ошибка копирования'); }
  };
  document.getElementById('svcCopyProm').onclick = async () => {
    try {
      const res = await fetch('/api/service-map?format=prometheus');
      const text = await res.text();
      await navigator.clipboard.writeText(text);
      showToast('Prometheus rules скопированы в буфер обмена');
    } catch (e) { showToast('Ошибка копирования'); }
  };
}

function showToast(msg) {
  let toast = document.getElementById('svc-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'svc-toast';
    toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);color:var(--text);padding:8px 20px;border-radius:6px;border:1px solid var(--border);font-size:12px;z-index:9999;opacity:0;transition:opacity 0.3s;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  setTimeout(() => { toast.style.opacity = '0'; }, 2000);
}

function openSvcPanel(nodeId) {
  const sm = D.serviceMap;
  if (!sm) return;
  const node = sm.nodes.find(n => n.id === nodeId);
  if (!node) return;

  const panel = document.getElementById('panel');
  const colors = SVC_CATEGORY_COLORS[node.category] || SVC_CATEGORY_COLORS['internal-service'];

  // Incoming/outgoing edges
  const incoming = sm.edges.filter(e => e.to === nodeId);
  const outgoing = sm.edges.filter(e => e.from === nodeId);

  // Pipelines this node participates in
  const pipelines = sm.pipelines.filter(p => p.steps.some(s => s.serviceId === nodeId));

  let html = `<div style="padding:16px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <span style="font-size:28px">${node.icon || '📦'}</span>
      <div>
        <div style="font-size:16px;font-weight:600;color:var(--text)">${node.label}</div>
        <div style="font-size:11px;color:${colors.text}">${node.category}</div>
      </div>
    </div>

    <div class="svc-detail-section">
      <h4>Информация</h4>
      <div class="svc-detail-row">ID: <code>${node.id}</code></div>
      <div class="svc-detail-row">Источник: <span class="svc-detail-badge" style="background:${node.source === 'config' ? 'rgba(88,166,255,0.15)' : 'rgba(63,185,80,0.15)'};color:${node.source === 'config' ? '#58a6ff' : '#3fb950'}">${node.source}</span></div>
      ${node.host ? `<div class="svc-detail-row">Host: <code>${node.host}</code></div>` : ''}
      ${node.port ? `<div class="svc-detail-row">Port: <code>${node.port}</code></div>` : ''}
      ${node.group ? `<div class="svc-detail-row">Группа: ${node.group}</div>` : ''}
    </div>`;

  if (incoming.length > 0) {
    html += `<div class="svc-detail-section"><h4>Входящие зависимости (${incoming.length})</h4>
      ${incoming.map(e => `<div class="svc-detail-row">${e.from} → <strong>${nodeId}</strong> ${e.label ? `(${e.label})` : ''} <span style="color:var(--muted)">${e.type}</span>${e.critical ? ' <span style="color:#f85149">critical</span>' : ''}</div>`).join('')}
    </div>`;
  }
  if (outgoing.length > 0) {
    html += `<div class="svc-detail-section"><h4>Исходящие зависимости (${outgoing.length})</h4>
      ${outgoing.map(e => `<div class="svc-detail-row"><strong>${nodeId}</strong> → ${e.to} ${e.label ? `(${e.label})` : ''} <span style="color:var(--muted)">${e.type}</span>${e.critical ? ' <span style="color:#f85149">critical</span>' : ''}</div>`).join('')}
    </div>`;
  }
  if (pipelines.length > 0) {
    html += `<div class="svc-detail-section"><h4>Участвует в пайплайнах (${pipelines.length})</h4>
      ${pipelines.map(p => {
        const stepIdx = p.steps.findIndex(s => s.serviceId === nodeId);
        return `<div class="svc-detail-row">📊 ${p.label} — шаг ${stepIdx + 1}: ${p.steps[stepIdx].label}</div>`;
      }).join('')}
    </div>`;
  }
  if (node.healthCheck) {
    html += `<div class="svc-detail-section"><h4>Health Check</h4>
      <div class="svc-detail-row">Тип: ${node.healthCheck.type}</div>
      <div class="svc-detail-row">Target: <code>${node.healthCheck.target}</code></div>
      ${node.healthCheck.interval ? `<div class="svc-detail-row">Интервал: ${node.healthCheck.interval}</div>` : ''}
    </div>`;
  }
  if (node.alerts && node.alerts.length > 0) {
    html += `<div class="svc-detail-section"><h4>Алерты (${node.alerts.length})</h4>
      ${node.alerts.map(a => `<div class="svc-detail-row"><span class="svc-alert-badge ${a.severity}">${a.severity}</span> <code>${a.metric}</code> — ${a.description}</div>`).join('')}
    </div>`;
  }

  html += `</div>`;

  document.getElementById('panelContent').innerHTML = html;
  panel.classList.add('open');
}

function renderQaOnboarding() {
  return `<div class="onboarding-block"><h3>QA Coverage: что это?</h3><p>Этот экран помогает найти пробелы в тестах: сначала проверь покрытие по фичам, затем открой критичные непокрытые файлы и запусти генерацию/фиксы тестов.</p></div>`;
}

function renderObservability(c) {
  const o = D.observability;
  if (!o) {
    c.innerHTML = `<div class="onboarding-block"><h3>Наблюдаемость</h3><p>Данные анализа логов недоступны. Пересканируй проект.</p></div>`;
    return;
  }

  // Feature-based routing (mirrors QA coverage pattern)
  if (D.hasConfig && D.features && o.byFeature && !drillFeatureKey) {
    renderObsFeatureCards(c);
    return;
  }
  if (drillFeatureKey) {
    renderObsFeatureDetail(c);
    return;
  }

  renderObsGlobalDetail(c);
}

function renderObsGlobalDetail(c, filterFeatureKey) {
  const o = D.observability;
  if (!o) return;

  // If filtering by feature, scope data to that feature's modules
  let catalog = o.catalog;
  let missingV2 = o.missingCriticalLogsV2 || [];
  let topNoisy = o.topNoisyPatterns;
  let fieldGapsData = o.fieldGaps || {};
  let metricsData = o.metrics;

  if (filterFeatureKey) {
    const isUnmapped = filterFeatureKey === '__unmapped__';
    catalog = o.catalog.filter(ci => isUnmapped ? (!ci.featureKeys || ci.featureKeys.length === 0) : (ci.featureKeys || []).includes(filterFeatureKey));
    // Build set of module paths in this feature for missingV2 filtering
    const featureModulePaths = new Set(
      (D.modules || []).filter(m => {
        if (isUnmapped) return !m.featureKeys || m.featureKeys.length === 0;
        return (m.featureKeys || []).includes(filterFeatureKey);
      }).map(m => m.relativePath)
    );
    missingV2 = (o.missingCriticalLogsV2 || []).filter(m => featureModulePaths.has(m.modulePath));
    // Re-derive noisy patterns from filtered catalog
    const noisyAgg = new Map();
    for (const ci of catalog) {
      for (const nm of (ci.noisyMessages || [])) {
        noisyAgg.set(nm, (noisyAgg.get(nm) || 0) + 1);
      }
    }
    topNoisy = Array.from(noisyAgg.entries())
      .sort((a, b) => b[1] - a[1])
      .slice(0, 8)
      .map(([pattern, count], i) => ({
        pattern, count,
        priority: i < 3 ? 'high' : i < 6 ? 'medium' : 'low',
        recommendation: count >= 3 ? 'suppress' : 'downgrade level',
      }));
    // Re-derive field gaps from filtered catalog
    fieldGapsData = {};
    for (const ci of catalog) {
      for (const f of (ci.missingFields || [])) {
        fieldGapsData[f] = (fieldGapsData[f] || 0) + 1;
      }
    }
    // Use per-feature metrics if available
    if (!isUnmapped && o.byFeature) {
      const bf = o.byFeature.find(f => f.key === filterFeatureKey);
      if (bf) metricsData = bf.metrics;
    }
  }

  const noiseRatio  = Math.round(metricsData.noise_ratio * 100);
  const structPct   = Math.round(metricsData.structured_completeness * 100);
  const actionPct   = Math.round(metricsData.error_actionability * 100);
  const coveragePct = Math.round(metricsData.coverage_of_key_flows * 100);

  function metricColor(val, goodThreshold, warnThreshold, invert) {
    if (invert) return val > warnThreshold ? 'var(--red)' : val > goodThreshold ? 'var(--yellow)' : 'var(--green)';
    return val < warnThreshold ? 'var(--red)' : val < goodThreshold ? 'var(--yellow)' : 'var(--green)';
  }

  // ── Baseline & delta tracking ──
  const _bsKey = String(D.currentFeatureKey || 'global').replace(/[^a-z0-9_-]/gi, '_');
  let _bl = null;
  try { _bl = JSON.parse(localStorage.getItem('vr_obs_bl_' + _bsKey) || 'null'); } catch(e) {}

  // Pre-compute current snapshot values (before tierSections so _d is in scope)
  const _blCurrMissing = missingV2.length;
  const _blCurrFPs = missingV2.reduce((s, m) => s + (m.failurePoints || []).length, 0);
  const _blCurrNoise = topNoisy.length;
  const _blCurrEnrich = Object.entries(fieldGapsData).filter(([, v]) => v > 0).length;
  const _blCurrTiers = {};
  ['critical', 'important', 'normal'].forEach(tier => {
    const items = missingV2.filter(m => m.riskTier === tier);
    _blCurrTiers[tier] = { modules: items.length, fps: items.reduce((s, m) => s + (m.failurePoints || []).length, 0) };
  });

  if (!_bl) {
    _bl = { ts: Date.now(), noiseRatio, structPct, actionPct, coveragePct,
            missing: _blCurrMissing, fps: _blCurrFPs, noise: _blCurrNoise, enrich: _blCurrEnrich,
            tiers: _blCurrTiers };
    try { localStorage.setItem('vr_obs_bl_' + _bsKey, JSON.stringify(_bl)); } catch(e) {}
  }

  // Delta badge helpers
  const _d = (curr, base, invert = false) => {
    if (base == null || curr === base) return '';
    const diff = curr - base;
    const good = invert ? diff > 0 : diff < 0;
    const color = good ? '#3fb950' : '#f85149';
    const sign = diff > 0 ? '+' : '';
    return `<span style="color:${color};font-size:11px;font-weight:700;margin-left:5px">(${sign}${diff})</span>`;
  };
  const _dp = (curr, base, invert = false) => {
    if (base == null || curr === base) return '';
    const diff = curr - base;
    const good = invert ? diff > 0 : diff < 0;
    const color = good ? '#3fb950' : '#f85149';
    const arrow = good ? '↓' : '↑';
    return `<span class="obs-kpi-delta" style="color:${color}">${arrow}${Math.abs(diff)}%</span>`;
  };

  const formatLabels = { structured: 'structured', mixed: 'mixed', unstructured: 'unstructured' };
  const sourceByFormat = [
    { label: 'Structured', count: catalog.filter(c => c.format === 'structured').length, color: 'var(--green)' },
    { label: 'Mixed', count: catalog.filter(c => c.format === 'mixed').length, color: 'var(--yellow)' },
    { label: 'Unstructured', count: catalog.filter(c => c.format === 'unstructured').length, color: 'var(--red)' },
  ].filter(x => x.count > 0);

  const recLabels = {
    'suppress': 'убрать',
    'downgrade level': 'понизить уровень',
    'enrich fields': 'обогатить поля',
    'add event': 'добавить событие',
  };
  const hasAgent = !!D.agent;

  // Store catalog for buttons to reference by index (avoids inline JSON in onclick)
  window.__obsCatalog = catalog;

  // Store noisy patterns data for confirmation flow
  window.__noisyPatterns = topNoisy.map(i => ({ pattern: i.pattern, recommendation: i.recommendation }));

  const noisyRows = topNoisy.map((i, idx) => {
    // Find related modules from catalog that contain this pattern in noisyMessages.
    // No recommendation filter — a module can have any top-level recommendation but still
    // contribute noisy messages that match this pattern.
    // Both i.pattern (noisyMap key, 90-char truncated) and noisyMessages entries (80-char truncated)
    // come from the same source string, so we match by: exact, or one is prefix of the other.
    const relatedModules = catalog.filter(c =>
      (c.noisyMessages || []).some(m => {
        if (!m) return false;
        const p = i.pattern;
        return m === p || m.startsWith(p) || p.startsWith(m);
      })
    );
    const moduleCount = relatedModules.length;

    const expandBtn = hasAgent
      ? `<button class="obs-expand-btn" onclick="event.stopPropagation();toggleNoisyDetail(${idx})">▼</button>`
      : '';
    const actionLabel = i.recommendation === 'suppress' ? '\u{1F916} Исправить' : '\u{1F916} Понизить';
    const btn = hasAgent
      ? `<button class="obs-action-btn" onclick="event.stopPropagation();showNoisySuppressConfirm(${idx})">${actionLabel}</button>`
      : '';

    // Module list for detail section
    const moduleRows = relatedModules.map(c => {
      const msgs = (c.noisyMessages || []).slice(0, 3).map(m => `<div class="obs-noisy-msg">• "${escapeHtml(m)}"</div>`).join('');
      return `<div class="obs-noisy-module"><span class="obs-noisy-module-path">${escapeHtml(c.modulePath)}</span>${msgs}</div>`;
    }).join('');

    // Confirmation block
    const confirmDesc = i.recommendation === 'suppress'
      ? `Агент удалит lifecycle-мусор и реструктурирует остальное в <code>logger.debug({...})</code> для паттерна «${escapeHtml(i.pattern)}»`
      : `Агент понизит уровень INFO → DEBUG для паттерна «${escapeHtml(i.pattern)}»`;
    const confirmBlock = hasAgent ? `
      <div id="obs-noisy-confirm-${idx}" class="obs-noisy-confirm">
        <p>${confirmDesc}</p>
        <p>Затронуто модулей: <strong>${moduleCount}</strong></p>
        <div class="obs-confirm-safe">⛔ warn / error / fatal не будут затронуты</div>
        <div class="obs-noisy-confirm-btns">
          <button class="obs-noisy-cancel" onclick="event.stopPropagation();hideNoisySuppressConfirm(${idx})">Отмена</button>
          <button class="obs-noisy-apply" onclick="event.stopPropagation();confirmNoisySuppress(${idx})">Применить</button>
        </div>
      </div>` : '';

    const moduleLabel = moduleCount > 0 ? `<span style="color:var(--dim);font-size:11px;flex-shrink:0">${moduleCount} мод.</span>` : '';

    return `
    <div>
      <div class="obs-list-item">
        <span class="obs-priority-${i.priority}" style="flex-shrink:0">[${i.priority}]</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(i.pattern)}">${escapeHtml(i.pattern)}</span>
        <strong style="flex-shrink:0;color:var(--red)">×${i.count} → ${recLabels[i.recommendation] || i.recommendation}</strong>
        ${moduleLabel}
        ${btn}
        ${expandBtn}
      </div>
      <div id="obs-noisy-detail-${idx}" class="obs-noisy-detail">
        ${moduleRows || '<div class="obs-noisy-module" style="color:var(--dim)">Модули не найдены в каталоге</div>'}
        ${confirmBlock}
      </div>
    </div>`;
  }).join('') || '<div class="obs-sub">Шумных паттернов не обнаружено</div>';

  // ── Missing critical logs (V2: grouped by risk tier with failure points) ──
  const v2Data = missingV2.filter(m => m.failurePoints.length > 0);
  window.__obsMissingV2 = v2Data;
  const fpTypeLabels = {
    'empty-catch':'пустой catch','catch-no-log':'catch без лога','promise-catch-no-log':'.catch без лога',
    'http-no-error-handling':'HTTP без обработки','db-no-error-handling':'DB без обработки',
    'throw-no-log':'throw без лога','error-check-no-log':'if(err) без лога',
  };
  let missingSection = '';
  if (v2Data.length > 0) {
    const tierLabels = { critical:'Критичные', important:'Важные', normal:'Обычные' };
    const tiers = ['critical','important','normal'];
    const tierSections = tiers.map(tier => {
      const items = v2Data.filter(m => m.riskTier === tier);
      if (!items.length) return '';
      const groupId = 'missing-' + tier;
      const expandBtn = hasAgent ? `<button class="obs-expand-btn" onclick="event.stopPropagation();toggleObsDetail('${groupId}')">▼</button>` : '';
      const totalFPs = items.reduce((s,m) => s + m.failurePoints.length, 0);
      const detailItems = items.map(m => {
        const globalIdx = (o.missingCriticalLogsV2 || []).indexOf(m); // index in full unfiltered array — must match server's missingCriticalLogsV2
        const fpCount = m.failurePoints.length;
        const fpPreview = m.failurePoints.slice(0,3).map(fp =>
          `<div class="obs-fp-item"><span class="obs-fp-type">${fpTypeLabels[fp.type]||fp.type}</span><span class="obs-fp-line">~${fp.lineApprox}</span></div>`
        ).join('');
        const moreCount = fpCount > 3 ? `<div class="obs-fp-item" style="color:var(--dim)">...и ещё ${fpCount-3}</div>` : '';
        const covBadge = m.hasAnyWarnError ? '<span style="font-size:10px;color:var(--dim)" title="Есть warn/error, но не все точки покрыты">частично</span>' : '';
        return `<label class="obs-detail-item" style="flex-wrap:wrap">
          <input type="checkbox" data-missing-idx="${globalIdx}" onchange="obsUpdateSelectedCount('${groupId}')">
          <span title="${escapeHtml(m.modulePath)}" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(m.modulePath.split('/').slice(-2).join('/'))}</span>
          <span style="color:var(--dim);flex-shrink:0;font-size:10px">${escapeHtml(m.roleHint)}</span>
          <span style="color:var(--yellow);flex-shrink:0">${fpCount} точек</span>
          ${covBadge}
          ${fpPreview || moreCount ? `<div class="obs-fp-list" style="width:100%">${fpPreview}${moreCount}</div>` : ''}
        </label>`;
      }).join('');
      const addBtn = hasAgent ? `<button class="obs-run-selected" disabled onclick="obsMissingRunSelected('${groupId}')">добавить логи выбранным</button>` : '';
      const detail = hasAgent ? `
        <div id="obs-detail-${groupId}" class="obs-detail" data-obs-action="missing" data-obs-label="${tierLabels[tier]}">
          <div class="obs-detail-bar" style="border-top:none;padding-top:0;margin-bottom:4px">
            <button class="obs-select-all" onclick="obsToggleAll('${groupId}')">выбрать все / снять</button>
          </div>
          <div class="obs-detail-list">${detailItems}</div>
          <div class="obs-detail-bar">${addBtn}</div>
        </div>` : '';
      const _blTier = _bl?.tiers?.[tier];
      return `<div class="obs-tier-group">
        <div class="obs-tier-group-header">
          <span class="obs-tier-badge obs-tier-${tier}">${tierLabels[tier]}</span>
          <span>${items.length}${_d(items.length, _blTier?.modules)} модулей, ${totalFPs}${_d(totalFPs, _blTier?.fps)} точек отказа</span>
          ${expandBtn}
        </div>
        ${detail}
      </div>`;
    }).join('');
    missingSection = tierSections || '<div class="obs-sub" style="color:var(--green)">Критичные сценарии покрыты</div>';
  } else {
    missingSection = '<div class="obs-sub" style="color:var(--green)">Критичные сценарии покрыты</div>';
  }

  const fieldGaps = fieldGapsData;
  const fieldGapEntries = Object.entries(fieldGaps).filter(([,v]) => v > 0).sort((a,b) => b[1] - a[1]);
  const fieldGapRows = fieldGapEntries.map(([name, count]) => {
    const groupId = 'field-' + name.replace(/[^a-z0-9]/gi, '_');
    const affectedItems = catalog.filter(c => (c.missingFields||[]).includes(name));
    const expandBtn = hasAgent ? `<button class="obs-expand-btn" onclick="event.stopPropagation();toggleObsDetail('${groupId}')">▼</button>` : '';
    const detailItems = affectedItems.map(ci => {
      const catIdx = catalog.indexOf(ci);
      const otherMissing = (ci.missingFields||[]).filter(f => f !== name);
      const otherHint = otherMissing.length > 0 ? `<span style="color:var(--dim);font-size:0.8em;flex-shrink:0" title="также отсутствуют: ${escapeHtml(otherMissing.join(', '))}">+${escapeHtml(otherMissing.join(', '))}</span>` : '';
      return `<label class="obs-detail-item"><input type="checkbox" data-path="${escapeHtml(ci.modulePath)}" onchange="obsUpdateSelectedCount('${groupId}')"><span title="${escapeHtml(ci.modulePath)}">${escapeHtml(ci.modulePath.split('/').slice(-2).join('/'))}</span><span style="color:var(--dim);flex-shrink:0">${ci.format}</span>${otherHint}</label>`;
    }).join('');
    const detail = hasAgent ? `
      <div id="obs-detail-${groupId}" class="obs-detail" data-obs-action="field" data-obs-meta='{"fieldName":"${escapeHtml(name)}"}' data-obs-label="поле ${escapeHtml(name)}">
        <div class="obs-detail-bar" style="border-top:none;padding-top:0;margin-bottom:4px">
          <button class="obs-select-all" onclick="obsToggleAll('${groupId}')">выбрать все / снять</button>
        </div>
        <div class="obs-detail-list">${detailItems}</div>
        <div class="obs-detail-bar">
          <button class="obs-run-selected" disabled data-obs-field-name="${escapeHtml(name)}" onclick="obsRunSelected('${groupId}','obs-fix-selected',{fieldName:'${escapeHtml(name)}'})">Добавить \`${escapeHtml(name)}\`</button>
        </div>
      </div>` : '';
    return `<div>
      <div class="obs-list-item">
        <span><code>${escapeHtml(name)}</code></span>
        <strong style="color:${count > 20 ? 'var(--red)' : count > 5 ? 'var(--yellow)' : 'var(--muted)'}">${count} пропусков в ${affectedItems.length} модул${affectedItems.length === 1 ? 'е' : affectedItems.length < 5 ? 'ях' : 'ях'}</strong>
        ${expandBtn}
      </div>
      ${detail}
    </div>`;
  }).join('') || '<div class="obs-sub" style="color:var(--green)">Все обязательные поля на месте</div>';

  const catalogRows = catalog.map((i, idx) => {
    const missing = (i.missingFields || []);
    const missingStr = missing.length ? missing.join(', ') : '—';
    const btn = hasAgent
      ? `<button class="obs-action-btn" data-module-path="${escapeHtml(i.modulePath)}" onclick="event.stopPropagation();runAgentTask('obs-fix-module',null,null,null,{modulePath:this.dataset.modulePath})">исправить</button>`
      : '';
    return `
    <div class="obs-cat-row">
      <span title="${escapeHtml(i.modulePath)}">${escapeHtml(i.modulePath.split('/').slice(-2).join('/'))}</span>
      <span>${i.level}</span>
      <span style="color:${i.format==='structured'?'var(--green)':i.format==='mixed'?'var(--yellow)':'var(--red)'}">${i.format}</span>
      <span style="color:${missing.length > 4 ? 'var(--red)' : missing.length > 0 ? 'var(--yellow)' : 'var(--green)'}">${missing.length}/8</span>
      <span title="${escapeHtml(missingStr)}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(missingStr)}</span>
      <span style="color:${i.recommendation==='suppress'?'var(--red)':i.recommendation==='add event'?'var(--yellow)':'var(--muted)'}">${recLabels[i.recommendation] || i.recommendation}</span>
      ${btn}
    </div>`}).join('');

  const noisyCount = topNoisy.length;
  const missingCount = v2Data.length;
  const enrichCount = fieldGapEntries.length;
  const catalogCount = catalog.length;

  // ── Build progress banner comparing to baseline ──
  const _blItems = [];
  if (_bl.missing != null && missingCount !== _bl.missing)
    _blItems.push({ label: `модулей без логов: ${_bl.missing} → ${missingCount}`, good: missingCount < _bl.missing });
  if (_bl.fps != null && _blCurrFPs !== _bl.fps)
    _blItems.push({ label: `точек отказа: ${_bl.fps} → ${_blCurrFPs}`, good: _blCurrFPs < _bl.fps });
  if (_bl.noise != null && noisyCount !== _bl.noise)
    _blItems.push({ label: `шумных паттернов: ${_bl.noise} → ${noisyCount}`, good: noisyCount < _bl.noise });
  if (_bl.enrich != null && enrichCount !== _bl.enrich)
    _blItems.push({ label: `нужно обогатить: ${_bl.enrich} → ${enrichCount}`, good: enrichCount < _bl.enrich });

  const _hasReg = _blItems.some(x => !x.good);
  const _hasImp = _blItems.some(x => x.good);
  const _progressBanner = _blItems.length ? `
    <div class="obs-progress-banner${_hasReg ? ' has-regression' : ''}">
      <span class="obs-pb-title${_hasReg && _hasImp ? ' mixed' : _hasReg ? ' obs-pb-worse' : ''}">📊 прогресс</span>
      ${_blItems.map(it => `<span class="${it.good ? 'obs-pb-item' : 'obs-pb-worse'}">${it.good ? '✅' : '⚠️'} ${it.label}</span>`).join('')}
    </div>` : '';

  const _baselineStrip = `
    <div class="obs-baseline-strip">
      <span>📍 baseline: ${obsTimeAgo(_bl.ts)}</span>
      <button onclick="obsResetBaseline('${_bsKey}')">обновить</button>

function renderObsFeatureCards(c) {
  const o = D.observability;
  if (!o || !o.byFeature) return;

  const q = searchQuery.toLowerCase();
  const list = o.byFeature.filter(f =>
    !q || f.label.toLowerCase().includes(q) || f.key.toLowerCase().includes(q)
  );

  // Global KPI strip (compact)
  const gNoiseRatio  = Math.round(o.metrics.noise_ratio * 100);
  const gStructPct   = Math.round(o.metrics.structured_completeness * 100);
  const gActionPct   = Math.round(o.metrics.error_actionability * 100);
  const gCoveragePct = Math.round(o.metrics.coverage_of_key_flows * 100);
  function mc(val, good, warn, inv) {
    if (inv) return val > warn ? 'var(--red)' : val > good ? 'var(--yellow)' : 'var(--green)';
    return val < warn ? 'var(--red)' : val < good ? 'var(--yellow)' : 'var(--green)';
  }

  const globalStrip = `
    <div class="obs-kpi-strip" style="margin-bottom:16px">
      <div class="obs-kpi"><span class="obs-kpi-value" style="color:${mc(gNoiseRatio,10,30,true)}">${gNoiseRatio}%</span><span class="obs-kpi-label">Шум</span></div>
      <div class="obs-kpi"><span class="obs-kpi-value" style="color:${mc(gStructPct,80,50,false)}">${gStructPct}%</span><span class="obs-kpi-label">Структ.</span></div>
      <div class="obs-kpi"><span class="obs-kpi-value" style="color:${mc(gActionPct,80,50,false)}">${gActionPct}%</span><span class="obs-kpi-label">Actionable</span></div>
      <div class="obs-kpi"><span class="obs-kpi-value" style="color:${mc(gCoveragePct,80,50,false)}">${gCoveragePct}%</span><span class="obs-kpi-label">Покрытие</span></div>
    </div>`;

  c.innerHTML = globalStrip + '<div class="features-grid" id="obsGrid"></div>';
  const grid = document.getElementById('obsGrid');

  list.forEach(f => {
    const card = document.createElement('div');
    card.className = 'feature-card';

    // Per-feature baseline
    const bsKey = String(f.key).replace(/[^a-z0-9_-]/gi, '_');
    let bl = null;
    try { bl = JSON.parse(localStorage.getItem('vr_obs_bl_' + bsKey) || 'null'); } catch(e) {}
    const scoreDelta = bl && bl.score != null && f.score !== bl.score
      ? (() => {
        const diff = f.score - bl.score;
        const good = diff > 0;
        const color = good ? '#3fb950' : '#f85149';
        const sign = diff > 0 ? '+' : '';
        return `<span style="color:${color};font-size:11px;font-weight:700;margin-left:4px">(${sign}${diff})</span>`;
      })() : '';

    // Mini KPI
    const n = Math.round(f.metrics.noise_ratio * 100);
    const s = Math.round(f.metrics.structured_completeness * 100);
    const a = Math.round(f.metrics.error_actionability * 100);
    const cv = Math.round(f.metrics.coverage_of_key_flows * 100);

    // Issue counts for badges
    const issues = f.noisyPatternCount + f.missingCriticalCount + f.fieldGapCount;

    card.innerHTML = `
      <div class="feature-accent" style="background:${f.color}"></div>
      <div class="feature-body">
        <div class="feature-title">
          <span>${escapeHtml(f.label)}</span>
          <span class="feature-file-count">${f.catalogCount} лог-модулей</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="font-size:24px;font-weight:700;line-height:1;color:${covColor(f.score)}">${f.score}%</span>
          ${scoreDelta}
          <div style="flex:1">
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.4px">Observability Score</div>
            <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">
              <div style="width:${f.score}%;height:100%;background:${covColor(f.score)};border-radius:2px;transition:width 0.4s"></div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:12px;font-size:11px;color:var(--dim);margin-bottom:8px">
          <span title="Шум">🔇 <span style="color:${mc(n,10,30,true)}">${n}%</span></span>
          <span title="Структурированность">📋 <span style="color:${mc(s,80,50,false)}">${s}%</span></span>
          <span title="Actionable ошибки">🎯 <span style="color:${mc(a,80,50,false)}">${a}%</span></span>
          <span title="Покрытие сценариев">🛡️ <span style="color:${mc(cv,80,50,false)}">${cv}%</span></span>
        </div>
        ${issues > 0 ? `<div style="font-size:11px;color:var(--muted)">
          ${f.noisyPatternCount ? `<span style="color:var(--red)">${f.noisyPatternCount} шум</span> ` : ''}
          ${f.missingCriticalCount ? `<span style="color:var(--yellow)">${f.missingCriticalCount} без логов</span> ` : ''}
          ${f.failurePointCount ? `<span style="color:var(--yellow)">${f.failurePointCount} точек отказа</span> ` : ''}
          ${f.fieldGapCount ? `<span style="color:var(--muted)">${f.fieldGapCount} пробелов</span>` : ''}
        </div>` : '<div style="font-size:11px;color:var(--green)">Всё ок</div>'}
      </div>`;

    card.onclick = () => setFeatureDrill(f.key);
    card.onmousedown = (e) => { if (e.button === 1) e.preventDefault(); };
    card.onauxclick = (e) => {
      if (e.button !== 1) return;
      e.preventDefault();
      openFeatureInNewTab(f.key);
    };
    grid.appendChild(card);
  });

  // Unmapped card
  const unmappedCatalog = o.catalog.filter(ci => !ci.featureKeys || ci.featureKeys.length === 0);
  if (unmappedCatalog.length > 0) {
    const uCard = document.createElement('div');
    uCard.className = 'feature-card unmapped-card';
    uCard.innerHTML = `
      <div class="feature-accent" style="background:#e3b341"></div>
      <div class="feature-body">
        <div class="feature-title">
          <span>Unmapped</span>
          <span class="feature-file-count">${unmappedCatalog.length} лог-модулей</span>
        </div>
        <div style="font-size:12px;color:var(--dim);margin-top:4px">Модули с логами, не привязанные к фичам</div>
      </div>`;
    uCard.onclick = () => setFeatureDrill('__unmapped__');
    grid.appendChild(uCard);
  }
}

function toPct(v) {
  return Math.round((v || 0) * 100) + '%';
}

function renderObservabilityOverview(c) {
  const o = D.observability;
  if (!o) return '';
  const metrics = [
    ['Коэффициент шума', toPct(o.metrics.noise_ratio)],
    ['Действия по ошибкам', toPct(o.metrics.error_actionability)],
    ['Полнота структуры', toPct(o.metrics.structured_completeness)],
    ['Покрытие ключевых сценариев', toPct(o.metrics.coverage_of_key_flows)],
  ];
  const noisy = (o.topNoisyPatterns || []).slice(0, 5).map(i =>
    `<div class="obs-row"><span class="obs-priority-${i.priority}">[${i.priority}]</span> ${escapeHtml(i.pattern)} · x${i.count} → <b>${i.recommendation}</b></div>`
  ).join('') || '<div class="obs-row">Нет шумных паттернов</div>';

  const v2Missing = o.missingCriticalLogsV2 || [];
  let missing;
  if (v2Missing.length) {
    const tierLabels = { critical: '🔴 крит', important: '🟡 важн', normal: '⚪ обычн' };
    missing = v2Missing.slice(0, 8).map(m =>
      `<div class="obs-row"><span class="obs-tier-badge obs-tier-${m.riskTier}">${tierLabels[m.riskTier]}</span> ${escapeHtml(m.modulePath)} · ${m.failurePoints.length} точек отказа</div>`
    ).join('');
    if (v2Missing.length > 8) missing += `<div class="obs-row" style="color:var(--dim)">...и ещё ${v2Missing.length - 8}</div>`;
  } else {
    missing = (o.missingCriticalLogs || []).slice(0, 5).map(i =>
      `<div class="obs-row"><span class="obs-priority-${i.priority}">[${i.priority}]</span> ${escapeHtml(i.pattern)} → <b>${i.recommendation}</b></div>`
    ).join('') || '<div class="obs-row">Критичные логи покрыты</div>';
  }

  const catalogRows = (o.catalog || []).slice(0, 10).map(i =>
    `<div class="obs-cat-row"><span>${escapeHtml(i.modulePath)}</span><span>${i.level}</span><span>${i.format}</span><span>${i.frequency}</span><span>${escapeHtml(i.owner)}</span><span>${i.recommendation}</span></div>`
  ).join('');

  return `
    <div class="observability-panel">
      <div class="observability-title">Наблюдаемость</div>
      <div class="obs-metrics">
        ${metrics.map(([l,v]) => `<div class="obs-metric"><div class="obs-metric-v">${v}</div><div class="obs-metric-l">${l}</div></div>`).join('')}
      </div>
      <div class="obs-columns">
        <div class="obs-list">
          <h4>Топ шумных паттернов</h4>
          ${noisy}
        </div>
        <div class="obs-list">
          <h4>Отсутствующие критичные логи</h4>
          ${missing}
        </div>
      </div>
      <div class="obs-catalog">
        <h4>Каталог источников логов (топ 10)</h4>
        <div class="obs-cat-row head"><span>модуль</span><span>уровень</span><span>формат</span><span>частота</span><span>владелец</span><span>действие</span></div>
        ${catalogRows || '<div class="obs-row">Логи не найдены</div>'}
      </div>
      <div class="obs-row" style="margin-top:8px">
        Классификация: мусор ${o.classification.trash} · полезно ${o.classification.useful} · критично ${o.classification.critical}
      </div>
    </div>`;
}

let scenarioDrillKey = null;

function renderScenarios(c) {
  const sr = D.scenarios;
  if (!sr || sr.totalScenarios === 0) {
    const hasFeatures = D.features && D.features.length > 0;
    c.innerHTML = `<div class="onboarding-block">
      <h3>Сценарии</h3>
      <p style="color:var(--muted);margin-bottom:16px">Пользовательские сценарии — это кросс-фичевые user journeys.<br>Агент проанализирует фичи продукта и придумает реалистичные сценарии.</p>
      ${hasFeatures ? `
        <button class="agent-card-btn" id="generateScenariosBtn" style="font-size:14px;padding:10px 20px;background:var(--blue);color:#fff;border:none;border-radius:6px;cursor:pointer">
          ✨ Сгенерировать 15 сценариев
        </button>
        <p style="font-size:11px;color:var(--muted);margin-top:10px">Агент изучит ${D.features.length} фич и предложит 15 user journeys в viberadar.config.json</p>
      ` : `<p style="color:var(--red)">Сначала добавьте фичи в viberadar.config.json</p>`}

  else renderScenarioCards(c);
}

function renderScenarioCards(c) {
  const sr = D.scenarios;
  if (!sr || !sr.scenarios.length) {
    c.innerHTML = `<div class="onboarding-block"><p>Сценарии не найдены в viberadar.config.json.</p></div>`;
    return;
  }

  const missingDocs = sr.scenarios.filter(s => !s.docExists);

  let html = `
    <div class="doc-kpi-strip">
      <div class="doc-kpi"><span class="doc-kpi-val">${sr.totalScenarios}</span><span class="doc-kpi-lbl">Сценариев</span></div>
      <div class="doc-kpi"><span class="doc-kpi-val" style="color:var(--green)">${sr.withDocCount}</span><span class="doc-kpi-lbl">Готово</span></div>
      <div class="doc-kpi"><span class="doc-kpi-val" style="color:var(--red)">${sr.missingDocCount}</span><span class="doc-kpi-lbl">Без доки</span></div>
      <div style="flex:1"></div>
      ${missingDocs.length > 0 ? `<button class="agent-card-btn" id="scenarioWriteAllBtn" style="background:var(--blue);color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px">
        ✍ Написать доку для всех (${missingDocs.length})
      </button>` : ''}
      <button class="agent-card-btn" id="scenarioRegenBtn" style="background:var(--card-bg);color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;margin-left:8px">
        ↻ Перегенерировать
      </button>
      <button id="scenarioCustomBtn" style="background:var(--card-bg);color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;margin-left:8px">
        ✏ Свой сценарий
      </button>
    </div>
    <div id="customScenarioForm" style="display:none;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px">
      <div style="font-weight:600;font-size:14px;margin-bottom:12px">Написать сценарий по своему промпту</div>
      <div style="margin-bottom:10px">
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Название сценария</label>
        <input id="customScenarioName" type="text" placeholder="Например: Онбординг нового пользователя"
          style="width:100%;box-sizing:border-box;padding:8px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-size:13px;outline:none"/>
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Опишите сценарий (что делает пользователь, какую цель достигает)</label>
        <textarea id="customScenarioPrompt" rows="4" placeholder="Пользователь регистрируется, создаёт первый навык, тестирует его в чате и публикует..."
          style="width:100%;box-sizing:border-box;padding:8px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-size:13px;outline:none;resize:vertical;font-family:inherit"></textarea>
      </div>
      <div style="display:flex;gap:8px">
        <button id="customScenarioRunBtn" style="background:var(--blue);color:#fff;border:none;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600">
          ✍ Сгенерировать документацию
        </button>
        <button id="customScenarioCancelBtn" style="background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:8px 14px;cursor:pointer;font-size:13px">
          Отмена
        </button>
      </div>
    </div>
    <div class="features-grid">`;

  for (const s of sr.scenarios) {
    const hasDoc = s.docExists;
    const statusColor = hasDoc ? 'var(--green)' : 'var(--red)';
    const statusText = hasDoc ? `v${s.latestVersion}` : 'Нет доки';
    const lastUpd = s.lastUpdated ? new Date(s.lastUpdated).toLocaleDateString('ru-RU') : '—';
    html += `
      <div class="doc-feature-card" data-key="${s.key}" style="cursor:pointer">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${s.color};flex-shrink:0"></span>
          <span style="font-weight:600;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(s.label)}</span>
          <span style="font-size:11px;color:${statusColor};font-weight:600;flex-shrink:0">${statusText}</span>
        </div>
        ${s.description ? `<div style="font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.4">${escapeHtml(s.description)}</div>` : ''}
        <div style="font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
          ${s.featureLabels.map(l => `<span style="background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 6px">${escapeHtml(l)}</span>`).join('')}
        </div>
        ${hasDoc ? `<div style="font-size:11px;color:var(--muted);margin-bottom:8px">Обновлено: ${lastUpd}</div>` : ''}
        <button class="scenario-doc-btn agent-card-btn" data-key="${s.key}"
          style="width:100%;padding:6px 10px;font-size:12px;border-radius:5px;border:none;cursor:pointer;
          background:${hasDoc ? 'var(--card-bg)' : 'var(--blue)'};
          color:${hasDoc ? 'var(--muted)' : '#fff'};
          border:1px solid ${hasDoc ? 'var(--border)' : 'transparent'}">
          ${hasDoc ? `↻ Актуализировать → v${s.latestVersion + 1}` : '✍ Написать документацию'}
        </button>
      </div>`;
  }
  html += '</div>';
  c.innerHTML = html;

  c.querySelectorAll('.scenario-doc-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      runAgentTask('actualize-scenario', btn.dataset.key);
    });
  });

  c.querySelectorAll('.doc-feature-card').forEach(card => {
    card.addEventListener('click', () => {
      scenarioDrillKey = card.dataset.key;
      renderContent();
    });
  });

  const writeAllBtn = document.getElementById('scenarioWriteAllBtn');
  if (writeAllBtn) {
    writeAllBtn.onclick = () => {
      if (agentRunning) { alert('Агент уже запущен, задачи будут поставлены в очередь'); }
      const missing = sr.scenarios.filter(s => !s.docExists);
      missing.forEach((s, i) => {
        setTimeout(() => runAgentTask('actualize-scenario', s.key), i * 300);
      });
    };
  }

  const regenBtn = document.getElementById('scenarioRegenBtn');
  if (regenBtn) {
    regenBtn.onclick = () => {
      if (confirm(`Перегенерировать все ${sr.totalScenarios} сценариев? Агент заново изучит фичи и перепишет viberadar.config.json`)) {
        runAgentTask('generate-scenarios');
      }
    };
  }

  const customBtn = document.getElementById('scenarioCustomBtn');
  const customForm = document.getElementById('customScenarioForm');
  const customCancelBtn = document.getElementById('customScenarioCancelBtn');
  const customRunBtn = document.getElementById('customScenarioRunBtn');

  if (customBtn && customForm) {
    customBtn.onclick = () => {
      const isOpen = customForm.style.display !== 'none';
      customForm.style.display = isOpen ? 'none' : 'block';
      if (!isOpen) document.getElementById('customScenarioName').focus();
    };
  }
  if (customCancelBtn && customForm) {
    customCancelBtn.onclick = () => { customForm.style.display = 'none'; };
  }
  if (customRunBtn) {
    customRunBtn.onclick = () => {
      const nameEl = document.getElementById('customScenarioName');
      const promptEl = document.getElementById('customScenarioPrompt');
      const name = nameEl.value.trim();
      const prompt = promptEl.value.trim();
      if (!name) { nameEl.focus(); alert('Введите название сценария'); return; }
      if (!prompt) { promptEl.focus(); alert('Опишите сценарий'); return; }
      // Generate slug key from name
      const key = 'custom-' + name.toLowerCase()
        .replace(/[а-яёА-ЯЁ]/g, c => ({ а:'a',б:'b',в:'v',г:'g',д:'d',е:'e',ё:'yo',ж:'zh',з:'z',и:'i',й:'y',к:'k',л:'l',м:'m',н:'n',о:'o',п:'p',р:'r',с:'s',т:'t',у:'u',ф:'f',х:'h',ц:'ts',ч:'ch',ш:'sh',щ:'sch',ъ:'',ы:'y',ь:'',э:'e',ю:'yu',я:'ya',А:'a',Б:'b',В:'v',Г:'g',Д:'d',Е:'e',Ё:'yo',Ж:'zh',З:'z',И:'i',Й:'y',К:'k',Л:'l',М:'m',Н:'n',О:'o',П:'p',Р:'r',С:'s',Т:'t',У:'u',Ф:'f',Х:'h',Ц:'ts',Ч:'ch',Ш:'sh',Щ:'sch',Ъ:'',Ы:'y',Ь:'',Э:'e',Ю:'yu',Я:'ya' }[c] || c))
        .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40)
        + '-' + Date.now().toString(36);
      customForm.style.display = 'none';
      nameEl.value = '';
      promptEl.value = '';
      runAgentTask('custom-scenario', key, null, null, { name, prompt });
    };
  }
}

async function renderScenarioDetail(c) {
  const sr = D.scenarios;
  const s = sr?.scenarios.find(x => x.key === scenarioDrillKey);
  if (!s) { scenarioDrillKey = null; renderContent(); return; }

  const statusColor = s.docExists ? 'var(--green)' : 'var(--red)';
  const statusText = s.docExists ? `Готово · v${s.latestVersion}` : 'Нет документации';
  const lastUpd = s.lastUpdated ? new Date(s.lastUpdated).toLocaleDateString('ru-RU') : '—';
  const nextVersion = (s.latestVersion || 0) + 1;
  const btnLabel = s.docExists ? `Актуализировать сценарий → v${nextVersion}` : 'Сгенерировать сценарий → v1';
  const btnHint = s.docExists
    ? 'Агент перечитает документацию фич и обновит сценарий.'
    : 'Агент прочитает документацию связанных фич и напишет пошаговый сценарий.';

  const versionsHtml = s.docVersions && s.docVersions.length > 0
    ? `<div style="font-size:11px;color:var(--muted);margin-top:6px">Версии: ${s.docVersions.map((v, i) => `<span style="${i === s.docVersions.length - 1 ? 'color:var(--text)' : ''}">${v.split('/').pop()}</span>`).join(' · ')}</div>`
    : '';

  const exportButtons = s.docExists ? `
    <a href="/api/docs/export/md?scenario=${encodeURIComponent(s.key)}" download class="doc-agent-btn" style="font-size:13px;padding:6px 14px;text-decoration:none">⬇ .md</a>
    <a href="/api/docs/export/docx?scenario=${encodeURIComponent(s.key)}" download class="doc-agent-btn" style="font-size:13px;padding:6px 14px;text-decoration:none">⬇ .docx</a>` : '';

  // Check if referenced feature docs are missing
  const missingDocs = s.featureKeys.filter((fk, i) => {
    const featDoc = D.documentation?.features.find(f => f.key === fk);
    return !featDoc?.docExists;
  });
  const warningHtml = missingDocs.length > 0
    ? `<div style="margin-top:8px;padding:8px 12px;border-radius:6px;background:rgba(210,153,34,0.1);border:1px solid rgba(210,153,34,0.3);font-size:12px;color:var(--yellow)">
        ⚠️ Документация отсутствует для: ${missingDocs.map(k => `<strong>${escapeHtml(D.documentation?.features.find(f => f.key === k)?.label || k)}</strong>`).join(', ')}. Агент сможет сгенерировать сценарий, но качество будет ниже.
      </div>` : '';

  c.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <button class="back-btn" id="scenarioBackBtn">← Все сценарии</button>
      <span style="width:12px;height:12px;border-radius:50%;background:${s.color};display:inline-block;flex-shrink:0"></span>
      <h2 style="font-size:18px;font-weight:700;margin:0;flex:1">${escapeHtml(s.label)}</h2>
      <div style="display:flex;align-items:center;font-size:13px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${statusColor};margin-right:6px"></span><span style="color:${statusColor};font-weight:600">${statusText}</span></div>
      ${s.docExists ? `<span style="font-size:12px;color:var(--muted)">Обновлено: ${lastUpd}</span>` : ''}

      <span>Фичи:</span>
      ${s.featureLabels.map(l => `<span style="background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:12px">${escapeHtml(l)}</span>`).join('')}
    </div>

    <div class="doc-detail-actions">
      <div class="doc-action-step">
        <div>
          <div class="doc-step-label">${btnLabel}</div>
          <div class="doc-step-hint">${btnHint}</div>
          <div style="margin-top:8px">
            <button class="agent-card-btn doc-detail-agent-btn" id="scenarioActualizeBtn" data-task="actualize-scenario" data-key="${s.key}">${btnLabel}</button>
          </div>
          ${warningHtml}
          <div id="scenarioActualizeStatus" style="display:none;margin-top:10px;padding:8px 12px;border-radius:6px;background:rgba(88,166,255,0.08);border:1px solid rgba(88,166,255,0.2);font-size:12px;color:var(--blue)"></div>
          ${versionsHtml}
        </div>
      </div>

    <div id="scenarioContent" style="margin-top:16px;padding:24px;background:var(--bg-card);border-radius:8px;border:1px solid var(--border)">
      <div style="color:var(--muted);font-size:13px">Загрузка...</div>
    </div>`;

  document.getElementById('scenarioBackBtn').onclick = () => { scenarioDrillKey = null; renderContent(); };

  document.getElementById('scenarioActualizeBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    runAgentTask('actualize-scenario', s.key);
  });

  // Load content
  if (s.docExists) {
    try {
      const res = await fetch(`/api/scenarios/content?scenario=${encodeURIComponent(s.key)}`);
      const data = await res.json();
      if (data.content) {
        document.getElementById('scenarioContent').innerHTML = renderMarkdownToHtml(data.content);
      } else {
        document.getElementById('scenarioContent').innerHTML = '<div style="color:var(--muted);font-size:13px">Документация отсутствует.</div>';
      }

      document.getElementById('scenarioContent').innerHTML = '<div style="color:var(--red);font-size:13px">Ошибка загрузки.</div>';
    }

    document.getElementById('scenarioContent').innerHTML = `<div style="color:var(--muted);font-size:13px;text-align:center;padding:32px 0">Нажмите «${escapeHtml(btnLabel)}» чтобы сгенерировать документацию.</div>`;

}
